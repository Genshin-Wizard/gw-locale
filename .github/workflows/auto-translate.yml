name: Auto-translate new strings

on:
  push:
    branches:
      - master
    paths:
      - "langs/en-US.yaml"
      - "website-langs/en-US.yaml"

# Prevent concurrent translation runs on the same branch
concurrency:
  group: auto-translate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  translate:
    # Skip commits made by this workflow to avoid infinite loops
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository (with history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need HEAD~1 to diff against

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: .github/scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Run CI translator
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python .github/scripts/ci_translate.py

      - name: Commit translated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add langs/*.yaml website-langs/*.yaml
          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No translation changes to commit."
          else
            git commit -m "chore(i18n): auto-translate new strings [skip ci]"
            git push
          fi

      - name: Upload translations to Crowdin
        uses: crowdin/github-action@v2
        with:
          upload_translations: true
          upload_sources: false
          crowdin_branch_name: master
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
