SUMERU_SCHOLARS_SUBTITLE: "蘇美爾學者：Genshin Insight 的大師"
SUMERU_SCHOLARS_TEXT: 以無與倫比的專業知識和戰略指導來賦能你的旅程。
SUMERU_KNOWLEDGE_TITLE: 深入知識
SUMERU_KNOWLEDGE_TEXT: 在我們的蘇美爾學者的專業指導下，解鎖《原神》的秘密。這些專家擁有無與倫比的角色構建、遊玩風格和遊戲機制的知識，指導您掌握遊戲的每個方面。
SUMERU_THEORYCRAFTING_TITLE: 專家理論創作
SUMERU_THEORYCRAFTING_TEXT: 我們的蘇美爾學者在《原神》Wizard的理論創作中處於前沿。憑藉他們的分析能力和對遊戲動態的深刻理解，他們制定出能讓玩家獲得競爭優勢的策略。
SUMERU_WHO_ARE_WE_DETAILED_TEXT_1: 蘇美爾學者是《原神》Wizard的理論創作、編輯和構建策略背後的精英專家。這些專家因其對《原神》的深刻理解而被精心挑選，他們對角色構建、遊玩風格和遊戲機制的了解無人能及。他們無與倫比的專業知識使他們對社區來說不可或缺，指導玩家掌握遊戲的每個方面。
SUMERU_WHO_ARE_WE_DETAILED_TEXT_2: 您對《原神》充滿熱情並渴望分享您的知識嗎？《原神》Wizard始終在尋找有技能的人士加入這個享有盛譽的蘇美爾學者社會。成為這個精英團體的一部分，幫助塑造《原神》策略的未來。
SUMERU_DETAILED_GUIDES_TITLE: 詳細的《原神》角色指南
SUMERU_DETAILED_GUIDES_TEXT: 通過我們精心詳細的指南，釋放您《原神》角色的全部潛力，這些指南由「蘇美爾學者」提供——一支專注的專家編輯團隊。這些指南經過精心製作，為您提供每個角色最準確、最新的信息，確保您隨時擁有最佳策略。無論您是在尋找最佳的隊伍協同、深入的遊玩風格建議，還是僅需快速參考升級材料、星座細節或技能和被動天賦，《原神》Wizard都能滿足您的需求。輕鬆獲取所有這些重要信息，您將隨時準備好在每次冒險中引領您的角色走向偉大。相信蘇美爾學者能以精確和專業指導您的旅程。
