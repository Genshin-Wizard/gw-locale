FAQ_TITLE: Preguntas frecuentes
FAQ_DESCRIPTION: ¿Aún tienes preguntas? Consulta nuestra sección de preguntas frecuentes para respuestas a consultas comunes sobre Genshin Wizard Premium.
FAQ_WHAT_IS_PREMIUM_Q: ¿Qué es Genshin Wizard Premium?
FAQ_WHAT_IS_PREMIUM_A: Genshin Wizard Premium es un servicio de suscripción que ofrece características exclusivas, soporte prioritario y beneficios adicionales para mejorar tu experiencia en Genshin.
FAQ_HOW_TO_SUBSCRIBE_Q: ¿Cómo me suscribo a Genshin Wizard Premium?
FAQ_HOW_TO_SUBSCRIBE_A: Puedes suscribirte a Genshin Wizard Premium a través de nuestro sitio web. Elige un plan que te convenga y sigue las instrucciones para completar tu suscripción.
FAQ_PAYMENT_METHODS_Q: ¿Qué métodos de pago se aceptan?
FAQ_PAYMENT_METHODS_A: Aceptamos varios métodos de pago, incluyendo tarjetas de crédito/débito y PayPal. Por favor, consulta nuestra página de pagos para más detalles.
FAQ_CAN_CANCEL_Q: ¿Puedo cancelar mi suscripción en cualquier momento?
FAQ_CAN_CANCEL_A: Sí, puedes cancelar tu suscripción en cualquier momento a través de la configuración de tu cuenta. Tu acceso permanecerá activo hasta el final del ciclo de facturación actual.
FAQ_WHAT_HAPPENS_CANCEL_Q: ¿Qué pasa si cancelo mi suscripción?
FAQ_WHAT_HAPPENS_CANCEL_A: Si cancelas tu suscripción, perderás el acceso a las funciones premium al final de tu ciclo de facturación actual. Aún puedes usar la versión gratuita de Genshin Wizard.
FAQ_FREE_TRIAL_Q: ¿Hay una prueba gratuita disponible?
FAQ_FREE_TRIAL_A: Actualmente, no ofrecemos una prueba gratuita para Genshin Wizard Premium. Sin embargo, puedes explorar la versión gratuita del bot para ver sus capacidades.
FAQ_CONTACT_SUPPORT_Q: ¿Cómo contacto con el soporte para problemas relacionados con premium?
FAQ_CONTACT_SUPPORT_A: Puedes contactar a nuestro equipo de soporte a través de la página de soporte en nuestro sitio web. Estamos aquí para ayudarte con cualquier problema relacionado con tu suscripción premium.
