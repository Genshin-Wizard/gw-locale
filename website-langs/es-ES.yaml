USER_PLUGIN_PROFILE_NAME: Perfil de Genshin Wizard
USER_PLUGIN_PROFILE_DESC: Ajusta la configuración de tu perfil de Genshin Wizard, incluyendo preferencias de visualización y personalizaciones visuales. Añade estilo a tu perfil para que destaque entre otros usuarios.
USER_PLUGIN_ART_NAME: Personalizar Infografías
USER_PLUGIN_ART_DESC: Personaliza tus infografías seleccionando entre una variedad de colores, fuentes y diseños. Adáptalas para que coincidan con tu estética y preferencias.
USER_PLUGIN_PRIVACY_NAME: Configuraciones de privacidad
USER_PLUGIN_PRIVACY_DESC: Gestiona y controla tus configuraciones de privacidad, incluyendo quién puede ver tus datos y cuánta información deseas compartir con otros.
USER_PLUGIN_WISHES_REFRESH_NAME: Actualizar Historial de Deseos
USER_PLUGIN_WISHES_REFRESH_DESC: Actualiza tu historial de deseos para asegurarte de tener los datos más recientes sobre tus tiradas pasadas, permitiéndote hacer un seguimiento de los banners más recientes.
USER_PLUGIN_WISHES_STATS_NAME: Ver Estadísticas de Deseos
USER_PLUGIN_WISHES_STATS_DESC: Analiza tus estadísticas de deseos en detalle, incluyendo tasas de tiradas, conteos de pity y probabilidades de 5 estrellas, para seguir tu suerte y tendencias a lo largo del tiempo.
USER_PLUGIN_WISHES_HISTORY_NAME: Ver Historial de Deseos
USER_PLUGIN_WISHES_HISTORY_DESC: Accede a tu historial completo de deseos, mostrando cada tirada realizada en todos los banners, ayudándote a mantener un registro organizado de tu progreso en el juego.
USER_PLUGIN_WISHES_IMPORT_NAME: Importar/Exportar Historial de Deseos
USER_PLUGIN_WISHES_IMPORT_DESC: Importa o exporta sin problemas los datos de tu historial de deseos para compartir con otros o transferir entre diferentes dispositivos, asegurando que nunca pierdas el rastro de tus tiradas.
USER_PLUGIN_HOYOLAB_REGISTER_NAME: Registrar Cuenta de HoYoLAB
USER_PLUGIN_HOYOLAB_REGISTER_DESC: Vincula tu cuenta de HoYoLAB para desbloquear funciones adicionales, como sincronizar el historial de deseos, acceder a eventos especiales y reclamar recompensas más fácilmente.
USER_PLUGIN_HOYOLAB_AUTOCLAIM_NAME: Recompensas Diarias de Autoclaim
USER_PLUGIN_HOYOLAB_AUTOCLAIM_DESC: Activa la función premium de autoclaim diario para recoger automáticamente tus recompensas de HoYoLAB sin necesidad de iniciar sesión manualmente, ahorrándote tiempo cada día.
USER_PLUGIN_HOYOLAB_AUTOREDEEM_NAME: Redención Automática de Códigos
USER_PLUGIN_HOYOLAB_AUTOREDEEM_DESC: Redime automáticamente códigos de HoYoLAB para reclamar recompensas sin necesidad de entrada manual, simplificando el proceso de obtención de objetos y bonificaciones en el juego. (contenido adicional)
SUMERU_NAVIGATION_TITLE: Navega por el Mundo de Genshin
SUMERU_NAVIGATION_TEXT: Navega por el vasto mundo de Genshin Impact con la ayuda de nuestros Eruditos de Sumeru. Sus guías e ideas meticulosamente elaboradas cubren cada personaje, asegurando que siempre estés preparado para cualquier desafío que el juego te presente.
SUMERU_WHAT_ARE_TITLE: ¿Qué son los Eruditos de Sumeru?
SUMERU_WHAT_ARE_TEXT: Los Eruditos de Sumeru son los expertos de élite detrás de la teoría y estrategias de construcción de Genshin Wizard. Con su excepcional conocimiento y dedicación, aseguran que cada pieza de contenido cumpla con los más altos estándares de precisión y calidad.
SUMERU_TEAM_DEDICATION_TEXT: un equipo dedicado de editores expertos. Estos Eruditos trabajan incansablemente para ofrecer contenido que no solo sea informativo, sino también fiable y actualizado.
