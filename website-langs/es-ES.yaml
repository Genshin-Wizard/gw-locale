HOME_INFOGRAPHICS_SECTION_TITLE: Accede a cientos de infografías hermosas
HOME_INFOGRAPHICS_SECTION_TEXT: Desbloquea todo el potencial de tu viaje en Genshin Impact con las impresionantes infografías de Genshin Wizard. Nuestro bot ofrece visualizaciones perfectas que capturan cada detalle, asegurando que tus estadísticas de juego, construcciones de personajes y progreso se presenten con una claridad inigualable. Diseñadas para la velocidad, estas infografías se generan al instante, permitiéndote acceder a la información que necesitas sin demora. Ya sea que estés en escritorio o móvil, nuestras infografías accesibles están optimizadas para todos los dispositivos, facilitando más que nunca el seguimiento, la compartición y la exhibición de tus logros en Genshin Impact. Invita a Genshin Wizard hoy y experimenta la perfecta combinación de precisión, velocidad y accesibilidad.
HOME_ART_LAYOUTS_SECTION_TITLE: Elige tus preferencias
HOME_ART_LAYOUTS_SECTION_TEXT: Con Genshin Wizard, tienes la libertad de personalizar cómo se presentan visualmente tus construcciones, todo mientras mantienes la misma información de alta calidad. Nuestros diferentes diseños artísticos te permiten elegir un estilo que resuene con tu gusto personal. Ya sea que prefieras un diseño elegante y minimalista, un enfoque vibrante y artístico, o algo intermedio, hay un diseño que es perfecto para ti. Cada opción ofrece las mismas ideas detalladas sobre tus construcciones de personajes, pero con un toque visual único que hace que tu experiencia sea más agradable. ¡Descubre el diseño que mejor se adapte a tu estética y eleva cómo ves tus construcciones de Genshin Impact!
HOME_WISH_HISTORY_SECTION_TITLE: Jugando... con mucha más precisión
HOME_WISH_HISTORY_SECTION_TEXT: "Genshin Wizard lleva tu historial de deseos al siguiente nivel, ofreciendo herramientas poderosas para profundizar en tus tiradas y tendencias. Con una amplia gama de filtros, puedes personalizar fácilmente tu vista para enfocarte en los detalles específicos que más importan, ya sea rastreando tu suerte con 5 estrellas, revisando eventos pasados o analizando tiradas de armas frente a personajes. El bot presenta estos datos en infografías vívidas y bellamente diseñadas que no solo hacen que la información sea clara, sino también visualmente atractiva. Nuestras vistas organizadas aseguran que todo lo que necesitas esté justo donde lo esperas, haciendo que sea más fácil que nunca entender y compartir tu viaje en Genshin Impact. Con Genshin Wizard, tu historial de deseos es más que solo una lista: es una historia, contada a tu manera."
HOME_CHARACTER_GUIDES_SECTION_TITLE: Guías Detalladas de Personajes de Genshin
HOME_ABYSS_SECTION_TITLE: Conquista el Abismo Espiral
HOME_ABYSS_SECTION_TEXT: "Genshin Wizard te equipa con todo lo que necesitas para dominar el Abismo Espiral. Con solo unos pocos comandos, puedes acceder a información detallada sobre tus personajes, ayudándote a optimizar la composición de tu equipo para los desafíos actuales del Abismo. Mantente por delante del juego sabiendo exactamente qué esperar en cada piso del Abismo, con detalles actualizados sobre alineaciones de enemigos, potenciadores y debilitadores. Una vez que hayas luchado, visualiza y comparte fácilmente tus resultados con amigos: muestra tus mejores equipos, tiempos de finalización y estrategias que llevaron a tu victoria. Ya sea que estés planeando tu próxima carrera o celebrando tu último éxito, Genshin Wizard lo hace posible."
