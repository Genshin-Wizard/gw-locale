WISHES_IMPORT_INSTRUCTIONS_IMPORTANT: Antes de importar, es importante seguir estos pasos, de lo contrario, tu importación puede no sincronizarse como imaginabas. Dado que muchos servicios populares no almacenan el id único de un deseo, los deseos se añaden automáticamente al principio de tu historial de deseos existente.
WISHES_IMPORT_INSTRUCTIONS_SYNC_PREFIX: Por esta misma razón, antes de decidir importar, asegúrate de que tus deseos actuales hasta el día de hoy estén completamente sincronizados, puedes hacerlo utilizando el
WISHES_IMPORT_INSTRUCTIONS_SYNC_SUFFIX: comando a través de Genshin Wizard o visitando el
WISHES_IMPORT_INSTRUCTIONS_SYNC_END: página.
WISHES_IMPORT_INSTRUCTIONS_SOURCES: Para encontrar más sobre las fuentes de importación soportadas, consulta
WISHES_EXPORT_INSTRUCTIONS_MAIN: La función de exportación de Genshin Wizard permite a los usuarios guardar su historial de deseos en un formato CSV con un solo clic. Esta funcionalidad conveniente asegura que todos tus datos importantes, incluidos números de tiradas, conteos de pity, nombres de artículos y tipos de banner, estén almacenados de forma segura y sean fácilmente accesibles para su uso futuro.
WISHES_EXPORT_INSTRUCTIONS_USAGE: Ya sea que busques reimportar tus datos de nuevo en Genshin Wizard después de un reinicio o compartirlos con aplicaciones de terceros que soporten importaciones de Genshin Wizard, este archivo CSV proporciona una solución flexible y portátil. Con solo una simple descarga, tu historial de deseos se preserva y está listo para ser utilizado cuando y donde lo necesites.
WISHES_MANAGE_INSTRUCTIONS: Gestiona tu historial de deseos importado con facilidad. Puedes ver información detallada sobre tus datos importados, incluido el número de deseos importados y cualquier problema potencial que pueda haber ocurrido durante el proceso de importación.
