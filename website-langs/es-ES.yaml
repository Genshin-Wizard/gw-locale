USER_PLUGIN_WISHES_REGISTER_DESC: Lleva un registro de tu historial de deseos de gacha de Genshin Impact y analiza tu suerte con estadísticas e información detallada.
HOME_CHARACTER_ENDGAME_SECTION_TITLE: Domina Tu Final de Juego
HOME_CHARACTER_ENDGAME_SECTION_TEXT: Genshin Wizard te empodera para conquistar los desafíos más difíciles de Genshin Impact con precisión y estilo. Ya sea que estés avanzando a través de los pisos del Abismo Espiral, planeando para las reglas cambiantes del Teatro Imaginario, o sobreviviendo a las implacables oleadas de Asalto Estigio, te tenemos cubierto. Rastrear tu progreso en todos los modos de final de juego es fácil con infografías bellamente elaboradas que hacen que tus logros brillen. Analiza el rendimiento de tu equipo, los tiempos de finalización, la progresión de pisos y más, presentados en visuales limpios y compartibles. Tus estadísticas de Genshin nunca han lucido tan bien.
