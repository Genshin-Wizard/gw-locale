TEAM_FOUNDER_TITLE: Fundador y Desarrollador Principal
TEAM_FOUNDER_DESCRIPTION: El visionario detrás de Genshin Wizard, hatter se encarga de todo, desde el desarrollo del bot hasta la creación del sitio web, gestión de infraestructura, mejoras del bot/desarrollo de características y compromiso con la comunidad. Con una pasión por Genshin Impact y la tecnología, hatter ha construido Genshin Wizard desde cero para servir a cientos de miles de jugadores en todo el mundo.
