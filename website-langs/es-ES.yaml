ABOUT_STORY_TITLE: Nuestra Historia
ABOUT_STORY_TEXT: Genshin Wizard comenzó como un simple script de seguimiento de deseos en febrero de 2021. A lo largo de los años, ha evolucionado hasta convertirse en un bot de Discord multi-utilidad integral, sirviendo a más de 80,000 servidores y 130,000 usuarios registrados a partir de julio de 2025. Nuestra misión es proporcionar las mejores herramientas, guías y características para la comunidad de Genshin Impact.
