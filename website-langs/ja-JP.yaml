WISHES_EXPORT_INSTRUCTIONS_MAIN: "Genshin Wizard のエクスポート機能を使用すると、ユーザーはワンクリックで願いの履歴を CSV 形式で簡単に保存できます。この便利な機能により、ロール番号、ピティカウント、アイテム名、バナータイプなど、すべての重要なデータが安全に保存され、将来の使用のために簡単にアクセスできます。"
WISHES_EXPORT_INSTRUCTIONS_USAGE: "リセット後にデータを Genshin Wizard に再インポートするか、Genshin Wizard のインポートをサポートするサードパーティアプリケーションと共有する場合、この CSV ファイルは柔軟でポータブルなソリューションを提供します。シンプルなダウンロードで、あなたの願いの履歴が保存され、いつでもどこでも使用できる準備が整います。"
WISHES_MANAGE_INSTRUCTIONS: "インポートした願いの履歴を簡単に管理します。インポートしたデータの詳細情報を表示でき、インポートプロセス中に発生した可能性のある問題も確認できます。"
