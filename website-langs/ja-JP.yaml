USER_PLUGIN_PROFILE_NAME: Genshin Wizardプロフィール
USER_PLUGIN_PROFILE_DESC: 表示設定やビジュアルカスタマイズを含むGenshin Wizardプロフィール設定を調整します。他のユーザーに目立つようにプロフィールにフレアを追加しましょう。
USER_PLUGIN_ART_NAME: インフォグラフィックをカスタマイズ
USER_PLUGIN_ART_DESC: さまざまな色、フォント、レイアウトから選択してインフォグラフィックをパーソナライズします。あなたの美学や好みに合わせて調整しましょう。
USER_PLUGIN_PRIVACY_NAME: プライバシー設定
USER_PLUGIN_PRIVACY_DESC: プライバシー設定を管理し、誰があなたのデータを閲覧できるか、他の人とどれだけの情報を共有したいかを制御します。
USER_PLUGIN_WISHES_REFRESH_NAME: 願いの履歴を更新
USER_PLUGIN_WISHES_REFRESH_DESC: 願いの履歴を更新して、過去の引きの最新データを確保し、最近のバナーを追跡できるようにします。
USER_PLUGIN_WISHES_STATS_NAME: 願いの統計を表示
USER_PLUGIN_WISHES_STATS_DESC: 引きの確率、ピティカウント、5つ星のドロップ確率を含む願いの統計を詳細に分析し、運とトレンドを追跡します。
USER_PLUGIN_WISHES_HISTORY_NAME: 願いの履歴を表示
USER_PLUGIN_WISHES_HISTORY_DESC: すべてのバナーで行った各引きを表示する完全な願いの履歴にアクセスし、ゲーム内の進行状況を整理された記録として保持します。
USER_PLUGIN_WISHES_IMPORT_NAME: 願いの履歴をインポート/エクスポート
USER_PLUGIN_WISHES_IMPORT_DESC: 願いの履歴データをシームレスにインポートまたはエクスポートして、他の人と共有したり、異なるデバイス間で転送したりして、引きを追跡し続けることができます。
USER_PLUGIN_HOYOLAB_REGISTER_NAME: HoYoLABアカウントを登録
USER_PLUGIN_HOYOLAB_REGISTER_DESC: HoYoLABアカウントをリンクして、願いの履歴の同期、特別イベントへのアクセス、報酬の獲得をより簡単にする追加機能をアンロックします。
USER_PLUGIN_HOYOLAB_AUTOCLAIM_NAME: デイリー自動受取報酬
USER_PLUGIN_HOYOLAB_AUTOCLAIM_DESC: プレミアムデイリー自動受取機能を有効にして、手動でログインすることなくHoYoLABの報酬を自動的に受け取ることができ、毎日時間を節約します。
USER_PLUGIN_HOYOLAB_AUTOREDEEM_NAME: 自動コード引換
USER_PLUGIN_HOYOLAB_AUTOREDEEM_DESC: 手動入力なしでHoYoLABからコードを自動的に引き換え、ゲーム内アイテムやボーナスを取得するプロセスを簡素化します。(追加コンテンツ)
SUMERU_NAVIGATION_TITLE: 原神の世界をナビゲート
SUMERU_NAVIGATION_TEXT: 私たちのスメールの学者の助けを借りて、原神の広大な世界をナビゲートしましょう。彼らが丹念に作成したガイドと洞察は、すべてのキャラクターをカバーしており、ゲームが投げかけるどんな挑戦にも常に備えられるようにします。
SUMERU_WHAT_ARE_TITLE: スメールの学者とは？
SUMERU_WHAT_ARE_TEXT: スメールの学者は、Genshin Wizardの理論構築、編集、ビルド戦略の背後にいるエリート専門家です。彼らの卓越した知識と献身により、すべてのコンテンツが最高の精度と品質の基準を満たすことを保証します。
SUMERU_TEAM_DEDICATION_TEXT: 専門の編集者からなる献身的なチームです。これらの学者は、情報提供だけでなく、信頼性が高く最新のコンテンツを提供するために懸命に働いています。
SUMERU_MEET_SCHOLARS_TITLE: 私たちのスメールの学者に会いましょう
SUMERU_WHO_ARE_WE_TITLE: 私たちは誰ですか？
