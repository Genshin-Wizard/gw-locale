HOME_CHARACTER_ENDGAME_SECTION_TITLE: エンドゲームをマスターしよう
HOME_CHARACTER_ENDGAME_SECTION_TEXT: Genshin Wizardは、Genshin Impactの最も厳しい挑戦を精度とスタイルで克服する力を与えます。スパイラルアビスのフロアを進むとき、イマジナリウムシアターの変わるルールに戦略を立てるとき、またはスタイジアンオンズローの容赦ない波を生き延びるとき、私たちはあなたをサポートします。美しく作られたインフォグラフィックで、すべてのエンドゲームモードでの進捗を簡単に追跡し、あなたの成果を際立たせます。チームのパフォーマンス、完了時間、フロアの進行状況などを分析し、クリーンで共有可能なビジュアルで提示します。あなたのGenshin統計は、これまでにないほど素晴らしく見えます。
