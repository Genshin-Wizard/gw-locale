FAQ_TITLE: よくある質問
FAQ_DESCRIPTION: まだ質問がありますか？ Genshin Wizard Premium に関する一般的な質問の回答は、FAQ セクションをご覧ください。
FAQ_WHAT_IS_PREMIUM_Q: Genshin Wizard Premium とは何ですか？
FAQ_WHAT_IS_PREMIUM_A: Genshin Wizard Premium は、独自の機能、優先サポート、および Genshin の体験を向上させるための追加の特典を提供するサブスクリプションサービスです。
FAQ_HOW_TO_SUBSCRIBE_Q: Genshin Wizard Premium にどうやってサブスクライブしますか？
FAQ_HOW_TO_SUBSCRIBE_A: 私たちのウェブサイトを通じて Genshin Wizard Premium にサブスクライブできます。あなたに合ったプランを選択し、指示に従ってサブスクリプションを完了してください。
FAQ_PAYMENT_METHODS_Q: どの支払い方法が受け付けられていますか？
FAQ_PAYMENT_METHODS_A: クレジット/デビットカードや PayPal など、さまざまな支払い方法を受け付けています。詳細については、私たちの支払いページをご確認ください。
FAQ_CAN_CANCEL_Q: いつでもサブスクリプションをキャンセルできますか？
FAQ_CAN_CANCEL_A: はい、アカウント設定を通じていつでもサブスクリプションをキャンセルできます。現在の請求サイクルの終了までアクセスは有効です。
FAQ_WHAT_HAPPENS_CANCEL_Q: サブスクリプションをキャンセルした場合はどうなりますか？
FAQ_WHAT_HAPPENS_CANCEL_A: サブスクリプションをキャンセルすると、現在の請求サイクルの終了時にプレミアム機能へのアクセスを失います。Genshin Wizard の無料版は引き続き使用できます。
FAQ_FREE_TRIAL_Q: 無料トライアルはありますか？
FAQ_FREE_TRIAL_A: 現在、Genshin Wizard Premium の無料トライアルは提供していません。ただし、ボットの機能を確認するために無料版を探索できます。
FAQ_CONTACT_SUPPORT_Q: プレミアム関連の問題についてサポートに連絡するにはどうすればよいですか？
FAQ_CONTACT_SUPPORT_A: 私たちのウェブサイトのサポートページを通じてサポートチームに連絡できます。プレミアムサブスクリプションに関連する問題についてお手伝いします。
