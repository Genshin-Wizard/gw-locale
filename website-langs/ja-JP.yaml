WISHES_IMPORT_INSTRUCTIONS_IMPORTANT: "インポートする前に、これらの手順に従うことが重要です。そうしないと、インポートが思った通りに同期されない可能性があります。多くの人気サービスは願いのユニークIDを保存しないため、願いは既存の願いの履歴の先頭に自動的に追加されます。"
WISHES_IMPORT_INSTRUCTIONS_SYNC_PREFIX: "この理由から、インポートを決定する前に、現在の願いが現在の日付まで完全に同期されていることを確認してください。これを行うには、"
