SUMERU_SCHOLARS_SUBTITLE: "スメールの学者たち：Genshinの洞察の達人"
SUMERU_SCHOLARS_TEXT: 比類のない専門知識と戦略的ガイダンスであなたの旅を支援します。
SUMERU_KNOWLEDGE_TITLE: 深い知識
SUMERU_KNOWLEDGE_TEXT: 私たちのスメールの学者の専門知識を使って、原神の秘密を解き明かしましょう。これらの専門家は、キャラクタービルド、プレイスタイル、ゲームメカニクスに関する比類のない知識を持ち、ゲームのあらゆる側面をマスターするためのガイダンスを提供します。
SUMERU_THEORYCRAFTING_TITLE: 専門的な理論構築
SUMERU_THEORYCRAFTING_TEXT: 私たちのスメールの学者は、Genshin Wizardの理論構築の最前線にいます。彼らの分析スキルとゲームのダイナミクスに対する深い理解を持って、プレイヤーに必要な競争力を提供する戦略を構築します。
SUMERU_WHO_ARE_WE_DETAILED_TEXT_1: スメールの学者は、Genshin Wizardの理論構築、編集、ビルド戦略の背後にいるエリート専門家です。原神に対する深い理解から選ばれたこれらの専門家は、キャラクタービルド、プレイスタイル、ゲームメカニクスの詳細を誰よりもよく知っています。彼らの比類のない専門知識はコミュニティにとって非常に貴重であり、プレイヤーがゲームのあらゆる側面をマスターする手助けをします。
SUMERU_WHO_ARE_WE_DETAILED_TEXT_2: 原神に情熱を持ち、知識を共有したいですか？Genshin Wizardは、名誉あるスメールの学者社会に参加するためのスキルを持った個人を常に探しています。このエリートグループの一員となり、原神の戦略の未来を形作る手助けをしましょう。
SUMERU_DETAILED_GUIDES_TITLE: 詳細な原神キャラクターガイド
SUMERU_DETAILED_GUIDES_TEXT: 私たちの丹念に作成されたガイドを使って、原神のキャラクターの潜在能力を最大限に引き出しましょう。これは「スメールの学者」によって提供されるもので、専門の編集者からなる献身的なチームが手がけています。これらのガイドは、すべてのキャラクターに関する最も正確で最新の情報を提供するために手作りされており、常に最良の戦略を手元に持つことができます。最適なチームシナジー、詳細なプレイスタイルの推奨、または昇進素材、星座の詳細、スキルやパッシブ才能のクイックリファレンスが必要な場合でも、Genshin Wizardがサポートします。この重要な情報に簡単にアクセスできることで、あなたのキャラクターをあらゆる冒険で偉大に導く準備が整います。スメールの学者にあなたの旅を正確さと専門知識で導いてもらいましょう。
