ABOUT_STORY_TEXT: Genshin Wizardは2021年2月にシンプルな願い追跡スクリプトとして始まりました。年月が経つにつれて、80,000以上のサーバーと130,000人の登録ユーザーにサービスを提供する包括的な多機能Discordボットに進化しました。私たちの使命は、Genshin Impactコミュニティのために最高のツール、ガイド、機能を提供することです。
