SUMERU_SCHOLARS_SUBTITLE: "Savant de Sumeru : Maîtres de l'Insight Genshin"
SUMERU_SCHOLARS_TEXT: Renforcez votre parcours avec une expertise inégalée et des conseils stratégiques.
SUMERU_KNOWLEDGE_TITLE: Connaissance Approfondie
SUMERU_KNOWLEDGE_TEXT: Déverrouillez les secrets de Genshin Impact avec l'expertise de nos Sages de Sumeru. Ces spécialistes possèdent une connaissance inégalée des constructions de personnages, des styles de jeu et des mécaniques du jeu, vous guidant pour maîtriser chaque aspect du jeu.
SUMERU_THEORYCRAFTING_TITLE: Théorie de l'Expert
SUMERU_THEORYCRAFTING_TEXT: Nos Sages de Sumeru sont à l'avant-garde de la théorie de Genshin Wizard. Avec leurs compétences analytiques et leur compréhension approfondie des dynamiques du jeu, ils élaborent des stratégies qui donnent aux joueurs l'avantage compétitif dont ils ont besoin.
SUMERU_WHO_ARE_WE_DETAILED_TEXT_1: Les Sages de Sumeru sont les experts d'élite derrière la théorie de Genshin Wizard, l'édition et les stratégies de construction. Choisis pour leur compréhension approfondie de Genshin Impact, ces spécialistes connaissent les tenants et aboutissants des constructions de personnages, des styles de jeu et des mécaniques du jeu comme personne d'autre. Leur expertise inégalée les rend inestimables pour la communauté, guidant les joueurs pour maîtriser chaque aspect du jeu.
SUMERU_WHO_ARE_WE_DETAILED_TEXT_2: Êtes-vous passionné par Genshin Impact et désireux de partager vos connaissances ? Genshin Wizard est toujours à la recherche d'individus compétents pour rejoindre la prestigieuse société des Sages de Sumeru. Devenez membre de ce groupe d'élite et aidez à façonner l'avenir de la stratégie de Genshin Impact.
SUMERU_DETAILED_GUIDES_TITLE: Guides Détaillés des Personnages de Genshin
SUMERU_DETAILED_GUIDES_TEXT: Déverrouillez le plein potentiel de vos personnages de Genshin Impact avec nos guides méticuleusement détaillés, offerts par les "Sages de Sumeru"—une équipe dédiée d'éditeurs experts. Ces guides sont soigneusement élaborés pour vous fournir les informations les plus précises et à jour sur chaque personnage, garantissant que vous ayez toujours les meilleures stratégies à portée de main. Que vous recherchiez des synergies d'équipe optimales, des recommandations de style de jeu approfondies, ou que vous ayez simplement besoin d'une référence rapide pour les matériaux d'ascension, les détails de constellation ou les talents de compétence et passifs, Genshin Wizard est là pour vous. Avec un accès facile à toutes ces informations essentielles, vous serez prêt à mener vos personnages vers la grandeur dans chaque aventure. Faites confiance aux Sages de Sumeru pour guider votre voyage avec précision et expertise.
