TEAM_FOUNDER_DESCRIPTION: "Le visionnaire derrière Genshin Wizard, hatter gère tout, du développement du bot à la création du site web, la gestion de l'infrastructure, les améliorations du bot/développement de fonctionnalités, et l'engagement communautaire. Avec une passion pour Genshin Impact et la technologie, hatter a construit Genshin Wizard de A à Z pour servir des centaines de milliers de joueurs dans le monde entier."
