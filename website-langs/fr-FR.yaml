USER_PLUGIN_PROFILE_NAME: Profil Genshin Wizard
USER_PLUGIN_PROFILE_DESC: Ajustez les paramètres de votre profil Genshin Wizard, y compris les préférences d'affichage et les personnalisations visuelles. Ajoutez du style à votre profil pour le faire ressortir auprès des autres utilisateurs.
USER_PLUGIN_ART_NAME: Personnaliser les Infographies
USER_PLUGIN_ART_DESC: Personnalisez vos infographies en choisissant parmi une variété de couleurs, de polices et de mises en page. Adaptez-les à votre esthétique et à vos préférences.
USER_PLUGIN_PRIVACY_NAME: Paramètres de Confidentialité
USER_PLUGIN_PRIVACY_DESC: Gérez et contrôlez vos paramètres de confidentialité, y compris qui peut voir vos données et combien d'informations vous souhaitez partager avec les autres.
USER_PLUGIN_WISHES_REFRESH_NAME: Rafraîchir l'Histoire des Vœux
USER_PLUGIN_WISHES_REFRESH_DESC: Rafraîchissez votre histoire de vœux pour vous assurer d'avoir les dernières données sur vos tirages passés, vous permettant de suivre les bannières les plus récentes.
USER_PLUGIN_WISHES_STATS_NAME: Voir les Statistiques des Vœux
USER_PLUGIN_WISHES_STATS_DESC: Analysez vos statistiques de vœux en détail, y compris les taux de tirage, les comptes de malchance et les chances de drop de 5 étoiles, pour suivre votre chance et vos tendances au fil du temps.
USER_PLUGIN_WISHES_HISTORY_NAME: Voir l'Histoire des Vœux
USER_PLUGIN_WISHES_HISTORY_DESC: Accédez à votre histoire complète de vœux, affichant chaque tirage effectué sur toutes les bannières, vous aidant à garder un enregistrement organisé de vos progrès dans le jeu.
USER_PLUGIN_WISHES_IMPORT_NAME: Importer/Exporter l'Histoire des Vœux
USER_PLUGIN_WISHES_IMPORT_DESC: Importez ou exportez facilement vos données d'histoire de vœux pour les partager avec d'autres ou transférer entre différents appareils, vous assurant de ne jamais perdre la trace de vos tirages.
USER_PLUGIN_HOYOLAB_REGISTER_NAME: Enregistrer un Compte HoYoLAB
USER_PLUGIN_HOYOLAB_REGISTER_DESC: Liez votre compte HoYoLAB pour débloquer des fonctionnalités supplémentaires, telles que la synchronisation de l'histoire des vœux, l'accès à des événements spéciaux et la réclamation de récompenses plus facilement.
USER_PLUGIN_HOYOLAB_AUTOCLAIM_NAME: Récompenses Quotidiennes Automatiques
USER_PLUGIN_HOYOLAB_AUTOCLAIM_DESC: Activez la fonction premium de réclamation automatique quotidienne pour collecter automatiquement vos récompenses HoYoLAB sans avoir besoin de vous connecter manuellement, vous faisant gagner du temps chaque jour.
USER_PLUGIN_HOYOLAB_AUTOREDEEM_NAME: Récupération Automatique de Codes
USER_PLUGIN_HOYOLAB_AUTOREDEEM_DESC: Récupérez automatiquement les codes de HoYoLAB pour réclamer des récompenses sans saisie manuelle, simplifiant le processus d'obtention d'objets et de bonus dans le jeu. (contenu supplémentaire)
SUMERU_NAVIGATION_TITLE: Naviguer dans le Monde de Genshin
SUMERU_NAVIGATION_TEXT: Naviguez dans le vaste monde de Genshin Impact avec l'aide de nos Sages de Sumeru. Leurs guides et insights méticuleusement élaborés couvrent chaque personnage, garantissant que vous êtes toujours prêt pour n'importe quel défi que le jeu vous lance.
SUMERU_WHAT_ARE_TITLE: Qui sont les Sages de Sumeru ?
SUMERU_WHAT_ARE_TEXT: Les Sages de Sumeru sont les experts d'élite derrière la théorie de Genshin Wizard, l'édition et les stratégies de construction. Avec leur connaissance exceptionnelle et leur dévouement, ils s'assurent que chaque contenu respecte les normes les plus élevées d'exactitude et de qualité.
SUMERU_TEAM_DEDICATION_TEXT: une équipe dédiée d'éditeurs experts. Ces Sages travaillent sans relâche pour fournir un contenu qui est non seulement informatif mais aussi fiable et à jour.
