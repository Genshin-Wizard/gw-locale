FAQ_TITLE: Questions fréquemment posées
FAQ_DESCRIPTION: Vous avez encore des questions ? Consultez notre section FAQ pour des réponses aux questions courantes sur Genshin Wizard Premium.
FAQ_WHAT_IS_PREMIUM_Q: Qu'est-ce que Genshin Wizard Premium ?
FAQ_WHAT_IS_PREMIUM_A: Genshin Wizard Premium est un service d'abonnement qui offre des fonctionnalités exclusives, un support prioritaire et des avantages supplémentaires pour améliorer votre expérience dans Genshin.
FAQ_HOW_TO_SUBSCRIBE_Q: Comment puis-je m'abonner à Genshin Wizard Premium ?
FAQ_HOW_TO_SUBSCRIBE_A: Vous pouvez vous abonner à Genshin Wizard Premium via notre site web. Choisissez un plan qui vous convient et suivez les instructions pour finaliser votre abonnement.
FAQ_PAYMENT_METHODS_Q: Quels modes de paiement sont acceptés ?
FAQ_PAYMENT_METHODS_A: Nous acceptons divers modes de paiement, y compris les cartes de crédit/débit et PayPal. Veuillez consulter notre page de paiement pour plus de détails.
FAQ_CAN_CANCEL_Q: Puis-je annuler mon abonnement à tout moment ?
FAQ_CAN_CANCEL_A: Oui, vous pouvez annuler votre abonnement à tout moment via les paramètres de votre compte. Votre accès restera actif jusqu'à la fin du cycle de facturation en cours.
FAQ_WHAT_HAPPENS_CANCEL_Q: Que se passe-t-il si j'annule mon abonnement ?
FAQ_WHAT_HAPPENS_CANCEL_A: Si vous annulez votre abonnement, vous perdrez l'accès aux fonctionnalités premium à la fin de votre cycle de facturation actuel. Vous pouvez toujours utiliser la version gratuite de Genshin Wizard.
FAQ_FREE_TRIAL_Q: Y a-t-il un essai gratuit disponible ?
FAQ_FREE_TRIAL_A: Actuellement, nous n'offrons pas d'essai gratuit pour Genshin Wizard Premium. Cependant, vous pouvez explorer la version gratuite du bot pour voir ses capacités.
