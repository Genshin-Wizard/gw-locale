WISHES_IMPORT_INSTRUCTIONS_IMPORTANT: "Avant d'importer, il est important de suivre ces étapes, sinon votre importation peut ne pas se synchroniser comme vous l'aviez imaginé. Étant donné que de nombreux services populaires ne stockent pas l'identifiant unique d'un souhait, les souhaits sont automatiquement ajoutés au début de votre historique de souhaits existant."
WISHES_IMPORT_INSTRUCTIONS_SYNC_PREFIX: "Pour cette raison, avant de décider d'importer, assurez-vous que vos souhaits actuels jusqu'à ce jour sont complètement synchronisés, vous pouvez le faire en utilisant le"
WISHES_IMPORT_INSTRUCTIONS_SYNC_SUFFIX: "commande via Genshin Wizard ou en visitant le"
WISHES_IMPORT_INSTRUCTIONS_SYNC_END: "page."
WISHES_IMPORT_INSTRUCTIONS_SOURCES: "Pour en savoir plus sur les sources d'importation prises en charge, consultez"
WISHES_EXPORT_INSTRUCTIONS_MAIN: "La fonctionnalité d'exportation de Genshin Wizard permet aux utilisateurs de sauvegarder facilement leur historique de souhaits au format CSV d'un simple clic. Cette fonctionnalité pratique garantit que toutes vos données importantes, y compris les numéros de tirage, les comptes de pitié, les noms d'objets et les types de bannières, sont stockées en toute sécurité et facilement accessibles pour une utilisation future."
WISHES_EXPORT_INSTRUCTIONS_USAGE: "Que vous souhaitiez réimporter vos données dans Genshin Wizard après une réinitialisation ou les partager avec des applications tierces qui prennent en charge les importations de Genshin Wizard, ce fichier CSV fournit une solution flexible et portable. Avec un simple téléchargement, votre historique de souhaits est préservé et prêt à être utilisé quand et où vous en avez besoin."
WISHES_MANAGE_INSTRUCTIONS: "Gérez votre historique de souhaits importé avec facilité. Vous pouvez consulter des informations détaillées sur vos données importées, y compris le nombre de souhaits importés et tout problème potentiel qui pourrait survenir pendant le processus d'importation."
