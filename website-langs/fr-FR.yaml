ABOUT_STORY_TITLE: Notre histoire
ABOUT_STORY_TEXT: Genshin Wizard a commencé comme un simple script de suivi de souhaits en février 2021. Au fil des ans, il a évolué en un bot Discord multi-usage complet, servant plus de 80 000 serveurs et 130 000 utilisateurs enregistrés en juillet 2025. Notre mission est de fournir les meilleurs outils, guides et fonctionnalités pour la communauté de Genshin Impact.
