USER_PLUGIN_WISHES_REGISTER_DESC: Suivez votre historique de souhaits gacha de Genshin Impact et analysez votre chance avec des statistiques et des insights détaillés.
HOME_CHARACTER_ENDGAME_SECTION_TITLE: Maîtrisez votre fin de jeu
HOME_CHARACTER_ENDGAME_SECTION_TEXT: Genshin Wizard vous permet de conquérir les défis les plus difficiles de Genshin Impact avec précision et style. Que vous soyez en train de progresser à travers les étages de la Spirale Abyss, de planifier pour les règles changeantes du Théâtre Imaginarium, ou de survivre aux vagues implacables de l'Assaut Stygien, nous sommes là pour vous aider. Suivez sans effort vos progrès dans tous les modes de fin de jeu avec des infographies magnifiquement conçues qui mettent en valeur vos réalisations. Analysez la performance de votre équipe, les temps de complétion, la progression des étages, et plus encore—présentés dans des visuels clairs et partageables. Vos statistiques Genshin n'ont jamais été aussi belles.
