USER_PLUGIN_WISHES_REGISTER_DESC: Tieni traccia della tua storia dei desideri gacha di Genshin Impact e analizza la tua fortuna con statistiche e approfondimenti dettagliati.
HOME_CHARACTER_ENDGAME_SECTION_TITLE: Padroneggia il Tuo Endgame
HOME_CHARACTER_ENDGAME_SECTION_TEXT: Genshin Wizard ti permette di affrontare le sfide più difficili di Genshin Impact con precisione e stile. Che tu stia affrontando i piani dell'Abyss Spirale, strategizzando per le regole in continua evoluzione del Teatro Imaginarium, o sopravvivendo alle ondate incessanti dell'Assalto Stigiano, siamo qui per te. Tieni traccia del tuo progresso in tutti i modi endgame con infografiche splendidamente realizzate che fanno brillare i tuoi successi. Analizza le prestazioni del tuo team, i tempi di completamento, il progresso nei piani e altro ancora—presentato in visualizzazioni pulite e condivisibili. Le tue statistiche di Genshin non sono mai state così belle.
