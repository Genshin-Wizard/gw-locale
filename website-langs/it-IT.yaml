ABOUT_STORY_TITLE: La Nostra Storia
ABOUT_STORY_TEXT: Genshin Wizard è iniziato come un semplice script per il tracciamento dei desideri nel febbraio 2021. Nel corso degli anni, si è evoluto in un bot Discord multi-utilità completo, servendo oltre 80.000 server e 130.000 utenti registrati a luglio 2025. La nostra missione è fornire i migliori strumenti, guide e funzionalità per la comunità di Genshin Impact.
