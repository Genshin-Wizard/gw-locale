SUMERU_NAVIGATION_TEXT: Naviga nel vasto mondo di Genshin Impact con l'aiuto dei nostri Studiosi di Sumeru. Le loro guide e intuizioni meticolosamente curate coprono ogni personaggio, assicurandoti di essere sempre pronto per qualsiasi sfida che il gioco ti presenta.
