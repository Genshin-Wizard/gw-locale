SUMERU_SCHOLARS_SUBTITLE: "Sumeru Scholars: Maestri dell'Insight di Genshin"
SUMERU_SCHOLARS_TEXT: Potenzia il Tuo Viaggio con Esperienza Incomparabile e Guida Strategica.
SUMERU_KNOWLEDGE_TITLE: Conoscenza Approfondita
SUMERU_KNOWLEDGE_TEXT: Svela i segreti di Genshin Impact con l'esperienza dei nostri Studiosi di Sumeru. Questi specialisti possiedono una conoscenza senza pari delle build dei personaggi, degli stili di gioco e delle meccaniche di gioco, guidandoti a padroneggiare ogni aspetto del gioco.
SUMERU_THEORYCRAFTING_TITLE: Teoria Esperta
SUMERU_THEORYCRAFTING_TEXT: I nostri Studiosi di Sumeru sono all'avanguardia nella teoria di Genshin Wizard. Con le loro capacità analitiche e una profonda comprensione delle dinamiche di gioco, creano strategie che danno ai giocatori il vantaggio competitivo di cui hanno bisogno.
SUMERU_WHO_ARE_WE_DETAILED_TEXT_1: Gli Studiosi di Sumeru sono gli esperti d'élite dietro la teoria, l'editing e le strategie di build di Genshin Wizard. Selezionati per la loro profonda comprensione di Genshin Impact, questi specialisti conoscono a menadito le build dei personaggi, gli stili di gioco e le meccaniche di gioco come nessun altro. La loro esperienza senza pari li rende inestimabili per la comunità, guidando i giocatori a padroneggiare ogni aspetto del gioco.
SUMERU_WHO_ARE_WE_DETAILED_TEXT_2: Sei appassionato di Genshin Impact e desideroso di condividere la tua conoscenza? Genshin Wizard è sempre alla ricerca di individui esperti per unirsi alla prestigiosa società degli Studiosi di Sumeru. Diventa parte di questo gruppo d'élite e aiuta a plasmare il futuro della strategia di Genshin Impact.
SUMERU_DETAILED_GUIDES_TITLE: Guide Dettagliate sui Personaggi di Genshin
SUMERU_DETAILED_GUIDES_TEXT: Sblocca il pieno potenziale dei tuoi personaggi di Genshin Impact con le nostre guide meticolosamente dettagliate, portate a te dai "Sumeru Scholars"—un team dedicato di editor esperti. Queste guide sono realizzate a mano per fornirti le informazioni più accurate e aggiornate su ogni personaggio, assicurandoti di avere sempre le migliori strategie a portata di mano. Che tu stia cercando sinergie ottimali tra i membri del team, raccomandazioni approfondite sullo stile di gioco, o semplicemente un riferimento veloce per i materiali di ascensione, i dettagli delle costellazioni o i talenti e le abilità passive, Genshin Wizard ha tutto ciò di cui hai bisogno. Con un facile accesso a tutte queste informazioni essenziali, sarai pronto a guidare i tuoi personaggi verso la grandezza in ogni avventura. Fai fiducia ai Sumeru Scholars per guidare il tuo viaggio con precisione ed esperienza.
