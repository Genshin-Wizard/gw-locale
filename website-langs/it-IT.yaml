TEAM_FOUNDER_DESCRIPTION: "Il visionario dietro Genshin Wizard, hatter si occupa di tutto, dallo sviluppo del bot alla creazione del sito web, gestione dell'infrastruttura, miglioramenti del bot/sviluppo di funzionalità e coinvolgimento della comunità. Con una passione per Genshin Impact e la tecnologia, hatter ha costruito Genshin Wizard da zero per servire centinaia di migliaia di giocatori in tutto il mondo."
