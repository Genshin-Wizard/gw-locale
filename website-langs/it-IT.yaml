WISHES_IMPORT_INSTRUCTIONS_IMPORTANT: "Prima di importare, è importante seguire questi passaggi, altrimenti la tua importazione potrebbe non sincronizzarsi come immaginavi. Poiché molti servizi popolari non memorizzano l'id unico di un desiderio, i desideri vengono automaticamente aggiunti all'inizio della tua cronologia desideri preesistente."
WISHES_IMPORT_INSTRUCTIONS_SYNC_PREFIX: "Per questo motivo, prima di decidere di importare, assicurati che i tuoi desideri attuali fino ad oggi siano completamente sincronizzati, puoi farlo utilizzando il"
WISHES_IMPORT_INSTRUCTIONS_SYNC_SUFFIX: "comando tramite Genshin Wizard o visitando il"
WISHES_IMPORT_INSTRUCTIONS_SYNC_END: "pagina."
WISHES_IMPORT_INSTRUCTIONS_SOURCES: "Per scoprire di più sulle fonti di importazione supportate, dai un'occhiata a"
WISHES_EXPORT_INSTRUCTIONS_MAIN: "La funzione di esportazione di Genshin Wizard consente agli utenti di salvare senza sforzo la propria cronologia desideri in formato CSV con un solo clic. Questa funzionalità conveniente garantisce che tutti i tuoi dati importanti, inclusi i numeri di roll, i conteggi di sfortuna, i nomi degli oggetti e i tipi di banner, siano memorizzati in modo sicuro e facilmente accessibili per un uso futuro."
WISHES_EXPORT_INSTRUCTIONS_USAGE: "Che tu stia cercando di re-importare i tuoi dati in Genshin Wizard dopo un reset o di condividerli con applicazioni di terze parti che supportano le importazioni di Genshin Wizard, questo file CSV fornisce una soluzione flessibile e portatile. Con un semplice download, la tua cronologia desideri è preservata e pronta per essere utilizzata ogni volta e ovunque ne hai bisogno."
WISHES_MANAGE_INSTRUCTIONS: "Gestisci la tua cronologia desideri importata con facilità. Puoi visualizzare informazioni dettagliate sui tuoi dati importati, inclusi il numero di desideri importati e eventuali problemi che potrebbero essersi verificati durante il processo di importazione."
