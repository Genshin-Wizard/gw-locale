USER_PLUGIN_PROFILE_NAME: Profilo di Genshin Wizard
USER_PLUGIN_PROFILE_DESC: Regola le impostazioni del tuo profilo Genshin Wizard, comprese le preferenze di visualizzazione e le personalizzazioni visive. Aggiungi un tocco al tuo profilo per farlo risaltare agli altri utenti.
USER_PLUGIN_ART_NAME: Personalizza Infografiche
USER_PLUGIN_ART_DESC: Personalizza le tue infografiche scegliendo tra una varietà di colori, font e layout. Adattale al tuo stile e alle tue preferenze.
USER_PLUGIN_PRIVACY_NAME: Impostazioni sulla Privacy
USER_PLUGIN_PRIVACY_DESC: Gestisci e controlla le tue impostazioni sulla privacy, inclusi chi può visualizzare i tuoi dati e quante informazioni desideri condividere con gli altri.
USER_PLUGIN_WISHES_REFRESH_NAME: Aggiorna Storia dei Desideri
USER_PLUGIN_WISHES_REFRESH_DESC: Aggiorna la tua storia dei desideri per assicurarti di avere i dati più recenti sui tuoi tiri passati, permettendoti di tenere traccia dei banner più recenti.
USER_PLUGIN_WISHES_STATS_NAME: Visualizza Statistiche dei Desideri
USER_PLUGIN_WISHES_STATS_DESC: Analizza le tue statistiche sui desideri in dettaglio, inclusi tassi di tiro, conteggi di pietà e probabilità di drop da 5 stelle, per tenere traccia della tua fortuna e delle tendenze nel tempo.
USER_PLUGIN_WISHES_HISTORY_NAME: Visualizza Storia dei Desideri
USER_PLUGIN_WISHES_HISTORY_DESC: Accedi alla tua storia completa dei desideri, visualizzando ogni tiro effettuato su tutti i banner, aiutandoti a mantenere un registro organizzato dei tuoi progressi nel gioco.
USER_PLUGIN_WISHES_IMPORT_NAME: Importa/Esporta Storia dei Desideri
USER_PLUGIN_WISHES_IMPORT_DESC: Importa o esporta senza problemi i dati della tua storia dei desideri per condividerli con altri o trasferirli tra diversi dispositivi, assicurandoti di non perdere mai traccia dei tuoi tiri.
USER_PLUGIN_HOYOLAB_REGISTER_NAME: Registrati per un Account HoYoLAB
USER_PLUGIN_HOYOLAB_REGISTER_DESC: Collega il tuo account HoYoLAB per sbloccare funzionalità aggiuntive, come la sincronizzazione della storia dei desideri, l'accesso a eventi speciali e la richiesta di ricompense più facilmente.
USER_PLUGIN_HOYOLAB_AUTOCLAIM_NAME: Ricompense Autoclaim Giornaliero
USER_PLUGIN_HOYOLAB_AUTOCLAIM_DESC: Abilita la funzione premium di autoclaim giornaliero per raccogliere automaticamente le tue ricompense HoYoLAB senza dover accedere manualmente, risparmiando tempo ogni giorno.
USER_PLUGIN_HOYOLAB_AUTOREDEEM_NAME: Riscatto Automatico Codici
USER_PLUGIN_HOYOLAB_AUTOREDEEM_DESC: Riscatta automaticamente i codici da HoYoLAB per richiedere ricompense senza input manuale, semplificando il processo di ottenimento di oggetti e bonus in-game.(contenuto aggiuntivo)
