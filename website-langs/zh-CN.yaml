HOME_INFOGRAPHICS_SECTION_TITLE: 访问数百个精美的信息图
HOME_INFOGRAPHICS_SECTION_TEXT: 通过原神向导的惊艳信息图，释放您在原神之旅中的全部潜力。我们的机器人提供像素完美的可视化，捕捉每一个细节，确保您的游戏统计、角色构建和进度以无与伦比的清晰度呈现。为了速度而设计，这些信息图瞬间生成，让您无需延迟即可访问所需信息。无论您是在桌面还是移动设备上，我们的可访问信息图都针对所有设备进行了优化，使您更容易跟踪、分享和展示您的原神成就。今天就邀请原神向导，体验精准、快速和可访问性的无缝结合。
HOME_ART_LAYOUTS_SECTION_TITLE: 选择您的偏好
HOME_ART_LAYOUTS_SECTION_TEXT: 使用 Genshin Wizard，您可以自由定制构建的视觉呈现，同时保持相同的高质量信息。我们不同的艺术布局让您可以选择与个人品味相符的风格。无论您喜欢简约流畅的设计、充满活力的艺术风格，还是介于两者之间的风格，总有一种布局适合您。每个选项都提供对角色构建的详细见解，但具有独特的视觉风格，让您的体验更加愉悦。发现最适合您审美的布局，提升您查看 Genshin Impact 构建的方式！
HOME_WISH_HISTORY_SECTION_TITLE: 游戏……更精准
HOME_WISH_HISTORY_SECTION_TEXT: Genshin Wizard 将您的祈愿历史提升到一个新水平，提供强大的工具深入分析您的抽卡和趋势。通过广泛的过滤器，您可以轻松自定义视图，专注于最重要的细节——无论是跟踪您的 5 星运气、回顾过去的事件，还是分析武器与角色的抽卡。机器人以生动、美观的图形展示这些数据，不仅使信息清晰，而且视觉上引人入胜。我们的组织视图确保您所需的一切都在您预期的位置，让您更轻松地理解和分享您的 Genshin Impact 旅程。使用 Genshin Wizard，您的祈愿历史不仅仅是一个列表——它是一个故事，以您的方式讲述。
HOME_CHARACTER_GUIDES_SECTION_TITLE: 详细的原神角色指南
HOME_ABYSS_SECTION_TITLE: 征服螺旋深渊
HOME_ABYSS_SECTION_TEXT: 原神向导为您提供征服螺旋深渊所需的一切。只需几个命令，您就可以访问有关您角色的详细信息，帮助您优化当前深渊挑战的团队组合。通过了解每层深渊的敌人阵容、增益和减益的最新信息，您可以在游戏中保持领先。一旦您战斗过关，轻松查看并与朋友分享您的结果——展示您最佳的团队、完成时间和导致您胜利的策略。无论您是在策划下一次挑战还是庆祝最新的成功，原神向导都能让一切成为可能。
