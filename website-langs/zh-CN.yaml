ABOUT_STORY_TITLE: 我们的故事
ABOUT_STORY_TEXT: Genshin Wizard 于 2021 年 2 月开始作为一个简单的愿望追踪脚本。经过多年的发展，它已演变为一个全面的多功能 Discord 机器人，截至 2025 年 7 月，服务于超过 80,000 个服务器和 130,000 名注册用户。我们的使命是为 Genshin Impact 社区提供最佳的工具、指南和功能。
