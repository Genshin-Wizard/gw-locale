SUMERU_SCHOLARS_SUBTITLE: "须弥学者：Genshin洞察的专家"
SUMERU_SCHOLARS_TEXT: 以无与伦比的专业知识和战略指导赋能您的旅程。
SUMERU_KNOWLEDGE_TITLE: 深入知识
SUMERU_KNOWLEDGE_TEXT: 通过我们的须弥学者的专业知识，解锁原神的秘密。这些专家对角色构建、玩法风格和游戏机制拥有无与伦比的知识，指导您掌握游戏的每一个方面。
SUMERU_THEORYCRAFTING_TITLE: 专家理论构建
SUMERU_THEORYCRAFTING_TEXT: 我们的须弥学者处于原神向导理论构建的前沿。凭借他们的分析能力和对游戏动态的深刻理解，他们制定出能为玩家提供竞争优势的策略。
SUMERU_WHO_ARE_WE_DETAILED_TEXT_1: 须弥学者是原神向导的理论构建、编辑和构建策略背后的精英专家。因其对原神的深刻理解而被精心挑选，这些专家对角色构建、玩法风格和游戏机制了如指掌。他们无与伦比的专业知识使他们对社区至关重要，指导玩家掌握游戏的每一个方面。
SUMERU_WHO_ARE_WE_DETAILED_TEXT_2: 您是否对原神充满热情并渴望分享您的知识？原神向导始终在寻找有技能的人士加入这个声望卓著的须弥学者社团。成为这个精英团体的一部分，帮助塑造原神策略的未来。
SUMERU_DETAILED_GUIDES_TITLE: 详细的原神角色指南
SUMERU_DETAILED_GUIDES_TEXT: 通过我们精心制作的详细指南，释放您在原神中的角色的全部潜力，这些指南由"须弥学者"——一支专注的专家编辑团队提供。这些指南经过手工制作，旨在为您提供每个角色最准确、最新的信息，确保您始终拥有最佳策略在手。无论您是在寻找最佳团队协同、深入的玩法推荐，还是仅仅需要快速参考升星材料、命座详情或技能和被动天赋，原神向导都能满足您的需求。通过轻松访问所有这些重要信息，您将准备好在每一次冒险中引领您的角色走向伟大。相信须弥学者以精准和专业指导您的旅程。
