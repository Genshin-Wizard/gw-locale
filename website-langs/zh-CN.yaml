HOME_CHARACTER_ENDGAME_SECTION_TEXT: Genshin Wizard 使您能够以精准和风格征服 Genshin Impact 最艰难的挑战。无论您是在冲击螺旋深渊的层数、为变幻莫测的想象剧院规则制定策略，还是在无情的冥河冲击波中生存，我们都能为您提供支持。轻松跟踪您在所有终局模式中的进度，使用精美设计的信息图表让您的成就熠熠生辉。分析您的团队表现、完成时间、层数进度等——以简洁、可分享的视觉效果呈现。您的 Genshin 统计数据从未如此美观。
