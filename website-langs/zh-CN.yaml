FAQ_TITLE: 常见问题
FAQ_DESCRIPTION: 还有问题吗？查看我们的常见问题部分，获取有关原神向导高级版的常见查询的答案。
FAQ_WHAT_IS_PREMIUM_Q: 什么是原神向导高级版？
FAQ_WHAT_IS_PREMIUM_A: 原神向导高级版是一项订阅服务，提供独家功能、优先支持和额外福利，以提升你的原神体验。
FAQ_HOW_TO_SUBSCRIBE_Q: 如何订阅原神向导高级版？
FAQ_HOW_TO_SUBSCRIBE_A: 你可以通过我们的网站订阅原神向导高级版。选择适合你的计划并按照说明完成订阅。
FAQ_PAYMENT_METHODS_Q: 接受哪些支付方式？
FAQ_PAYMENT_METHODS_A: 我们接受多种支付方式，包括信用卡/借记卡和PayPal。请查看我们的支付页面以获取更多详细信息。
FAQ_CAN_CANCEL_Q: 我可以随时取消我的订阅吗？
FAQ_CAN_CANCEL_A: 是的，您可以随时通过您的账户设置取消订阅。您的访问权限将在当前计费周期结束时保持有效。
FAQ_WHAT_HAPPENS_CANCEL_Q: 如果我取消订阅会发生什么？
FAQ_WHAT_HAPPENS_CANCEL_A: 如果您取消订阅，您将在当前计费周期结束时失去对高级功能的访问权限。您仍然可以使用Genshin Wizard的免费版本。
FAQ_FREE_TRIAL_Q: 有免费试用吗？
FAQ_FREE_TRIAL_A: 目前，我们不提供Genshin Wizard Premium的免费试用。不过，您可以探索机器人的免费版本以了解其功能。
FAQ_CONTACT_SUPPORT_Q: 我如何联系支持以解决与高级相关的问题？
FAQ_CONTACT_SUPPORT_A: 您可以通过我们网站上的支持页面联系支持团队。我们在这里帮助您解决与您的高级订阅相关的任何问题。
