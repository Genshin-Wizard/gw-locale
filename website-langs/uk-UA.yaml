WISHES_IMPORT_INSTRUCTIONS_IMPORTANT: Перед імпортом важливо дотримуватися цих кроків, інакше ваш імпорт може не синхронізуватися так, як ви уявляли. Оскільки багато популярних сервісів не зберігають унікальний ідентифікатор бажання, бажання автоматично додаються на початок вашої вже існуючої історії бажань.
WISHES_IMPORT_INSTRUCTIONS_SYNC_PREFIX: З цієї причини, перед тим як вирішити імпортувати, переконайтеся, що ваші поточні бажання до сьогоднішнього дня повністю синхронізовані, ви можете зробити це, використовуючи
