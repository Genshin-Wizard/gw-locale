USER_PLUGIN_PROFILE_NAME: Профіль Genshin Wizard
USER_PLUGIN_PROFILE_DESC: Налаштуйте параметри свого профілю Genshin Wizard, включаючи переваги відображення та візуальні налаштування. Додайте стиль до свого профілю, щоб він виділявся серед інших користувачів.
USER_PLUGIN_ART_NAME: Налаштування Інфографіки
USER_PLUGIN_ART_DESC: Персоналізуйте свої інфографіки, обираючи з різноманітних кольорів, шрифтів та макетів. Налаштуйте їх відповідно до вашої естетики та вподобань.
USER_PLUGIN_PRIVACY_NAME: Налаштування Конфіденційності
USER_PLUGIN_PRIVACY_DESC: Керуйте та контролюйте свої налаштування конфіденційності, включаючи те, хто може переглядати ваші дані та скільки інформації ви хочете ділитися з іншими.
USER_PLUGIN_WISHES_REFRESH_NAME: Оновити Історію Бажань
USER_PLUGIN_WISHES_REFRESH_DESC: Оновіть свою історію бажань, щоб переконатися, що у вас є найновіші дані про ваші попередні витяги, що дозволяє вам відстежувати найсвіжіші банери.
USER_PLUGIN_WISHES_STATS_NAME: Переглянути Статистику Бажань
USER_PLUGIN_WISHES_STATS_DESC: Аналізуйте свою статистику бажань детально, включаючи ймовірності витягів, кількість жалю та шанси на 5-зіркові випади, щоб відстежувати свою удачу та тенденції з часом.
USER_PLUGIN_WISHES_HISTORY_NAME: Переглянути Історію Бажань
USER_PLUGIN_WISHES_HISTORY_DESC: Отримайте доступ до вашої повної історії бажань, відображаючи кожен витяг, зроблений на всіх банерах, що допоможе вам зберегти організований запис вашого прогресу в грі.
USER_PLUGIN_WISHES_IMPORT_NAME: Імпорт/Експорт Історії Бажань
USER_PLUGIN_WISHES_IMPORT_DESC: Безперешкодно імпортуйте або експортуйте дані вашої історії бажань, щоб ділитися з іншими або переносити між різними пристроями, гарантуючи, що ви ніколи не втратите слід за своїми витягами.
USER_PLUGIN_HOYOLAB_REGISTER_NAME: Зареєструвати Обліковий Запис HoYoLAB
USER_PLUGIN_HOYOLAB_REGISTER_DESC: Прив'яжіть свій обліковий запис HoYoLAB, щоб розблокувати додаткові функції, такі як синхронізація історії бажань, доступ до спеціальних подій та легше отримання винагород.
USER_PLUGIN_HOYOLAB_AUTOCLAIM_NAME: Щоденні Автоматичні Винагороди
USER_PLUGIN_HOYOLAB_AUTOCLAIM_DESC: Увімкніть преміум-функцію щоденного автоматичного отримання, щоб автоматично збирати свої винагороди HoYoLAB без необхідності входити вручну, заощаджуючи ваш час щодня.
USER_PLUGIN_HOYOLAB_AUTOREDEEM_NAME: Автоматичне Відкриття Кодів
USER_PLUGIN_HOYOLAB_AUTOREDEEM_DESC: Автоматично відкривайте коди з HoYoLAB, щоб отримувати винагороди без ручного введення, спрощуючи процес отримання предметів та бонусів у грі.(додатковий контент)
SUMERU_NAVIGATION_TITLE: Навігація по Світу Геншина
SUMERU_NAVIGATION_TEXT: Навігуючи по величезному світу Genshin Impact за допомогою наших Сумеру Учених. Їх ретельно підготовлені посібники та інсайти охоплюють кожного персонажа, забезпечуючи вашу готовність до будь-яких викликів, які гра ставить перед вами.
SUMERU_WHAT_ARE_TITLE: Що таке Сумеру Учені?
SUMERU_WHAT_ARE_TEXT: Сумеру Учені - це елітні експерти, які стоять за теорією, редагуванням та стратегіями побудови Genshin Wizard. Завдяки своїм винятковим знанням та відданості, вони забезпечують, щоб кожен шматок контенту відповідав найвищим стандартам точності та якості.
SUMERU_TEAM_DEDICATION_TEXT: віддана команда експертів-редакторів. Ці Учені невтомно працюють, щоб надати контент, який не лише інформативний, але й надійний та актуальний.
