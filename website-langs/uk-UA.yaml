HOME_INFOGRAPHICS_SECTION_TITLE: Отримайте доступ до сотень красивих інфографік
HOME_INFOGRAPHICS_SECTION_TEXT: Розкрийте весь потенціал вашої подорожі в Genshin Impact з приголомшливими інфографіками Genshin Wizard. Наш бот надає піксельно точні візуалізації, які захоплюють кожну деталь, забезпечуючи, щоб ваші ігрові статистики, побудови персонажів та прогрес були представлені з неперевершеною ясністю. Розроблені для швидкості, ці інфографіки генеруються миттєво, дозволяючи вам отримати потрібну інформацію без затримок. Незалежно від того, чи ви на комп'ютері, чи на мобільному, наші доступні інфографіки оптимізовані для всіх пристроїв, що робить відстеження, обмін та демонстрацію ваших досягнень у Genshin Impact простішим, ніж будь-коли. Запросіть Genshin Wizard сьогодні і відчуйте безшовне поєднання точності, швидкості та доступності.
HOME_ART_LAYOUTS_SECTION_TITLE: Оберіть свої вподобання
HOME_ART_LAYOUTS_SECTION_TEXT: З Genshin Wizard ви маєте свободу налаштовувати, як ваші побудови візуально представлені, зберігаючи при цьому ту ж високу якість інформації. Наші різні художні макети дозволяють вибрати стиль, який резонує з вашим особистим смаком. Чи віддаєте ви перевагу елегантному та мінімалістичному дизайну, яскравому та художньому підходу, чи чомусь посередині, є макет, який ідеально підходить для вас. Кожен варіант пропонує ті ж детальні відомості про ваші побудови персонажів, але з унікальним візуальним стилем, який робить ваш досвід більш приємним. Відкрийте для себе макет, який найкраще відповідає вашій естетиці, і підніміть, як ви дивитеся на свої побудови Genshin Impact!
HOME_WISH_HISTORY_SECTION_TITLE: Граючи... з більшою точністю
HOME_WISH_HISTORY_SECTION_TEXT: Genshin Wizard підносить вашу історію бажань на новий рівень, пропонуючи потужні інструменти для глибокого занурення у ваші витяги та тенденції. З широким спектром фільтрів ви можете легко налаштувати свій вигляд, щоб зосередитися на конкретних деталях, які мають найбільше значення — чи то відстеження вашої удачі з 5-зірковими персонажами, перегляд минулих подій або аналіз витягів зброї та персонажів. Бот представляє ці дані в яскравих, красиво оформлених інфографіках, які не лише роблять інформацію зрозумілою, але й візуально привабливою. Наші організовані перегляди забезпечують, що все, що вам потрібно, знаходиться саме там, де ви цього очікуєте, що робить розуміння та обмін вашою подорожжю в Genshin Impact легшим, ніж будь-коли. З Genshin Wizard ваша історія бажань — це більше, ніж просто список — це історія, розказана вашим способом.
HOME_CHARACTER_GUIDES_SECTION_TITLE: Детальні посібники по персонажам Genshin
HOME_ABYSS_SECTION_TITLE: Переможіть Спіральний Безодню
HOME_ABYSS_SECTION_TEXT: Genshin Wizard забезпечить вас усім необхідним, щоб домінувати в Спіральному Безодні. Лише кілька команд, і ви отримаєте детальну інформацію про своїх персонажів, що допоможе вам оптимізувати склад команди для поточних викликів Безодні. Будьте попереду гри, знаючи точно, чого очікувати на кожному поверсі Безодні, з актуальними деталями про склади ворогів, буфи та дебафи. Коли ви пройдете через всі випробування, легко перегляньте та поділіться своїми результатами з друзями — продемонструйте свої найкращі команди, часи завершення та стратегії, які призвели до вашої перемоги. Незалежно від того, чи плануєте ви наступний забіг, чи святкуєте свій останній успіх, Genshin Wizard робить це можливим.
