ABOUT_STORY_TEXT: Genshin Wizard почався як простий скрипт для відстеження бажань у лютому 2021 року. Протягом років він перетворився на всебічний багатофункціональний Discord-бот, який обслуговує понад 80,000 серверів та 130,000 зареєстрованих користувачів станом на липень 2025 року. Наша місія — надавати найкращі інструменти, посібники та функції для спільноти Genshin Impact.
