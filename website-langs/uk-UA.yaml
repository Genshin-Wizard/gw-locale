SUMERU_SCHOLARS_SUBTITLE: "Сумеру Учені: Майстри Інсайту Геншина"
SUMERU_SCHOLARS_TEXT: Надаємо вам підтримку у вашій подорожі з неперевершеною експертизою та стратегічним керівництвом.
SUMERU_KNOWLEDGE_TITLE: Глибокі Знання
SUMERU_KNOWLEDGE_TEXT: Відкрийте секрети Genshin Impact з експертизою наших Сумеру Учених. Ці спеціалісти володіють безпрецедентними знаннями про побудови персонажів, стилі гри та механіку гри, ведучи вас до оволодіння кожним аспектом гри.
SUMERU_THEORYCRAFTING_TITLE: Експертна Теорія
SUMERU_THEORYCRAFTING_TEXT: Наші Сумеру Учені знаходяться на передовій теорії Genshin Wizard. Завдяки своїм аналітичним навичкам та глибокому розумінню динаміки гри, вони розробляють стратегії, які надають гравцям конкурентну перевагу.
SUMERU_WHO_ARE_WE_DETAILED_TEXT_1: Сумеру Учені - це елітні експерти, які стоять за теорією, редагуванням та стратегіями побудови Genshin Wizard. Відібрані за їхнє глибоке розуміння Genshin Impact, ці спеціалісти знають всі тонкощі побудови персонажів, стилів гри та механіки гри як ніхто інший. Їхня безпрецедентна експертиза робить їх незамінними для спільноти, ведучи гравців до оволодіння кожним аспектом гри.
SUMERU_WHO_ARE_WE_DETAILED_TEXT_2: Ви захоплюєтеся Genshin Impact і прагнете поділитися своїми знаннями? Genshin Wizard завжди шукає талановитих людей, щоб приєднатися до престижного товариства Сумеру Учених. Станьте частиною цієї елітної групи та допоможіть формувати майбутнє стратегії Genshin Impact.
SUMERU_DETAILED_GUIDES_TITLE: Детальні Посібники по Персонажах Геншина
SUMERU_DETAILED_GUIDES_TEXT: Розкрийте повний потенціал своїх персонажів Genshin Impact з нашими ретельно деталізованими посібниками, які підготували "Сумеру Учені" — віддана команда експертів-редакторів. Ці посібники створені вручну, щоб надати вам найточнішу, актуальну інформацію про кожного персонажа, забезпечуючи вам найкращі стратегії під рукою. Чи шукаєте ви оптимальні синергії команди, детальні рекомендації щодо стилю гри, чи просто потрібен швидкий довідник для матеріалів підвищення, деталей сузір'їв або навичок і пасивних талантів, Genshin Wizard завжди готовий допомогти. Завдяки легкому доступу до всієї цієї важливої інформації, ви будете готові вести своїх персонажів до величі в кожній пригоді. Довіртеся Сумеру Ученим, щоб вони точно і професійно вели вас у вашій подорожі.
