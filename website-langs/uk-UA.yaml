HOME_CHARACTER_ENDGAME_SECTION_TEXT: Genshin Wizard надає вам можливість подолати найскладніші виклики Genshin Impact з точністю та стилем. Чи то ви проходите через поверхи Спіральної Безодні, стратегізуєте для змінних правил Імаджинаріуму, чи виживаєте в безжальних хвилях Стигійського Нападу, ми вас покриваємо. Легко відстежуйте свій прогрес у всіх режимах кінцевої гри з красиво оформленими інфографіками, які роблять ваші досягнення яскравими. Аналізуйте продуктивність вашої команди, час завершення, прогрес по поверхах та багато іншого — представлене в чистих, зручних для обміну візуалах. Ваша статистика Genshin ніколи не виглядала так добре.
