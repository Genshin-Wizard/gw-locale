WISHES_IMPORT_INSTRUCTIONS_SOURCES: Щоб дізнатися більше про підтримувані джерела імпорту, перегляньте
WISHES_EXPORT_INSTRUCTIONS_MAIN: Функція експорту Genshin Wizard дозволяє користувачам без зусиль зберігати свою історію бажань у форматі CSV одним кліком. Ця зручна функція забезпечує безпечне зберігання всіх ваших важливих даних, включаючи номери прокрутки, кількість жалю, назви предметів та типи банерів, які легко доступні для подальшого використання.
WISHES_EXPORT_INSTRUCTIONS_USAGE: Чи ви хочете повторно імпортувати свої дані назад у Genshin Wizard після скидання, чи поділитися ними з сторонніми додатками, які підтримують імпорт Genshin Wizard, цей файл CSV забезпечує гнучке та портативне рішення. Лише просте завантаження, ваша історія бажань зберігається і готова до використання в будь-який час і в будь-якому місці.
WISHES_MANAGE_INSTRUCTIONS: Легко керуйте своєю імпортованою історією бажань. Ви можете переглядати детальну інформацію про ваші імпортовані дані, включаючи кількість імпортованих бажань та будь-які потенційні проблеми, які могли виникнути під час процесу імпорту.
