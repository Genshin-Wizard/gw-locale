FAQ_TITLE: Часто задавані питання
FAQ_DESCRIPTION: Все ще є питання? Перегляньте наш розділ FAQ для відповідей на поширені запитання про Genshin Wizard Premium.
FAQ_WHAT_IS_PREMIUM_Q: Що таке Genshin Wizard Premium?
FAQ_WHAT_IS_PREMIUM_A: Genshin Wizard Premium — це підписка, яка пропонує ексклюзивні функції, пріоритетну підтримку та додаткові переваги для покращення вашого досвіду в Genshin.
FAQ_HOW_TO_SUBSCRIBE_Q: Як я можу підписатися на Genshin Wizard Premium?
FAQ_HOW_TO_SUBSCRIBE_A: Ви можете підписатися на Genshin Wizard Premium через наш веб-сайт. Виберіть план, який вам підходить, і дотримуйтесь інструкцій для завершення підписки.
FAQ_PAYMENT_METHODS_Q: Які методи оплати приймаються?
FAQ_PAYMENT_METHODS_A: Ми приймаємо різні методи оплати, включаючи кредитні/дебетові картки та PayPal. Будь ласка, перевірте нашу сторінку оплати для отримання додаткової інформації.
FAQ_CAN_CANCEL_Q: Чи можу я скасувати свою підписку в будь-який час?
FAQ_CAN_CANCEL_A: Так, ви можете скасувати свою підписку в будь-який час через налаштування вашого облікового запису. Ваш доступ залишиться активним до кінця поточного розрахункового циклу.
FAQ_WHAT_HAPPENS_CANCEL_Q: Що станеться, якщо я скасую свою підписку?
FAQ_WHAT_HAPPENS_CANCEL_A: Якщо ви скасували свою підписку, ви втратите доступ до преміум-функцій наприкінці вашого поточного розрахункового циклу. Ви все ще можете використовувати безкоштовну версію Genshin Wizard.
FAQ_FREE_TRIAL_Q: Чи є безкоштовний пробний період?
FAQ_FREE_TRIAL_A: На даний момент ми не пропонуємо безкоштовний пробний період для Genshin Wizard Premium. Однак ви можете ознайомитися з безкоштовною версією бота, щоб побачити його можливості.
FAQ_CONTACT_SUPPORT_Q: Як я можу зв'язатися зі службою підтримки з питань, пов'язаних з преміумом?
FAQ_CONTACT_SUPPORT_A: Ви можете зв'язатися з нашою командою підтримки через сторінку підтримки на нашому веб-сайті. Ми тут, щоб допомогти вам з будь-якими питаннями, пов'язаними з вашою преміум-підпискою.
