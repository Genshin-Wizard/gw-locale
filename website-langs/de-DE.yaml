ABOUT_STORY_TITLE: Unsere Geschichte
ABOUT_STORY_TEXT: Genshin Wizard begann als einfaches Wunschverfolgungsskript im Februar 2021. Im Laufe der Jahre hat es sich zu einem umfassenden multifunktionalen Discord-Bot entwickelt, der bis Juli 2025 über 80.000 Server und 130.000 registrierte Benutzer bedient. Unsere Mission ist es, die besten Werkzeuge, Leitfäden und Funktionen für die Genshin Impact-Community bereitzustellen.
