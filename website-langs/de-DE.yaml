TEAM_FOUNDER_DESCRIPTION: "Der Visionär hinter Genshin Wizard, hatter kümmert sich um alles, von der Bot-Entwicklung über die Erstellung der Website, Infrastrukturmanagement, Bot-Verbesserungen/Funktionsentwicklung bis hin zur Community-Engagement. Mit einer Leidenschaft für Genshin Impact und Technologie hat hatter Genshin Wizard von Grund auf aufgebaut, um Hunderttausenden von Spielern weltweit zu dienen."
