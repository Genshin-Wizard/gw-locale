USER_PLUGIN_PROFILE_NAME: Genshin Wizard प्रोफ़ाइल
USER_PLUGIN_PROFILE_DESC: अपने Genshin Wizard प्रोफ़ाइल सेटिंग्स को समायोजित करें, जिसमें प्रदर्शन प्राथमिकताएँ और दृश्य अनुकूलन शामिल हैं। अपने प्रोफ़ाइल को अन्य उपयोगकर्ताओं के लिए आकर्षक बनाने के लिए इसमें विशेषता जोड़ें।
USER_PLUGIN_ART_NAME: सूचनात्मक ग्राफ़िक्स को अनुकूलित करें
USER_PLUGIN_ART_DESC: रंगों, फ़ॉन्टों और लेआउट के विभिन्न विकल्पों में से चुनकर अपने सूचनात्मक ग्राफ़िक्स को व्यक्तिगत बनाएं। उन्हें अपनी शैली और प्राथमिकताओं के अनुसार अनुकूलित करें।
USER_PLUGIN_PRIVACY_NAME: गोपनीयता सेटिंग्स
USER_PLUGIN_PRIVACY_DESC: अपनी गोपनीयता सेटिंग्स का प्रबंधन और नियंत्रण करें, जिसमें यह शामिल है कि कौन आपके डेटा को देख सकता है और आप दूसरों के साथ कितनी जानकारी साझा करना चाहते हैं।
USER_PLUGIN_WISHES_REFRESH_NAME: इच्छा इतिहास को ताज़ा करें
USER_PLUGIN_WISHES_REFRESH_DESC: अपने इच्छा इतिहास को ताज़ा करें ताकि आपके पिछले पुलों के बारे में नवीनतम डेटा हो, जिससे आप हाल के बैनरों का ट्रैक रख सकें।
USER_PLUGIN_WISHES_STATS_NAME: इच्छा सांख्यिकी देखें
USER_PLUGIN_WISHES_STATS_DESC: अपने इच्छा सांख्यिकी का विस्तार से विश्लेषण करें, जिसमें पुल दरें, पिटी गिनती, और 5-स्टार ड्रॉप चांस शामिल हैं, ताकि आप अपने भाग्य और समय के साथ रुझानों का ट्रैक रख सकें।
USER_PLUGIN_WISHES_HISTORY_NAME: इच्छा इतिहास देखें
USER_PLUGIN_WISHES_HISTORY_DESC: अपने पूरे इच्छा इतिहास तक पहुँचें, जिसमें सभी बैनरों पर किए गए प्रत्येक पुल को प्रदर्शित किया गया है, जिससे आप अपने खेल में प्रगति का व्यवस्थित रिकॉर्ड रख सकें।
USER_PLUGIN_WISHES_IMPORT_NAME: इच्छा इतिहास आयात/निर्यात करें
USER_PLUGIN_WISHES_IMPORT_DESC: अपने इच्छा इतिहास डेटा को आसानी से आयात या निर्यात करें ताकि आप दूसरों के साथ साझा कर सकें या विभिन्न उपकरणों के बीच स्थानांतरित कर सकें, यह सुनिश्चित करते हुए कि आप अपने पुलों का ट्रैक कभी न खोएं।
USER_PLUGIN_HOYOLAB_REGISTER_NAME: HoYoLAB खाता पंजीकरण करें
USER_PLUGIN_HOYOLAB_REGISTER_DESC: अपने HoYoLAB खाते को लिंक करें ताकि अतिरिक्त सुविधाएँ अनलॉक हो सकें, जैसे इच्छा इतिहास को समन्वयित करना, विशेष आयोजनों तक पहुँच प्राप्त करना, और पुरस्कारों का दावा करना अधिक आसानी से।
USER_PLUGIN_HOYOLAB_AUTOCLAIM_NAME: दैनिक ऑटो-क्लेम पुरस्कार
USER_PLUGIN_HOYOLAB_AUTOCLAIM_DESC: प्रीमियम दैनिक ऑटो-क्लेम सुविधा को सक्षम करें ताकि आप अपने HoYoLAB पुरस्कारों को स्वचालित रूप से एकत्र कर सकें बिना मैन्युअल लॉगिन की आवश्यकता के, हर दिन आपका समय बचाते हुए।
USER_PLUGIN_HOYOLAB_AUTOREDEEM_NAME: ऑटो कोड रिडेम्पशन
USER_PLUGIN_HOYOLAB_AUTOREDEEM_DESC: HoYoLAB से कोड को स्वचालित रूप से भुनाएं ताकि पुरस्कारों का दावा बिना मैन्युअल इनपुट के किया जा सके, खेल में वस्तुओं और बोनस प्राप्त करने की प्रक्रिया को सरल बनाते हुए।(अतिरिक्त सामग्री)
SUMERU_NAVIGATION_TITLE: Genshin की दुनिया में नेविगेट करें
SUMERU_NAVIGATION_TEXT: हमारे सुमेरु विद्वानों की मदद से Genshin Impact की विशाल दुनिया में नेविगेट करें। उनके द्वारा तैयार किए गए गाइड और अंतर्दृष्टियाँ हर पात्र को कवर करती हैं, यह सुनिश्चित करते हुए कि आप खेल में आने वाली किसी भी चुनौती के लिए हमेशा तैयार रहें।
SUMERU_WHAT_ARE_TITLE: सुमेरु विद्वान कौन हैं?
SUMERU_WHAT_ARE_TEXT: सुमेरु विद्वान Genshin Wizard के थ्योरीक्राफ्टिंग, संपादन, और निर्माण रणनीतियों के पीछे के प्रमुख विशेषज्ञ हैं। उनकी असाधारण ज्ञान और समर्पण के साथ, वे सुनिश्चित करते हैं कि हर सामग्री उच्चतम मानकों की सटीकता और गुणवत्ता को पूरा करती है।
SUMERU_TEAM_DEDICATION_TEXT: एक समर्पित विशेषज्ञ संपादकों की टीम। ये विद्वान निरंतर काम करते हैं ताकि ऐसा सामग्री प्रदान कर सकें जो न केवल जानकारीपूर्ण हो बल्कि विश्वसनीय और अद्यतन भी हो।
