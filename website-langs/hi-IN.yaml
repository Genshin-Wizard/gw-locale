WISHES_IMPORT_INSTRUCTIONS_IMPORTANT: "आप आयात करने से पहले, इन चरणों का पालन करना महत्वपूर्ण है, अन्यथा, आपका आयात आपकी कल्पना के अनुसार समन्वयित नहीं हो सकता। चूंकि कई लोकप्रिय सेवाएं किसी इच्छा की अद्वितीय आईडी को संग्रहीत नहीं करती हैं, इच्छाएं स्वचालित रूप से आपकी पूर्व-निर्धारित इच्छा इतिहास के सामने जोड़ी जाती हैं।"
WISHES_IMPORT_INSTRUCTIONS_SYNC_PREFIX: "इसी कारण से, आयात करने का निर्णय लेने से पहले, सुनिश्चित करें कि आपके वर्तमान इच्छाएं वर्तमान दिन तक पूरी तरह से समन्वयित हैं, आप इसे"
WISHES_IMPORT_INSTRUCTIONS_SYNC_SUFFIX: "कमांड का उपयोग करके Genshin Wizard के माध्यम से या"
WISHES_IMPORT_INSTRUCTIONS_SYNC_END: "पृष्ठ पर जाकर कर सकते हैं।"
WISHES_IMPORT_INSTRUCTIONS_SOURCES: "समर्थित आयात स्रोतों के बारे में अधिक जानने के लिए, देखें"
WISHES_EXPORT_INSTRUCTIONS_MAIN: "Genshin Wizard का निर्यात फ़ीचर उपयोगकर्ताओं को एक क्लिक में CSV प्रारूप में अपनी इच्छा इतिहास को आसानी से सहेजने की अनुमति देता है। यह सुविधाजनक कार्यक्षमता सुनिश्चित करती है कि आपके सभी महत्वपूर्ण डेटा, जिसमें रोल नंबर, पिटी गिनती, आइटम नाम और बैनर प्रकार शामिल हैं, सुरक्षित रूप से संग्रहीत होते हैं और भविष्य के उपयोग के लिए आसानी से सुलभ होते हैं।"
WISHES_EXPORT_INSTRUCTIONS_USAGE: "चाहे आप Genshin Wizard में अपने डेटा को री-आयात करने की योजना बना रहे हों या तीसरे पक्ष के अनुप्रयोगों के साथ साझा करना चाहते हों जो Genshin Wizard आयात का समर्थन करते हैं, यह CSV फ़ाइल एक लचीला और पोर्टेबल समाधान प्रदान करती है। बस एक साधारण डाउनलोड के साथ, आपकी इच्छा इतिहास सुरक्षित रहती है और जब भी और जहाँ भी आपको इसकी आवश्यकता हो, उपयोग के लिए तैयार होती है।"
WISHES_MANAGE_INSTRUCTIONS: "अपने आयातित इच्छा इतिहास को आसानी से प्रबंधित करें। आप अपने आयातित डेटा के बारे में विस्तृत जानकारी देख सकते हैं, जिसमें आयातित इच्छाओं की संख्या और आयात प्रक्रिया के दौरान उत्पन्न होने वाली किसी भी संभावित समस्याएं शामिल हैं।"
