CAPTCHA_SEND_OTP: कैप्चा सत्यापन के लिए ओटीपी भेजना आवश्यक है। कृपया आगे बढ़ने के लिए कैप्चा चुनौती पूरी करें। यदि आप पॉप-अप विंडो नहीं देख रहे हैं या कैप्चा लोड नहीं हो रहा है, तो सुनिश्चित करें कि आपका ब्राउज़र पॉप-अप की अनुमति देता है और आपका नेटवर्क कनेक्शन स्थिर है।
CAPTCHA_COMPLETE_CHALLENGE: पंजीकरण के साथ आगे बढ़ने के लिए कृपया कैप्चा पूरा करें। यदि आप कोई पॉपअप नहीं देखते हैं या कैप्चा लोड नहीं होता है, तो कृपया सुनिश्चित करें कि आपका ब्राउज़र पॉपअप की अनुमति देता है और आपके पास एक स्थिर इंटरनेट कनेक्शन है।
