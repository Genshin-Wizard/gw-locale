USER_PLUGIN_PROFILE_NAME: Profil Genshin Wizard
USER_PLUGIN_PROFILE_DESC: Dostosuj ustawienia swojego profilu Genshin Wizard, w tym preferencje wyświetlania i wizualne personalizacje. Dodaj styl do swojego profilu, aby wyróżniał się wśród innych użytkowników.
USER_PLUGIN_ART_NAME: Dostosuj Infografiki
USER_PLUGIN_ART_DESC: Spersonalizuj swoje infografiki, wybierając spośród różnych kolorów, czcionek i układów. Dostosuj je do swojego stylu i preferencji.
USER_PLUGIN_PRIVACY_NAME: Ustawienia prywatności
USER_PLUGIN_PRIVACY_DESC: Zarządzaj i kontroluj swoje ustawienia prywatności, w tym kto może przeglądać twoje dane i ile informacji chcesz udostępnić innym.
USER_PLUGIN_WISHES_REFRESH_NAME: Odśwież Historię Życzeń
USER_PLUGIN_WISHES_REFRESH_DESC: Odśwież swoją historię życzeń, aby mieć najnowsze dane o swoich wcześniejszych losowaniach, co pozwoli ci śledzić najnowsze bannery.
USER_PLUGIN_WISHES_STATS_NAME: Zobacz statystyki życzeń
USER_PLUGIN_WISHES_STATS_DESC: Szczegółowo analizuj swoje statystyki życzeń, w tym wskaźniki losowania, liczniki pecha i szanse na 5-gwiazdkowe przedmioty, aby śledzić swoje szczęście i trendy w czasie.
USER_PLUGIN_WISHES_HISTORY_NAME: Zobacz historię życzeń
USER_PLUGIN_WISHES_HISTORY_DESC: Uzyskaj dostęp do pełnej historii życzeń, wyświetlając każde losowanie dokonane na wszystkich bannerach, co pomoże Ci utrzymać zorganizowany zapis postępów w grze.
USER_PLUGIN_WISHES_IMPORT_NAME: Importuj/eksportuj historię życzeń
USER_PLUGIN_WISHES_IMPORT_DESC: Bezproblemowo importuj lub eksportuj dane swojej historii życzeń, aby dzielić się nimi z innymi lub przenosić między różnymi urządzeniami, zapewniając, że nigdy nie stracisz śladu swoich losowań.
USER_PLUGIN_HOYOLAB_REGISTER_NAME: Zarejestruj konto HoYoLAB
USER_PLUGIN_HOYOLAB_REGISTER_DESC: Połącz swoje konto HoYoLAB, aby odblokować dodatkowe funkcje, takie jak synchronizacja historii życzeń, dostęp do specjalnych wydarzeń i łatwiejsze zdobywanie nagród.
USER_PLUGIN_HOYOLAB_AUTOCLAIM_NAME: Codzienne automatyczne odbieranie nagród
USER_PLUGIN_HOYOLAB_AUTOCLAIM_DESC: Włącz premium funkcję codziennego automatycznego odbierania, aby automatycznie zbierać swoje nagrody HoYoLAB bez potrzeby ręcznego logowania, oszczędzając czas każdego dnia.
USER_PLUGIN_HOYOLAB_AUTOREDEEM_NAME: Automatyczne wykupywanie kodów
USER_PLUGIN_HOYOLAB_AUTOREDEEM_DESC: Automatycznie wykupuj kody z HoYoLAB, aby zdobywać nagrody bez ręcznego wprowadzania, upraszczając proces zdobywania przedmiotów i bonusów w grze.(dodatkowa zawartość)
SUMERU_NAVIGATION_TITLE: Nawiguj po świecie Genshin
SUMERU_NAVIGATION_TEXT: Nawiguj po ogromnym świecie Genshin Impact z pomocą naszych uczonych z Sumeru. Ich starannie opracowane przewodniki i spostrzeżenia obejmują każdą postać, zapewniając, że zawsze jesteś gotowy na każde wyzwanie, które gra stawia przed Tobą.
SUMERU_WHAT_ARE_TITLE: Czym są Uczniowie Sumeru?
SUMERU_WHAT_ARE_TEXT: Uczniowie Sumeru to elitarni eksperci stojący za teorią, edytowaniem i strategiami budowy w Genshin Wizard. Dzięki swojej wyjątkowej wiedzy i zaangażowaniu zapewniają, że każda część treści spełnia najwyższe standardy dokładności i jakości.
SUMERU_TEAM_DEDICATION_TEXT: dedykowany zespół ekspertów-edytorów. Ci Uczniowie pracują niestrudzenie, aby dostarczać treści, które są nie tylko informacyjne, ale także wiarygodne i aktualne.
