WISHES_IMPORT_INSTRUCTIONS_IMPORTANT: Przed importem ważne jest, aby wykonać te kroki, w przeciwnym razie Twój import może nie zsynchronizować się tak, jak sobie wyobrażałeś. Ponieważ wiele popularnych usług nie przechowuje unikalnego identyfikatora życzenia, życzenia są automatycznie dodawane na początku Twojej istniejącej historii życzeń.
WISHES_IMPORT_INSTRUCTIONS_SYNC_PREFIX: Z tego powodu, zanim zdecydujesz się na import, upewnij się, że Twoje obecne życzenia do dnia dzisiejszego są całkowicie zsynchronizowane, możesz to zrobić, korzystając z
WISHES_IMPORT_INSTRUCTIONS_SYNC_SUFFIX: komendy przez Genshin Wizard lub odwiedzając
WISHES_IMPORT_INSTRUCTIONS_SYNC_END: stronę.
WISHES_IMPORT_INSTRUCTIONS_SOURCES: Aby dowiedzieć się więcej o obsługiwanych źródłach importu, sprawdź
WISHES_EXPORT_INSTRUCTIONS_MAIN: Funkcja eksportu Genshin Wizard pozwala użytkownikom bez wysiłku zapisać swoją historię życzeń w formacie CSV za pomocą jednego kliknięcia. Ta wygodna funkcjonalność zapewnia, że wszystkie Twoje ważne dane, w tym numery rzutów, liczniki pecha, nazwy przedmiotów i typy bannerów, są bezpiecznie przechowywane i łatwo dostępne do przyszłego użytku.
WISHES_EXPORT_INSTRUCTIONS_USAGE: Niezależnie od tego, czy chcesz ponownie zaimportować swoje dane do Genshin Wizard po resecie, czy podzielić się nimi z aplikacjami zewnętrznymi, które obsługują importy Genshin Wizard, ten plik CSV zapewnia elastyczne i przenośne rozwiązanie. Dzięki prostemu pobraniu Twoja historia życzeń jest zachowana i gotowa do użycia, kiedy tylko jej potrzebujesz.
WISHES_MANAGE_INSTRUCTIONS: Zarządzaj swoją zaimportowaną historią życzeń z łatwością. Możesz przeglądać szczegółowe informacje o swoich zaimportowanych danych, w tym liczbę zaimportowanych życzeń oraz wszelkie potencjalne problemy, które mogły wystąpić podczas procesu importu.
