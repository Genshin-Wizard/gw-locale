HOME_INFOGRAPHICS_SECTION_TEXT: Odblokuj pełny potencjał swojej podróży w Genshin Impact dzięki oszałamiającym infografikom Genshin Wizard. Nasz bot dostarcza perfekcyjne wizualizacje, które uchwycają każdy szczegół, zapewniając, że twoje statystyki gry, budowy postaci i postępy są przedstawione z niezrównaną klarownością. Zaprojektowane z myślą o szybkości, te infografiki są generowane w mgnieniu oka, umożliwiając dostęp do potrzebnych informacji bez opóźnień. Niezależnie od tego, czy korzystasz z komputera, czy urządzenia mobilnego, nasze dostępne infografiki są zoptymalizowane dla wszystkich urządzeń, co ułatwia śledzenie, dzielenie się i prezentowanie swoich osiągnięć w Genshin Impact. Zaproś Genshin Wizard już dziś i doświadcz płynnego połączenia precyzji, szybkości i dostępności.
HOME_ART_LAYOUTS_SECTION_TITLE: Wybierz swoje preferencje
HOME_ART_LAYOUTS_SECTION_TEXT: Z Genshin Wizard masz swobodę dostosowywania, jak Twoje budowy są wizualnie prezentowane, zachowując jednocześnie te same wysokiej jakości informacje. Nasze różne układy artystyczne pozwalają Ci wybrać styl, który odpowiada Twojemu osobistemu gustowi. Niezależnie od tego, czy wolisz elegancki i minimalistyczny design, żywy i artystyczny styl, czy coś pomiędzy, jest układ, który jest idealny dla Ciebie. Każda opcja oferuje te same szczegółowe informacje o Twoich budowach postaci, ale z unikalnym wizualnym akcentem, który sprawia, że Twoje doświadczenie jest bardziej przyjemne. Odkryj układ, który najlepiej pasuje do Twojej estetyki i podnieś sposób, w jaki postrzegasz swoje budowy w Genshin Impact!
HOME_WISH_HISTORY_SECTION_TITLE: Gry... z większą precyzją
HOME_WISH_HISTORY_SECTION_TEXT: Genshin Wizard przenosi Twoją historię życzeń na wyższy poziom, oferując potężne narzędzia do głębokiego zanurzenia się w Twoje losowania i trendy. Dzięki szerokiemu zakresowi filtrów możesz łatwo dostosować swój widok, aby skupić się na szczegółach, które mają największe znaczenie — czy to śledzenie swojego szczęścia w 5-gwiazdkowych postaciach, przeglądanie przeszłych wydarzeń, czy analizowanie losowań broni w porównaniu do postaci. Bot przedstawia te dane w żywych, pięknie zaprojektowanych infografikach, które nie tylko czynią informacje jasnymi, ale także wizualnie angażującymi. Nasze zorganizowane widoki zapewniają, że wszystko, czego potrzebujesz, jest dokładnie tam, gdzie się tego spodziewasz, co sprawia, że zrozumienie i dzielenie się swoją podróżą w Genshin Impact jest łatwiejsze niż kiedykolwiek. Z Genshin Wizard Twoja historia życzeń to więcej niż tylko lista — to opowieść, opowiedziana po Twojemu.
HOME_CHARACTER_GUIDES_SECTION_TITLE: Szczegółowe Przewodniki Postaci Genshin
HOME_ABYSS_SECTION_TITLE: Podbij Spiralną Otchłań
HOME_ABYSS_SECTION_TEXT: Genshin Wizard wyposaża Cię we wszystko, co potrzebne, aby zdominować Spiral Abyss. Dzięki zaledwie kilku komendom możesz uzyskać szczegółowe informacje o swoich postaciach, co pomoże Ci zoptymalizować skład drużyny na obecne wyzwania w Abyssie. Bądź na bieżąco, wiedząc dokładnie, czego się spodziewać na każdym piętrze Abyssu, z aktualnymi informacjami o zestawach wrogów, buffach i debuffach. Gdy już przebijesz się przez wszystkie przeszkody, łatwo przeglądaj i dziel się swoimi wynikami z przyjaciółmi — pochwal się swoimi najlepszymi drużynami, czasami ukończenia i strategiami, które doprowadziły do Twojego zwycięstwa. Niezależnie od tego, czy planujesz swoje następne podejście, czy świętujesz swoje ostatnie osiągnięcie, Genshin Wizard sprawia, że to wszystko jest możliwe.
HOME_COMMANDS_SECTION_TITLE: Super Wszechstronny
HOME_COMMANDS_SECTION_SUBTITLE_PREFIX: Z
HOME_COMMANDS_SECTION_SUBTITLE_SUFFIX: unikalnymi komendami, Genshin Wizard to bot, którego potrzebujesz do wszystkich swoich potrzeb związanych z Genshin.
HOME_FOOTER_CTA_TITLE: Cóż, na co czekasz?
HOME_FOOTER_INVITE_BUTTON: Zaproś mnie
HOME_FOOTER_DOCUMENTATION_BUTTON: Zobacz dokumentację
