SUMERU_SCHOLARS_SUBTITLE: "Học Giả Sumeru: Bậc Thầy của Genshin Insight"
SUMERU_SCHOLARS_TEXT: Trao quyền cho hành trình của bạn với chuyên môn và hướng dẫn chiến lược vô song.
SUMERU_KNOWLEDGE_TITLE: Kiến Thức Sâu Sắc
SUMERU_KNOWLEDGE_TEXT: Khám Phá Những Bí Mật Của Genshin Impact Với Kiến Thức Của Các Học Giả Sumeru Của Chúng Tôi. Những chuyên gia này sở hữu kiến thức vô song về các xây dựng nhân vật, phong cách chơi và cơ chế trò chơi, hướng dẫn bạn để làm chủ mọi khía cạnh của trò chơi.
SUMERU_THEORYCRAFTING_TITLE: Lý Thuyết Hóa Chuyên Nghiệp
SUMERU_THEORYCRAFTING_TEXT: Các Học giả Sumeru của chúng tôi đang ở tuyến đầu của việc lý thuyết hóa Genshin Wizard. Với kỹ năng phân tích và hiểu biết sâu sắc về động lực trò chơi, họ xây dựng các chiến lược giúp người chơi có lợi thế cạnh tranh cần thiết.
SUMERU_WHO_ARE_WE_DETAILED_TEXT_1: Học giả Sumeru là những chuyên gia hàng đầu đứng sau việc lý thuyết hóa, chỉnh sửa và chiến lược xây dựng của Genshin Wizard. Được chọn lọc vì sự hiểu biết sâu sắc về Genshin Impact, những chuyên gia này biết rõ từng chi tiết về các xây dựng nhân vật, phong cách chơi và cơ chế trò chơi như không ai khác. Kiến thức vô song của họ khiến họ trở thành những người không thể thiếu cho cộng đồng, hướng dẫn người chơi làm chủ mọi khía cạnh của trò chơi.
SUMERU_WHO_ARE_WE_DETAILED_TEXT_2: Bạn có đam mê với Genshin Impact và muốn chia sẻ kiến thức của mình? Genshin Wizard luôn tìm kiếm những cá nhân tài năng để gia nhập xã hội Học giả Sumeru danh giá. Hãy trở thành một phần của nhóm tinh hoa này và giúp định hình tương lai của chiến lược Genshin Impact.
SUMERU_DETAILED_GUIDES_TITLE: Hướng Dẫn Chi Tiết Nhân Vật Genshin
SUMERU_DETAILED_GUIDES_TEXT: Khám Phá Tiềm Năng Đầy Đủ Của Các Nhân Vật Genshin Impact Của Bạn Với Những Hướng Dẫn Chi Tiết Tỉ Mỉ Của Chúng Tôi, Được Mang Đến Bởi "Học Giả Sumeru"—Một Đội Ngũ Biên Tập Viên Chuyên Nghiệp Tận Tâm. Những hướng dẫn này được chế tác thủ công để cung cấp cho bạn thông tin chính xác và cập nhật nhất về từng nhân vật, đảm bảo bạn luôn có những chiến lược tốt nhất trong tay. Dù bạn đang tìm kiếm sự kết hợp đội hình tối ưu, khuyến nghị phong cách chơi chi tiết, hoặc chỉ cần một tài liệu tham khảo nhanh cho nguyên liệu thăng cấp, chi tiết chòm sao, hoặc kỹ năng và tài năng thụ động, Genshin Wizard đều có thể giúp bạn. Với việc dễ dàng truy cập vào tất cả thông tin thiết yếu này, bạn sẽ sẵn sàng dẫn dắt các nhân vật của mình đến vinh quang trong mọi cuộc phiêu lưu. Hãy tin tưởng vào các Học giả Sumeru để dẫn dắt hành trình của bạn với sự chính xác và chuyên môn.
SUMERU_KNOWLEDGE_BASE_TITLE: Cơ Sở Kiến Thức Toàn Diện
SUMERU_KNOWLEDGE_BASE_SUBTITLE_PREFIX: Với
SUMERU_KNOWLEDGE_BASE_SUBTITLE_SUFFIX: các hướng dẫn chi tiết, Genshin Wizard là người bạn đồng hành tối ưu của bạn để làm chủ mọi khía cạnh của Genshin Impact.
