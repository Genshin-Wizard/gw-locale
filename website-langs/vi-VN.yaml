ABOUT_STORY_TITLE: Câu Chuyện Của Chúng Tôi
ABOUT_STORY_TEXT: Genshin Wizard bắt đầu như một script theo dõi ước muốn đơn giản vào tháng 2 năm 2021. Qua nhiều năm, nó đã phát triển thành một bot Discord đa năng toàn diện, phục vụ hơn 80,000 máy chủ và 130,000 người dùng đã đăng ký tính đến tháng 7 năm 2025. Sứ mệnh của chúng tôi là cung cấp những công cụ, hướng dẫn và tính năng tốt nhất cho cộng đồng Genshin Impact.
