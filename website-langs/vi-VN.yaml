USER_PLUGIN_PROFILE_NAME: Hồ sơ Genshin Wizard
USER_PLUGIN_PROFILE_DESC: Điều chỉnh cài đặt hồ sơ Genshin Wizard của bạn, bao gồm tùy chọn hiển thị và tùy chỉnh hình ảnh. Thêm phong cách cho hồ sơ của bạn để nó nổi bật với những người dùng khác.
USER_PLUGIN_ART_NAME: Tùy chỉnh Đồ họa thông tin
USER_PLUGIN_ART_DESC: Cá nhân hóa đồ họa thông tin của bạn bằng cách chọn từ nhiều màu sắc, phông chữ và bố cục khác nhau. Tùy chỉnh chúng để phù hợp với thẩm mỹ và sở thích của bạn.
USER_PLUGIN_PRIVACY_NAME: Cài đặt riêng tư
USER_PLUGIN_PRIVACY_DESC: Quản lý và kiểm soát cài đặt quyền riêng tư của bạn, bao gồm ai có thể xem dữ liệu của bạn và bạn muốn chia sẻ bao nhiêu thông tin với người khác.
USER_PLUGIN_WISHES_REFRESH_NAME: Làm mới Lịch sử Ước
USER_PLUGIN_WISHES_REFRESH_DESC: Làm mới lịch sử ước của bạn để đảm bảo bạn có dữ liệu mới nhất về các lần kéo trước đó, giúp bạn theo dõi các banner gần đây nhất.
USER_PLUGIN_WISHES_STATS_NAME: Xem Thống kê Ước
USER_PLUGIN_WISHES_STATS_DESC: Phân tích thống kê ước của bạn một cách chi tiết, bao gồm tỷ lệ kéo, số lần may mắn, và cơ hội rơi 5 sao, để theo dõi vận may và xu hướng theo thời gian.
USER_PLUGIN_WISHES_HISTORY_NAME: Xem Lịch sử Ước
USER_PLUGIN_WISHES_HISTORY_DESC: Truy cập vào toàn bộ lịch sử ước của bạn, hiển thị từng lần kéo đã thực hiện trên tất cả các banner, giúp bạn giữ một hồ sơ có tổ chức về tiến trình trong trò chơi.
USER_PLUGIN_WISHES_IMPORT_NAME: Nhập/Xuất Lịch sử Ước
USER_PLUGIN_WISHES_IMPORT_DESC: Nhập hoặc xuất dữ liệu lịch sử ước của bạn một cách liền mạch để chia sẻ với người khác hoặc chuyển giữa các thiết bị khác nhau, đảm bảo bạn không bao giờ mất dấu các lần kéo của mình.
USER_PLUGIN_HOYOLAB_REGISTER_NAME: Đăng ký Tài khoản HoYoLAB
USER_PLUGIN_HOYOLAB_REGISTER_DESC: Liên kết tài khoản HoYoLAB của bạn để mở khóa các tính năng bổ sung, như đồng bộ hóa lịch sử ước, truy cập các sự kiện đặc biệt, và nhận thưởng dễ dàng hơn.
USER_PLUGIN_HOYOLAB_AUTOCLAIM_NAME: Nhận Thưởng Tự Động Hàng Ngày
USER_PLUGIN_HOYOLAB_AUTOCLAIM_DESC: Kích hoạt tính năng nhận thưởng tự động hàng ngày cao cấp để tự động thu thập phần thưởng HoYoLAB của bạn mà không cần đăng nhập thủ công, tiết kiệm thời gian mỗi ngày.
USER_PLUGIN_HOYOLAB_AUTOREDEEM_NAME: Đổi Mã Tự Động
USER_PLUGIN_HOYOLAB_AUTOREDEEM_DESC: Tự động đổi mã từ HoYoLAB để nhận thưởng mà không cần nhập thủ công, đơn giản hóa quy trình nhận vật phẩm và phần thưởng trong trò chơi.(nội dung bổ sung)
SUMERU_NAVIGATION_TITLE: Dẫn Đường Trong Thế Giới Genshin
SUMERU_NAVIGATION_TEXT: Dẫn đường trong thế giới rộng lớn của Genshin Impact với sự trợ giúp của các Học giả Sumeru của chúng tôi. Những hướng dẫn và thông tin chi tiết được họ chuẩn bị tỉ mỉ bao phủ mọi nhân vật, đảm bảo bạn luôn sẵn sàng cho bất kỳ thử thách nào mà trò chơi đưa ra.
SUMERU_WHAT_ARE_TITLE: Học giả Sumeru là gì?
SUMERU_WHAT_ARE_TEXT: Học giả Sumeru là những chuyên gia hàng đầu đứng sau việc lý thuyết hóa, chỉnh sửa và chiến lược xây dựng của Genshin Wizard. Với kiến thức xuất sắc và sự cống hiến của họ, họ đảm bảo mỗi nội dung đều đạt tiêu chuẩn cao nhất về độ chính xác và chất lượng.
SUMERU_TEAM_DEDICATION_TEXT: một đội ngũ biên tập viên chuyên nghiệp tận tâm. Những Học giả này làm việc không mệt mỏi để cung cấp nội dung không chỉ thông tin mà còn đáng tin cậy và cập nhật.
