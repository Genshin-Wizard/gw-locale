HOME_CHARACTER_ENDGAME_SECTION_TITLE: Làm Chủ Cuối Game
HOME_CHARACTER_ENDGAME_SECTION_TEXT: Genshin Wizard giúp bạn chinh phục những thử thách khó khăn nhất của Genshin Impact với độ chính xác và phong cách. Dù bạn đang vượt qua các tầng của Spiral Abyss, lập chiến lược cho các quy tắc thay đổi của Imaginarium Theater, hay sống sót qua những đợt sóng không ngừng của Stygian Onslaught, chúng tôi luôn sẵn sàng hỗ trợ bạn. Theo dõi tiến trình của bạn một cách dễ dàng qua tất cả các chế độ cuối game với các đồ họa thông tin được thiết kế đẹp mắt giúp thành tích của bạn tỏa sáng. Phân tích hiệu suất đội hình của bạn, thời gian hoàn thành, tiến trình tầng và nhiều hơn nữa—được trình bày trong các hình ảnh sạch sẽ, dễ chia sẻ. Thống kê Genshin của bạn chưa bao giờ đẹp đến thế.
