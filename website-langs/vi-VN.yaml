TEAM_FOUNDER_DESCRIPTION: "Người có tầm nhìn đằng sau Genshin Wizard, hatter xử lý mọi thứ từ phát triển bot đến tạo website, quản lý hạ tầng, cải tiến bot/phát triển tính năng, và tương tác với cộng đồng. Với niềm đam mê Genshin Impact và công nghệ, hatter đã xây dựng Genshin Wizard từ đầu để phục vụ hàng trăm nghìn người chơi trên toàn thế giới."
