WISHES_IMPORT_INSTRUCTIONS_IMPORTANT: "Trước khi bạn nhập, điều quan trọng là phải làm theo các bước này, nếu không, việc nhập của bạn có thể không đồng bộ như bạn tưởng. Vì nhiều dịch vụ phổ biến không lưu trữ id duy nhất của một điều ước, các điều ước sẽ tự động được thêm vào đầu lịch sử điều ước hiện có của bạn."
WISHES_IMPORT_INSTRUCTIONS_SYNC_PREFIX: "Vì lý do này, trước khi bạn quyết định nhập, hãy đảm bảo rằng các điều ước hiện tại của bạn cho đến ngày hiện tại hoàn toàn đồng bộ, bạn có thể làm điều này bằng cách sử dụng"
WISHES_IMPORT_INSTRUCTIONS_SYNC_SUFFIX: "lệnh thông qua Genshin Wizard hoặc truy cập vào"
WISHES_IMPORT_INSTRUCTIONS_SYNC_END: "trang."
WISHES_IMPORT_INSTRUCTIONS_SOURCES: "Để tìm hiểu thêm về các nguồn nhập khẩu được hỗ trợ, hãy kiểm tra"
WISHES_EXPORT_INSTRUCTIONS_MAIN: "Tính năng xuất của Genshin Wizard cho phép người dùng dễ dàng lưu trữ lịch sử điều ước của họ ở định dạng CSV chỉ với một cú nhấp chuột. Chức năng tiện lợi này đảm bảo rằng tất cả dữ liệu quan trọng của bạn, bao gồm số lần quay, số lần may mắn, tên vật phẩm và loại biểu ngữ, được lưu trữ an toàn và dễ dàng truy cập cho việc sử dụng trong tương lai."
WISHES_EXPORT_INSTRUCTIONS_USAGE: "Cho dù bạn đang tìm cách nhập lại dữ liệu của mình vào Genshin Wizard sau khi đặt lại hay chia sẻ nó với các ứng dụng bên thứ ba hỗ trợ nhập Genshin Wizard, tệp CSV này cung cấp một giải pháp linh hoạt và di động. Chỉ với một lần tải xuống đơn giản, lịch sử điều ước của bạn được bảo tồn và sẵn sàng được sử dụng bất cứ khi nào và ở đâu bạn cần."
WISHES_MANAGE_INSTRUCTIONS: "Quản lý lịch sử điều ước đã nhập của bạn một cách dễ dàng. Bạn có thể xem thông tin chi tiết về dữ liệu đã nhập của bạn, bao gồm số lượng điều ước đã nhập và bất kỳ vấn đề tiềm ẩn nào có thể đã xảy ra trong quá trình nhập."
