ABOUT_STORY_TITLE: Nossa História
ABOUT_STORY_TEXT: O Genshin Wizard começou como um simples script de rastreamento de desejos em fevereiro de 2021. Ao longo dos anos, evoluiu para um bot Discord multi-utilitário abrangente, servindo mais de 80.000 servidores e 130.000 usuários registrados até julho de 2025. Nossa missão é fornecer as melhores ferramentas, guias e funcionalidades para a comunidade de Genshin Impact.
