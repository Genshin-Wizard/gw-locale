TEAM_FOUNDER_TITLE: Fundador & Desenvolvedor Principal
TEAM_FOUNDER_DESCRIPTION: O visionário por trás do Genshin Wizard, hatter cuida de tudo, desde o desenvolvimento do bot até a criação do site, gestão da infraestrutura, melhorias do bot/desenvolvimento de recursos e engajamento da comunidade. Com uma paixão por Genshin Impact e tecnologia, hatter construiu o Genshin Wizard do zero para servir centenas de milhares de jogadores em todo o mundo.
TEAM_DEVELOPERS_TITLE: Equipa de Desenvolvimento
TEAM_DEVELOPERS_DESCRIPTION: Nossa talentosa equipe de desenvolvimento trabalha incansavelmente para trazer novas funcionalidades, melhorias e inovações para o Genshin Wizard. Cada desenvolvedor traz uma experiência única e dedicação para tornar o bot melhor a cada dia.
