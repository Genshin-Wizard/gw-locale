USER_PLUGIN_PROFILE_NAME: Perfil do Genshin Wizard
USER_PLUGIN_PROFILE_DESC: Ajuste as configurações do seu perfil Genshin Wizard, incluindo preferências de exibição e personalizações visuais. Adicione estilo ao seu perfil para se destacar para outros utilizadores.
USER_PLUGIN_ART_NAME: Personalizar Infográficos
USER_PLUGIN_ART_DESC: Personalize os seus infográficos selecionando entre uma variedade de cores, fontes e layouts. Adapte-os ao seu estilo e preferências.
USER_PLUGIN_PRIVACY_NAME: Configurações de Privacidade
USER_PLUGIN_PRIVACY_DESC: Gerencie e controle as suas configurações de privacidade, incluindo quem pode ver os seus dados e quanta informação deseja partilhar com os outros.
USER_PLUGIN_WISHES_REFRESH_NAME: Atualizar Histórico de Desejos
USER_PLUGIN_WISHES_REFRESH_DESC: Atualize o seu histórico de desejos para garantir que tem os dados mais recentes sobre as suas pulls passadas, permitindo que acompanhe os banners mais recentes.
USER_PLUGIN_WISHES_STATS_NAME: Ver Estatísticas de Desejos
USER_PLUGIN_WISHES_STATS_DESC: Analise as suas estatísticas de desejos em detalhe, incluindo taxas de pulls, contagens de pity e chances de drops de 5 estrelas, para acompanhar a sua sorte e tendências ao longo do tempo.
USER_PLUGIN_WISHES_HISTORY_NAME: Ver Histórico de Desejos
USER_PLUGIN_WISHES_HISTORY_DESC: Acesse o seu histórico completo de desejos, exibindo cada pull feita em todos os banners, ajudando-o a manter um registro organizado do seu progresso no jogo.
USER_PLUGIN_WISHES_IMPORT_NAME: Importar/Exportar Histórico de Desejos
USER_PLUGIN_WISHES_IMPORT_DESC: Importe ou exporte facilmente os dados do seu histórico de desejos para partilhar com outros ou transferir entre diferentes dispositivos, garantindo que nunca perde o rasto das suas pulls.
USER_PLUGIN_HOYOLAB_REGISTER_NAME: Registar Conta HoYoLAB
USER_PLUGIN_HOYOLAB_REGISTER_DESC: Vincule a sua conta HoYoLAB para desbloquear funcionalidades adicionais, como sincronizar o histórico de desejos, aceder a eventos especiais e reivindicar recompensas mais facilmente.
USER_PLUGIN_HOYOLAB_AUTOCLAIM_NAME: Recompensas Diárias de Autoclaim
USER_PLUGIN_HOYOLAB_AUTOCLAIM_DESC: Ative a funcionalidade premium de autoclaim diário para coletar automaticamente as suas recompensas do HoYoLAB sem precisar fazer login manualmente, economizando tempo todos os dias.
USER_PLUGIN_HOYOLAB_AUTOREDEEM_NAME: Resgate Automático de Códigos
USER_PLUGIN_HOYOLAB_AUTOREDEEM_DESC: Resgate automaticamente códigos do HoYoLAB para reivindicar recompensas sem entrada manual, simplificando o processo de obtenção de itens e bônus no jogo.(conteúdo adicional)
SUMERU_NAVIGATION_TITLE: Navegue pelo Mundo de Genshin
SUMERU_NAVIGATION_TEXT: Navegue pelo vasto mundo de Genshin Impact com a ajuda dos nossos Eruditos de Sumeru. Os guias e insights meticulosamente elaborados deles cobrem cada personagem, garantindo que você esteja sempre preparado para qualquer desafio que o jogo lhe apresente.
SUMERU_WHAT_ARE_TITLE: O que são os Eruditos de Sumeru?
SUMERU_WHAT_ARE_TEXT: Os Eruditos de Sumeru são os especialistas de elite por trás da teoria, edição e estratégias de construção do Genshin Wizard. Com seu conhecimento excepcional e dedicação, eles garantem que cada peça de conteúdo atenda aos mais altos padrões de precisão e qualidade.
SUMERU_TEAM_DEDICATION_TEXT: uma equipe dedicada de editores especialistas. Esses Eruditos trabalham incansavelmente para entregar conteúdo que não é apenas informativo, mas também confiável e atualizado.
