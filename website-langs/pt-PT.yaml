FAQ_TITLE: Perguntas frequentes
FAQ_DESCRIPTION: Ainda tem perguntas? Consulte a nossa seção de FAQ para respostas a perguntas comuns sobre o Genshin Wizard Premium.
FAQ_WHAT_IS_PREMIUM_Q: O que é o Genshin Wizard Premium?
FAQ_WHAT_IS_PREMIUM_A: O Genshin Wizard Premium é um serviço de subscrição que oferece funcionalidades exclusivas, suporte prioritário e benefícios adicionais para melhorar a sua experiência em Genshin.
FAQ_HOW_TO_SUBSCRIBE_Q: Como me inscrevo no Genshin Wizard Premium?
FAQ_HOW_TO_SUBSCRIBE_A: Pode subscrever o Genshin Wizard Premium através do nosso site. Escolha um plano que se adapte a si e siga as instruções para completar a sua subscrição.
FAQ_PAYMENT_METHODS_Q: Quais métodos de pagamento são aceites?
FAQ_PAYMENT_METHODS_A: Aceitamos vários métodos de pagamento, incluindo cartões de crédito/débito e PayPal. Por favor, consulte a nossa página de pagamento para mais detalhes.
FAQ_CAN_CANCEL_Q: Posso cancelar a minha subscrição a qualquer momento?
FAQ_CAN_CANCEL_A: Sim, pode cancelar a sua subscrição a qualquer momento através das definições da sua conta. O seu acesso permanecerá ativo até ao final do ciclo de faturação atual.
FAQ_WHAT_HAPPENS_CANCEL_Q: O que acontece se eu cancelar a minha subscrição?
FAQ_WHAT_HAPPENS_CANCEL_A: Se cancelar a sua subscrição, perderá o acesso às funcionalidades premium no final do seu ciclo de faturação atual. Pode continuar a usar a versão gratuita do Genshin Wizard.
FAQ_FREE_TRIAL_Q: Há um período experimental gratuito disponível?
FAQ_FREE_TRIAL_A: Atualmente, não oferecemos um período experimental gratuito para o Genshin Wizard Premium. No entanto, pode explorar a versão gratuita do bot para ver as suas capacidades.
FAQ_CONTACT_SUPPORT_Q: Como posso contactar o suporte para questões relacionadas com o premium?
FAQ_CONTACT_SUPPORT_A: Pode contactar a nossa equipa de suporte através da página de suporte no nosso site. Estamos aqui para ajudar com qualquer questão relacionada com a sua subscrição premium.
