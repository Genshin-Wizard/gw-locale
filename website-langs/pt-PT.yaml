SUMERU_SCHOLARS_SUBTITLE: "Eruditos de Sumeru: Mestres da Perspicácia de Genshin"
SUMERU_SCHOLARS_TEXT: Empoderando Sua Jornada com Expertise Inigualável e Orientação Estratégica.
SUMERU_KNOWLEDGE_TITLE: Conhecimento Aprofundado
SUMERU_KNOWLEDGE_TEXT: Desbloqueie os segredos de Genshin Impact com a expertise dos nossos Eruditos de Sumeru. Esses especialistas possuem um conhecimento incomparável sobre construções de personagens, estilos de jogo e mecânicas do jogo, guiando você para dominar cada aspecto do jogo.
SUMERU_THEORYCRAFTING_TITLE: Teoria de Especialistas
SUMERU_THEORYCRAFTING_TEXT: Nossos Eruditos de Sumeru estão na vanguarda da teoria do Genshin Wizard. Com suas habilidades analíticas e profunda compreensão das dinâmicas do jogo, eles elaboram estratégias que dão aos jogadores a vantagem competitiva que precisam.
SUMERU_WHO_ARE_WE_DETAILED_TEXT_1: Os Eruditos de Sumeru são os especialistas de elite por trás da teoria, edição e estratégias de construção do Genshin Wizard. Selecionados por sua profunda compreensão de Genshin Impact, esses especialistas conhecem os detalhes das construções de personagens, estilos de jogo e mecânicas do jogo como ninguém. Sua expertise incomparável os torna inestimáveis para a comunidade, guiando os jogadores para dominar cada aspecto do jogo.
SUMERU_WHO_ARE_WE_DETAILED_TEXT_2: Você é apaixonado por Genshin Impact e ansioso para compartilhar seu conhecimento? O Genshin Wizard está sempre à procura de indivíduos habilidosos para se juntar à prestigiada sociedade dos Eruditos de Sumeru. Torne-se parte deste grupo de elite e ajude a moldar o futuro da estratégia de Genshin Impact.
SUMERU_DETAILED_GUIDES_TITLE: Guias Detalhados de Personagens de Genshin
SUMERU_DETAILED_GUIDES_TEXT: Desbloqueie todo o potencial dos seus personagens de Genshin Impact com nossos guias meticulosamente detalhados, trazidos a você pelos "Eruditos de Sumeru"—uma equipe dedicada de editores especialistas. Esses guias são elaborados à mão para fornecer as informações mais precisas e atualizadas sobre cada personagem, garantindo que você tenha sempre as melhores estratégias ao seu alcance. Se você está procurando sinergias de equipe ideais, recomendações de estilo de jogo aprofundadas, ou simplesmente precisa de uma referência rápida para materiais de ascensão, detalhes de constelação, ou talentos e passivos, o Genshin Wizard tem tudo o que você precisa. Com fácil acesso a todas essas informações essenciais, você estará pronto para levar seus personagens à grandeza em cada aventura. Confie nos Eruditos de Sumeru para guiar sua jornada com precisão e expertise.
