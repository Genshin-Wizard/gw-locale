USER_PLUGIN_WISHES_REGISTER_DESC: Acompanhe o seu histórico de desejos gacha de Genshin Impact e analise a sua sorte com estatísticas e insights detalhados.
HOME_CHARACTER_ENDGAME_SECTION_TITLE: Domine o Seu Final de Jogo
HOME_CHARACTER_ENDGAME_SECTION_TEXT: O Genshin Wizard capacita você a conquistar os desafios mais difíceis de Genshin Impact com precisão e estilo. Seja avançando pelos andares do Abismo Espiral, estrategizando para as regras em mudança do Teatro Imaginarium, ou sobrevivendo às ondas implacáveis do Ataque Estigiano, nós temos tudo o que você precisa. Acompanhe seu progresso em todos os modos de final de jogo com infográficos lindamente elaborados que fazem suas conquistas brilharem. Analise o desempenho da sua equipe, tempos de conclusão, progresso de andares e mais—apresentados em visuais limpos e compartilháveis. Suas estatísticas de Genshin nunca pareceram tão boas.
