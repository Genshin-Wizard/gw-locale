HOME_INFOGRAPHICS_SECTION_TITLE: Aceda a centenas de infografias bonitas
HOME_INFOGRAPHICS_SECTION_TEXT: Desbloqueie todo o potencial da sua jornada em Genshin Impact com as deslumbrantes infografias do Genshin Wizard. O nosso bot fornece visualizações perfeitas em pixel que capturam cada detalhe, garantindo que as suas estatísticas de jogo, construções de personagens e progresso são apresentados com clareza inigualável. Projetadas para velocidade, estas infografias são geradas num instante, permitindo que aceda à informação de que precisa sem demora. Quer esteja no desktop ou no móvel, as nossas infografias acessíveis estão otimizadas para todos os dispositivos, tornando mais fácil do que nunca acompanhar, partilhar e mostrar as suas conquistas em Genshin Impact. Convide o Genshin Wizard hoje e experimente a fusão perfeita de precisão, velocidade e acessibilidade.
HOME_ART_LAYOUTS_SECTION_TITLE: Explore different art layouts
HOME_ART_LAYOUTS_SECTION_TEXT: Com o Genshin Wizard, você tem a liberdade de personalizar como suas builds são apresentadas visualmente, tudo isso mantendo as mesmas informações de alta qualidade. Nossos diferentes layouts artísticos permitem que você escolha um estilo que ressoe com seu gosto pessoal. Se você prefere um design elegante e minimalista, uma abordagem vibrante e artística, ou algo intermediário, há um layout que é perfeito para você. Cada opção oferece as mesmas percepções detalhadas sobre suas builds de personagem, mas com um toque visual único que torna sua experiência mais agradável. Descubra o layout que melhor se adapta à sua estética e eleve a forma como você visualiza suas builds de Genshin Impact!
HOME_WISH_HISTORY_SECTION_TITLE: Jogando... com muito mais precisão
HOME_WISH_HISTORY_SECTION_TEXT: O Genshin Wizard leva seu histórico de desejos para o próximo nível, oferecendo ferramentas poderosas para mergulhar fundo em seus pulls e tendências. Com uma ampla gama de filtros, você pode facilmente personalizar sua visão para se concentrar nos detalhes específicos que mais importam—seja rastreando sua sorte com 5 estrelas, revisando eventos passados ou analisando pulls de armas vs. personagens. O bot apresenta esses dados em infográficos vívidos e lindamente projetados que não apenas tornam a informação clara, mas também visualmente envolvente. Nossas visualizações organizadas garantem que tudo o que você precisa esteja exatamente onde você espera, tornando mais fácil do que nunca entender e compartilhar sua jornada em Genshin Impact. Com o Genshin Wizard, seu histórico de desejos é mais do que apenas uma lista—é uma história, contada do seu jeito.
HOME_CHARACTER_GUIDES_SECTION_TITLE: Guias Detalhados de Personagens de Genshin
HOME_ABYSS_SECTION_TITLE: Conquiste o Abismo Espiral
HOME_ABYSS_SECTION_TEXT: O Genshin Wizard equipa-o com tudo o que precisa para dominar o Abismo Espiral. Com apenas alguns comandos, pode aceder a informações detalhadas sobre os seus personagens, ajudando-o a otimizar a composição da sua equipa para os desafios atuais do Abismo. Mantenha-se à frente do jogo sabendo exatamente o que esperar em cada andar do Abismo, com detalhes atualizados sobre formações de inimigos, buffs e debuffs. Depois de ter lutado, veja e partilhe facilmente os seus resultados com amigos—mostre as suas melhores equipas, tempos de conclusão e estratégias que levaram à sua vitória. Quer esteja a planear a sua próxima corrida ou a celebrar o seu último sucesso, o Genshin Wizard torna tudo isso possível.
