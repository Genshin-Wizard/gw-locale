WISHES_IMPORT_INSTRUCTIONS_IMPORTANT: Antes de importar, é importante seguir estes passos, caso contrário, a sua importação pode não sincronizar como imaginou. Como muitos serviços populares não armazenam o id único de um desejo, os desejos são automaticamente adicionados ao início do seu histórico de desejos existente.
WISHES_IMPORT_INSTRUCTIONS_SYNC_PREFIX: Por esta razão, antes de decidir importar, assegure-se de que os seus desejos atuais até ao dia de hoje estão completamente sincronizados, pode fazer isto usando o
WISHES_IMPORT_INSTRUCTIONS_SYNC_SUFFIX: comando através do Genshin Wizard ou visitando o
WISHES_IMPORT_INSTRUCTIONS_SYNC_END: página.
WISHES_IMPORT_INSTRUCTIONS_SOURCES: Para saber mais sobre fontes de importação suportadas, consulte
WISHES_EXPORT_INSTRUCTIONS_MAIN: A funcionalidade de exportação do Genshin Wizard permite que os usuários salvem facilmente o seu histórico de desejos em formato CSV com um único clique. Esta funcionalidade conveniente garante que todos os seus dados importantes, incluindo números de rolagem, contagens de azar, nomes de itens e tipos de bandeira, estão armazenados de forma segura e facilmente acessíveis para uso futuro.
WISHES_EXPORT_INSTRUCTIONS_USAGE: Seja para reimportar os seus dados de volta para o Genshin Wizard após um reset ou para partilhá-los com aplicações de terceiros que suportam importações do Genshin Wizard, este arquivo CSV fornece uma solução flexível e portátil. Com apenas um simples download, o seu histórico de desejos é preservado e pronto para ser usado sempre que e onde precisar.
WISHES_MANAGE_INSTRUCTIONS: Gerir o seu histórico de desejos importado com facilidade. Pode visualizar informações detalhadas sobre os seus dados importados, incluindo o número de desejos importados e quaisquer problemas potenciais que possam ter ocorrido durante o processo de importação.
