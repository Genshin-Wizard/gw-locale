USER_PLUGIN_PROFILE_NAME: Genshin Wizard Profili
USER_PLUGIN_PROFILE_DESC: Genshin Wizard profil ayarlarınızı, görüntüleme tercihleri ve görsel özelleştirmeler dahil olmak üzere ayarlayın. Profilinize diğer kullanıcıların dikkatini çekmek için bir hava katın.
USER_PLUGIN_ART_NAME: Bilgi Grafikleri Özelleştir
USER_PLUGIN_ART_DESC: Çeşitli renkler, fontlar ve düzenlerden seçerek infografiklerinizi kişiselleştirin. Estetiğinize ve tercihlerinize uyacak şekilde özelleştirin.
USER_PLUGIN_PRIVACY_NAME: Gizlilik Ayarları
USER_PLUGIN_PRIVACY_DESC: Verilerinizi kimin görüntüleyebileceği ve başkalarıyla ne kadar bilgi paylaşmak istediğiniz gibi gizlilik ayarlarınızı yönetin ve kontrol edin.
USER_PLUGIN_WISHES_REFRESH_NAME: Dilek Geçmişini Yenile
USER_PLUGIN_WISHES_REFRESH_DESC: Geçmiş çekimlerinize dair en güncel verilere sahip olmak için dilek geçmişinizi yenileyin, böylece en son afişleri takip edebilirsiniz.
USER_PLUGIN_WISHES_STATS_NAME: Dilek İstatistiklerini Görüntüle
USER_PLUGIN_WISHES_STATS_DESC: Çekim oranları, şans sayımları ve 5 yıldızlı düşüş şansları dahil olmak üzere dilek istatistiklerinizi detaylı bir şekilde analiz edin, böylece şansınızı ve zaman içindeki eğilimleri takip edebilirsiniz.
USER_PLUGIN_WISHES_HISTORY_NAME: Dilek Geçmişini Görüntüle
USER_PLUGIN_WISHES_HISTORY_DESC: Tüm afişlerde yapılan her çekimi gösteren tam dilek geçmişinize erişin, böylece oyun içindeki ilerlemenizi düzenli bir şekilde kaydedebilirsiniz.
USER_PLUGIN_WISHES_IMPORT_NAME: Dilek Geçmişini İçe/Dışa Aktar
USER_PLUGIN_WISHES_IMPORT_DESC: Dilek geçmişi verilerinizi başkalarıyla paylaşmak veya farklı cihazlar arasında aktarmak için sorunsuz bir şekilde içe veya dışa aktarın, böylece çekimlerinizi asla kaybetmezsiniz.
USER_PLUGIN_HOYOLAB_REGISTER_NAME: HoYoLAB Hesabı Kaydet
USER_PLUGIN_HOYOLAB_REGISTER_DESC: HoYoLAB hesabınızı bağlayarak dilek geçmişini senkronize etme, özel etkinliklere erişme ve ödülleri daha kolay talep etme gibi ek özellikleri açın.
USER_PLUGIN_HOYOLAB_AUTOCLAIM_NAME: Günlük Otomatik Ödül Talebi
USER_PLUGIN_HOYOLAB_AUTOCLAIM_DESC: Günlük otomatik talep özelliğini etkinleştirerek HoYoLAB ödüllerinizi manuel giriş yapmadan otomatik olarak toplayın, her gün zaman kazanın.
USER_PLUGIN_HOYOLAB_AUTOREDEEM_NAME: Otomatik Kod İade
USER_PLUGIN_HOYOLAB_AUTOREDEEM_DESC: HoYoLAB'dan kodları otomatik olarak iade ederek ödülleri manuel giriş olmadan talep edin, oyun içi eşyaları ve bonusları elde etme sürecini kolaylaştırın. (ek içerik)
SUMERU_NAVIGATION_TITLE: Genshin'in Dünyasında Gezin
SUMERU_NAVIGATION_TEXT: Genshin Impact'ın geniş dünyasında Sumeru Bilginlerimizin yardımıyla gezin. Titizlikle hazırlanmış rehberleri ve içgörüleri her karakteri kapsar, böylece oyunun size sunduğu her zorluğa her zaman hazırlıklı olursunuz.
SUMERU_WHAT_ARE_TITLE: Sumeru Bilginleri Nedir?
SUMERU_WHAT_ARE_TEXT: Sumeru Bilginleri, Genshin Wizard'ın teori oluşturma, düzenleme ve yapı stratejilerinin arkasındaki elit uzmanlardır. Olağanüstü bilgileri ve özverileri ile her içerik parçasının en yüksek doğruluk ve kalite standartlarını karşıladığından emin olurlar.
SUMERU_TEAM_DEDICATION_TEXT: uzman editörlerden oluşan bir ekip. Bu Bilginler, yalnızca bilgilendirici değil, aynı zamanda güvenilir ve güncel içerikler sunmak için durmaksızın çalışırlar.
