HOME_INFOGRAPHICS_SECTION_TEXT: Genshin Wizard'ın etkileyici infografikleri ile Genshin Impact yolculuğunuzun tam potansiyelini açığa çıkarın. Botumuz, her detayı yakalayan piksel mükemmelliğinde görselleştirmeler sunarak oyun istatistiklerinizin, karakter yapılarınızın ve ilerlemenizin eşsiz bir netlikte sunulmasını sağlar. Hız için tasarlanan bu infografikler anında oluşturulur, böylece ihtiyaç duyduğunuz bilgilere gecikmeden erişebilirsiniz. İster masaüstünde ister mobilde olun, erişilebilir infografiklerimiz tüm cihazlar için optimize edilmiştir, Genshin Impact başarılarınızı takip etmeyi, paylaşmayı ve sergilemeyi her zamankinden daha kolay hale getirir. Genshin Wizard'ı bugün davet edin ve hassasiyet, hız ve erişilebilirliğin kusursuz birleşimini deneyimleyin.
HOME_ART_LAYOUTS_SECTION_TITLE: Explore different art layouts
HOME_ART_LAYOUTS_SECTION_TEXT: Genshin Wizard ile, yapılarınızın görsel sunumunu özelleştirme özgürlüğüne sahipsiniz, aynı yüksek kaliteli bilgileri korurken. Farklı sanat düzenlerimiz, kişisel zevkinize hitap eden bir stil seçmenizi sağlar. İster şık ve minimalist bir tasarımı, ister canlı ve sanatsal bir yaklaşımı, ya da bunların arasında bir şey tercih edin, tam size uygun bir düzen var. Her seçenek, karakter yapılarınız hakkında aynı ayrıntılı bilgileri sunar, ancak deneyiminizi daha keyifli hale getiren benzersiz bir görsel dokunuşla. Estetiğinize en uygun düzeni keşfedin ve Genshin Impact yapılarınızı nasıl gördüğünüzü yükseltin!
HOME_WISH_HISTORY_SECTION_TITLE: Oyun... çok daha fazla hassasiyetle
HOME_WISH_HISTORY_SECTION_TEXT: Genshin Wizard, dilek geçmişinizi bir üst seviyeye taşıyarak, çekimleriniz ve trendleriniz hakkında derinlemesine bilgi edinmenizi sağlayan güçlü araçlar sunar. Geniş bir filtre yelpazesi ile, en önemli detaylara odaklanmak için görünümünüzü kolayca özelleştirebilirsiniz—ister 5 yıldızlı şansınızı takip edin, ister geçmiş etkinlikleri gözden geçirin, ister silah ve karakter çekimlerini analiz edin. Bot, bu verileri sadece bilgiyi net bir şekilde sunmakla kalmayıp, aynı zamanda görsel olarak da etkileyici olan canlı, güzel tasarlanmış infografikler halinde sunar. Düzenli görünümlerimiz, ihtiyaç duyduğunuz her şeyin tam beklediğiniz yerde olmasını sağlar, böylece Genshin Impact yolculuğunuzu anlamak ve paylaşmak her zamankinden daha kolay hale gelir. Genshin Wizard ile, dilek geçmişiniz sadece bir liste değil—bu, sizin tarzınızda anlatılan bir hikaye.
HOME_CHARACTER_GUIDES_SECTION_TITLE: Detaylı Genshin Karakter Rehberleri
HOME_ABYSS_SECTION_TITLE: Spiral Abyss'i Fethet
HOME_ABYSS_SECTION_TEXT: Genshin Wizard, Spiral Abyss'i fethetmek için ihtiyacınız olan her şeyi sağlar. Sadece birkaç komutla, karakterleriniz hakkında detaylı bilgilere erişebilir, mevcut Abyss zorlukları için takım kompozisyonunuzu optimize etmenize yardımcı olabilirsiniz. Her katmanda ne bekleyeceğinizi bilerek oyunun önünde kalın; düşman dizilimleri, buff'lar ve debuff'lar hakkında güncel bilgilerle. Mücadele ettikten sonra, sonuçlarınızı arkadaşlarınızla kolayca görüntüleyin ve paylaşın—en iyi takımlarınızı, tamamlama sürelerinizi ve zaferinize götüren stratejileri sergileyin. İster bir sonraki koşunuzu planlayın, ister en son başarınızı kutlayın, Genshin Wizard her şeyi mümkün kılar.
