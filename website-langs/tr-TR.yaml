FAQ_TITLE: Sıkça Sorulan Sorular
FAQ_DESCRIPTION: Hala sorularınız mı var? Genshin Wizard Premium hakkında sıkça sorulan soruların cevapları için SSS bölümümüze göz atın.
FAQ_WHAT_IS_PREMIUM_Q: Genshin Wizard Premium nedir?
FAQ_WHAT_IS_PREMIUM_A: Genshin Wizard Premium, Genshin deneyiminizi geliştirmek için özel özellikler, öncelikli destek ve ek avantajlar sunan bir abonelik hizmetidir.
FAQ_HOW_TO_SUBSCRIBE_Q: Genshin Wizard Premium'a nasıl abone olabilirim?
FAQ_HOW_TO_SUBSCRIBE_A: Genshin Wizard Premium'a web sitemiz üzerinden abone olabilirsiniz. Size uygun bir plan seçin ve aboneliğinizi tamamlamak için talimatları izleyin.
FAQ_PAYMENT_METHODS_Q: Hangi ödeme yöntemleri kabul ediliyor?
FAQ_PAYMENT_METHODS_A: Kredi/banka kartları ve PayPal dahil olmak üzere çeşitli ödeme yöntemlerini kabul ediyoruz. Daha fazla bilgi için ödeme sayfamıza göz atın.
FAQ_CAN_CANCEL_Q: Aboneliğimi istediğim zaman iptal edebilir miyim?
FAQ_CAN_CANCEL_A: Evet, aboneliğinizi istediğiniz zaman hesap ayarlarınızdan iptal edebilirsiniz. Erişiminiz mevcut faturalandırma döngüsünün sonuna kadar aktif kalacaktır.
FAQ_WHAT_HAPPENS_CANCEL_Q: Aboneliğimi iptal edersem ne olur?
FAQ_WHAT_HAPPENS_CANCEL_A: Aboneliğinizi iptal ederseniz, mevcut faturalandırma döngünüzün sonunda premium özelliklere erişiminizi kaybedersiniz. Yine de Genshin Wizard'ın ücretsiz sürümünü kullanmaya devam edebilirsiniz.
FAQ_FREE_TRIAL_Q: Ücretsiz deneme mevcut mu?
FAQ_FREE_TRIAL_A: Şu anda Genshin Wizard Premium için ücretsiz deneme sunmuyoruz. Ancak, botun yeteneklerini görmek için ücretsiz sürümünü keşfedebilirsiniz.
FAQ_CONTACT_SUPPORT_Q: Premium ile ilgili sorunlar için destekle nasıl iletişime geçebilirim?
FAQ_CONTACT_SUPPORT_A: Premium aboneliğinizle ilgili sorunlar için destek ekibimizle web sitemizdeki destek sayfası aracılığıyla iletişime geçebilirsiniz. Size yardımcı olmak için buradayız.
