WISHES_IMPORT_INSTRUCTIONS_IMPORTANT: İçe aktarmadan önce, bu adımları takip etmek önemlidir, aksi takdirde içe aktarmanız düşündüğünüz gibi senkronize olmayabilir. Birçok popüler hizmet, bir dileğin benzersiz kimliğini saklamadığından, dilekler otomatik olarak mevcut dilek geçmişinizin önüne eklenir.
WISHES_IMPORT_INSTRUCTIONS_SYNC_PREFIX: Tam da bu nedenle, içe aktarmaya karar vermeden önce, mevcut dileklerinizin güncel tarihe kadar tamamen senkronize olduğundan emin olun, bunu
WISHES_IMPORT_INSTRUCTIONS_SYNC_SUFFIX: komutunu Genshin Wizard üzerinden kullanarak veya
WISHES_IMPORT_INSTRUCTIONS_SYNC_END: sayfasını ziyaret ederek yapabilirsiniz.
WISHES_IMPORT_INSTRUCTIONS_SOURCES: Desteklenen içe aktarma kaynakları hakkında daha fazla bilgi edinmek için
WISHES_EXPORT_INSTRUCTIONS_MAIN: Genshin Wizard'ın dışa aktarma özelliği, kullanıcıların dilek geçmişlerini tek bir tıklama ile CSV formatında zahmetsizce kaydetmelerini sağlar. Bu kullanışlı işlev, tüm önemli verilerinizin, roll numaralarının, şans sayımlarının, öğe adlarının ve afiş türlerinin güvenli bir şekilde saklandığından ve gelecekte kullanılmak üzere kolayca erişilebilir olduğundan emin olur.
WISHES_EXPORT_INSTRUCTIONS_USAGE: Verilerinizi Genshin Wizard'a sıfırladıktan sonra yeniden içe aktarmak veya Genshin Wizard içe aktarmalarını destekleyen üçüncü taraf uygulamalarla paylaşmak istiyorsanız, bu CSV dosyası esnek ve taşınabilir bir çözüm sunar. Sadece basit bir indirme ile dilek geçmişiniz korunur ve ihtiyaç duyduğunuz her an ve her yerde kullanılmaya hazırdır.
WISHES_MANAGE_INSTRUCTIONS: İçe aktarılan dilek geçmişinizi kolayca yönetin. İçe aktarılan verileriniz hakkında, içe aktarılan dilek sayısı ve içe aktarma sürecinde meydana gelebilecek olası sorunlar dahil olmak üzere ayrıntılı bilgi görüntüleyebilirsiniz.
