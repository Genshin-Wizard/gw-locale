HOME_CUSTOMIZABLE_TITLE: โปรไฟล์ที่ปรับแต่งได้
HOME_CUSTOMIZABLE_TEXT: ต้องการโดดเด่นใช่ไหม? ตอนนี้คุณทำได้แล้ว! Genshin Wizard มาพร้อมกับโปรไฟล์ที่ปรับแต่งได้อย่างเต็มที่ตามผู้ใช้ แสดงโปรไฟล์ของคุณให้เพื่อน ๆ วันนี้!
