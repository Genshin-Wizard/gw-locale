USER_PLUGIN_PROFILE_NAME: โปรไฟล์ Genshin Wizard
USER_PLUGIN_PROFILE_DESC: ปรับแต่งการตั้งค่าโปรไฟล์ Genshin Wizard ของคุณ, รวมถึงความชอบในการแสดงผลและการปรับแต่งภาพ. เพิ่มความโดดเด่นให้กับโปรไฟล์ของคุณเพื่อให้มันสะดุดตาผู้ใช้คนอื่น.
USER_PLUGIN_ART_NAME: ปรับแต่งข้อมูลกราฟิก
USER_PLUGIN_ART_DESC: ปรับแต่งข้อมูลกราฟิกของคุณโดยการเลือกจากสี ฟอนต์ และรูปแบบที่หลากหลาย ทำให้ตรงกับสไตล์และความชอบของคุณ.
USER_PLUGIN_PRIVACY_NAME: การตั้งค่าความเป็นส่วนตัว
USER_PLUGIN_PRIVACY_DESC: จัดการและควบคุมการตั้งค่าความเป็นส่วนตัวของคุณ รวมถึงใครสามารถดูข้อมูลของคุณและคุณต้องการแชร์ข้อมูลมากแค่ไหนกับผู้อื่น.
USER_PLUGIN_WISHES_REFRESH_NAME: รีเฟรชประวัติการขอพร
USER_PLUGIN_WISHES_REFRESH_DESC: รีเฟรชประวัติการขอพรของคุณเพื่อให้แน่ใจว่าคุณมีข้อมูลล่าสุดเกี่ยวกับการดึงของคุณในอดีต ช่วยให้คุณติดตามแบนเนอร์ล่าสุดได้.
USER_PLUGIN_WISHES_STATS_NAME: ดูสถิติการขอพร
USER_PLUGIN_WISHES_STATS_DESC: วิเคราะห์สถิติการขอพรของคุณอย่างละเอียด รวมถึงอัตราการดึง จำนวนความโชคร้าย และโอกาสในการดรอป 5 ดาว เพื่อติดตามโชคและแนวโน้มของคุณตลอดเวลา.
USER_PLUGIN_WISHES_HISTORY_NAME: ดูประวัติการขอพร
USER_PLUGIN_WISHES_HISTORY_DESC: เข้าถึงประวัติการขอพรทั้งหมดของคุณ แสดงการดึงแต่ละครั้งที่ทำในทุกแบนเนอร์ ช่วยให้คุณเก็บบันทึกความก้าวหน้าในเกมได้อย่างเป็นระเบียบ.
USER_PLUGIN_WISHES_IMPORT_NAME: นำเข้าหรือส่งออกประวัติการขอพร
USER_PLUGIN_WISHES_IMPORT_DESC: นำเข้าหรือส่งออกข้อมูลประวัติการขอพรของคุณได้อย่างราบรื่นเพื่อแชร์กับผู้อื่นหรือต้องการโอนระหว่างอุปกรณ์ต่าง ๆ เพื่อให้คุณไม่พลาดการติดตามการดึงของคุณ.
USER_PLUGIN_HOYOLAB_REGISTER_NAME: ลงทะเบียนบัญชี HoYoLAB
USER_PLUGIN_HOYOLAB_REGISTER_DESC: เชื่อมโยงบัญชี HoYoLAB ของคุณเพื่อปลดล็อกฟีเจอร์เพิ่มเติม เช่น การซิงค์ประวัติการขอพร การเข้าถึงกิจกรรมพิเศษ และการรับรางวัลได้ง่ายขึ้น.
USER_PLUGIN_HOYOLAB_AUTOCLAIM_NAME: รางวัลการขอรับอัตโนมัติรายวัน
USER_PLUGIN_HOYOLAB_AUTOCLAIM_DESC: เปิดใช้งานฟีเจอร์การขอรับอัตโนมัติรายวันเพื่อเก็บรางวัล HoYoLAB ของคุณโดยไม่ต้องล็อกอินด้วยตนเอง ช่วยประหยัดเวลาให้คุณทุกวัน.
USER_PLUGIN_HOYOLAB_AUTOREDEEM_NAME: การแลกรหัสอัตโนมัติ
USER_PLUGIN_HOYOLAB_AUTOREDEEM_DESC: แลกรหัสจาก HoYoLAB โดยอัตโนมัติเพื่อรับรางวัลโดยไม่ต้องป้อนข้อมูลด้วยตนเอง ทำให้กระบวนการรับไอเทมและโบนัสในเกมเป็นไปอย่างราบรื่น.(เนื้อหาเพิ่มเติม)
SUMERU_NAVIGATION_TITLE: นำทางในโลกของ Genshin
SUMERU_NAVIGATION_TEXT: นำทางในโลกกว้างของ Genshin Impact ด้วยความช่วยเหลือจากนักวิชาการ Sumeru ของเรา คู่มือและข้อมูลเชิงลึกที่พวกเขาจัดทำขึ้นอย่างพิถีพิถันครอบคลุมทุกตัวละคร ทำให้คุณพร้อมเสมอสำหรับความท้าทายใด ๆ ที่เกมมอบให้.
SUMERU_WHAT_ARE_TITLE: นักวิชาการ Sumeru คืออะไร?
SUMERU_WHAT_ARE_TEXT: นักวิชาการ Sumeru คือผู้เชี่ยวชาญชั้นยอดที่อยู่เบื้องหลังการสร้างทฤษฎี การแก้ไข และกลยุทธ์การสร้างใน Genshin Wizard ด้วยความรู้และความทุ่มเทที่ยอดเยี่ยม พวกเขาทำให้แน่ใจว่าทุกชิ้นเนื้อหาตรงตามมาตรฐานความถูกต้องและคุณภาพสูงสุด.
SUMERU_TEAM_DEDICATION_TEXT: ทีมงานที่ทุ่มเทของบรรณาธิการผู้เชี่ยวชาญ ทีมงานเหล่านี้ทำงานอย่างไม่รู้จักเหน็ดเหนื่อยเพื่อส่งมอบเนื้อหาที่ไม่เพียงแต่ให้ข้อมูล แต่ยังเชื่อถือได้และทันสมัย.
