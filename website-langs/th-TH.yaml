PARTNERS_SCHOLARS_SUBTITLE: เสริมพลังการเดินทางของคุณด้วยความเชี่ยวชาญและคำแนะนำเชิงกลยุทธ์ที่ไม่มีใครเทียบได้.
PARTNERS_REQUIREMENT_1_TITLE: ข้อกำหนด 1
PARTNERS_REQUIREMENT_1_TEXT: ต้องเป็นเซิร์ฟเวอร์ที่เกี่ยวข้องกับ Genshin โดยทั่วไปเราไม่รับเซิร์ฟเวอร์ที่ใช้สำหรับการพบปะเป็นพันธมิตร.
PARTNERS_REQUIREMENT_2_TITLE: ข้อกำหนด 2
PARTNERS_REQUIREMENT_2_TEXT: ต้องปฏิบัติตามข้อกำหนดการให้บริการของ MiHoYo (ห้ามขาย, แลกเปลี่ยน, หรือแฮ็กบัญชีผ่านเซิร์ฟเวอร์ของคุณ).
PARTNERS_REQUIREMENT_3_TITLE: ข้อกำหนด 3
PARTNERS_REQUIREMENT_3_TEXT: ต้องมีสมาชิกอย่างน้อย 2,500 คนในเซิร์ฟเวอร์เพื่อพิจารณาเป็นพันธมิตรใหม่.
