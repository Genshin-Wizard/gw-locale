ABOUT_STORY_TITLE: เรื่องราวของเรา
ABOUT_STORY_TEXT: Genshin Wizard เริ่มต้นจากสคริปต์ติดตามความปรารถนาที่เรียบง่ายในเดือนกุมภาพันธ์ 2021 ตลอดหลายปีที่ผ่านมา มันได้พัฒนาเป็นบอท Discord ที่มีหลายฟังก์ชันที่ครอบคลุม ให้บริการมากกว่า 80,000 เซิร์ฟเวอร์และผู้ใช้ที่ลงทะเบียน 130,000 คนในเดือนกรกฎาคม 2025 ภารกิจของเราคือการให้เครื่องมือ คู่มือ และฟีเจอร์ที่ดีที่สุดสำหรับชุมชน Genshin Impact.
