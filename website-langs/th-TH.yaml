WISHES_IMPORT_INSTRUCTIONS_IMPORTANT: "ก่อนที่คุณจะนำเข้า สิ่งสำคัญคือต้องปฏิบัติตามขั้นตอนเหล่านี้ มิฉะนั้น การนำเข้าของคุณอาจไม่ซิงค์ตามที่คุณคิดไว้ เนื่องจากบริการยอดนิยมหลายแห่งไม่เก็บรหัสเฉพาะของความปรารถนา ความปรารถนาจะถูกเพิ่มไปยังด้านหน้าของประวัติความปรารถนาที่มีอยู่ของคุณโดยอัตโนมัติ"
WISHES_IMPORT_INSTRUCTIONS_SYNC_PREFIX: "ด้วยเหตุนี้ ก่อนที่คุณจะตัดสินใจนำเข้า ให้แน่ใจว่าความปรารถนาปัจจุบันของคุณจนถึงวันปัจจุบันซิงค์กันอย่างสมบูรณ์ คุณสามารถทำได้โดยใช้"
WISHES_IMPORT_INSTRUCTIONS_SYNC_SUFFIX: "คำสั่งผ่าน Genshin Wizard หรือไปที่"
WISHES_IMPORT_INSTRUCTIONS_SYNC_END: "หน้า."
WISHES_IMPORT_INSTRUCTIONS_SOURCES: "เพื่อค้นหาข้อมูลเพิ่มเติมเกี่ยวกับแหล่งนำเข้าที่รองรับ โปรดตรวจสอบ"
WISHES_EXPORT_INSTRUCTIONS_MAIN: "ฟีเจอร์การส่งออกของ Genshin Wizard ช่วยให้ผู้ใช้สามารถบันทึกประวัติความปรารถนาของตนในรูปแบบ CSV ได้อย่างง่ายดายด้วยการคลิกเพียงครั้งเดียว ฟังก์ชันที่สะดวกนี้ช่วยให้มั่นใจว่าข้อมูลสำคัญทั้งหมดของคุณ รวมถึงหมายเลขการหมุน จำนวนความปรารถนา ชื่อรายการ และประเภทแบนเนอร์ จะถูกเก็บไว้อย่างปลอดภัยและเข้าถึงได้ง่ายสำหรับการใช้งานในอนาคต"
WISHES_EXPORT_INSTRUCTIONS_USAGE: "ไม่ว่าคุณจะต้องการนำข้อมูลของคุณกลับเข้าไปใน Genshin Wizard หลังจากการรีเซ็ตหรือแชร์กับแอปพลิเคชันของบุคคลที่สามที่รองรับการนำเข้าของ Genshin Wizard ไฟล์ CSV นี้ให้โซลูชันที่ยืดหยุ่นและพกพาได้ ด้วยการดาวน์โหลดเพียงครั้งเดียว ประวัติความปรารถนาของคุณจะถูกเก็บรักษาไว้และพร้อมใช้งานเมื่อใดก็ตามที่คุณต้องการ"
WISHES_MANAGE_INSTRUCTIONS: "จัดการประวัติความปรารถนาที่นำเข้าของคุณได้อย่างง่ายดาย คุณสามารถดูข้อมูลรายละเอียดเกี่ยวกับข้อมูลที่นำเข้าของคุณ รวมถึงจำนวนความปรารถนาที่นำเข้าและปัญหาที่อาจเกิดขึ้นระหว่างกระบวนการนำเข้า"
