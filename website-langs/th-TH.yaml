TEAM_FOUNDER_DESCRIPTION: "ผู้มีวิสัยทัศน์เบื้องหลัง Genshin Wizard, hatter ดูแลทุกอย่างตั้งแต่การพัฒนาบอทไปจนถึงการสร้างเว็บไซต์, การจัดการโครงสร้างพื้นฐาน, การปรับปรุงบอท/การพัฒนาฟีเจอร์, และการมีส่วนร่วมของชุมชน ด้วยความหลงใหลใน Genshin Impact และเทคโนโลยี, hatter ได้สร้าง Genshin Wizard ขึ้นจากพื้นฐานเพื่อให้บริการผู้เล่นหลายแสนคนทั่วโลก."
TEAM_DEVELOPERS_TITLE: "ทีมพัฒนา"
TEAM_DEVELOPERS_DESCRIPTION: "ทีมพัฒนาที่มีความสามารถของเราทำงานอย่างไม่รู้จักเหน็ดเหนื่อยเพื่อนำฟีเจอร์ใหม่ ๆ, การปรับปรุง, และนวัตกรรมมาสู่ Genshin Wizard นักพัฒนาทุกคนมีความเชี่ยวชาญและความมุ่งมั่นที่ไม่เหมือนใครในการทำให้บอทดีขึ้นในทุก ๆ วัน."
