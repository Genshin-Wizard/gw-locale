USER_PLUGIN_PROFILE_NAME: Genshin Wizard 프로필
USER_PLUGIN_PROFILE_DESC: 디스플레이 환경 설정 및 시각적 사용자 정의를 포함하여 Genshin Wizard 프로필 설정을 조정하세요. 다른 사용자에게 돋보이게 하기 위해 프로필에 개성을 추가하세요.
USER_PLUGIN_ART_NAME: 인포그래픽 사용자화
USER_PLUGIN_ART_DESC: 다양한 색상, 글꼴 및 레이아웃 중에서 선택하여 인포그래픽을 개인화하세요. 당신의 미적 감각과 선호에 맞게 조정하세요.
USER_PLUGIN_PRIVACY_NAME: 개인정보 설정
USER_PLUGIN_PRIVACY_DESC: 누가 당신의 데이터를 볼 수 있는지 및 다른 사람과 공유할 정보를 얼마나 공유할지를 포함하여 개인 정보 설정을 관리하고 제어하세요.
USER_PLUGIN_WISHES_REFRESH_NAME: 소원 기록 새로 고침
USER_PLUGIN_WISHES_REFRESH_DESC: 소원 기록을 새로 고쳐 과거의 풀에 대한 최신 데이터를 확보하여 가장 최근의 배너를 추적하세요.
USER_PLUGIN_WISHES_STATS_NAME: 소원 통계 보기
USER_PLUGIN_WISHES_STATS_DESC: 당신의 소원 통계를 자세히 분석하세요. 풀 확률, 피티 카운트 및 5성 드롭 확률을 포함하여 시간에 따른 운과 추세를 추적하세요.
USER_PLUGIN_WISHES_HISTORY_NAME: 소원 기록 보기
USER_PLUGIN_WISHES_HISTORY_DESC: 모든 배너에서 이루어진 각 풀을 표시하여 전체 소원 기록에 접근하세요. 게임 내 진행 상황을 정리된 기록으로 유지하는 데 도움이 됩니다.
USER_PLUGIN_WISHES_IMPORT_NAME: 소원 기록 가져오기/내보내기
USER_PLUGIN_WISHES_IMPORT_DESC: 소원 기록 데이터를 원활하게 가져오거나 내보내어 다른 사람과 공유하거나 다른 장치 간에 전송하세요. 풀을 잃어버리지 않도록 보장합니다.
USER_PLUGIN_HOYOLAB_REGISTER_NAME: HoYoLAB 계정 등록
USER_PLUGIN_HOYOLAB_REGISTER_DESC: HoYoLAB 계정을 연결하여 소원 기록 동기화, 특별 이벤트 접근 및 보상을 더 쉽게 받을 수 있는 추가 기능을 잠금 해제하세요.
USER_PLUGIN_HOYOLAB_AUTOCLAIM_NAME: 일일 자동 보상 수령
USER_PLUGIN_HOYOLAB_AUTOCLAIM_DESC: 프리미엄 일일 자동 수령 기능을 활성화하여 수동으로 로그인할 필요 없이 HoYoLAB 보상을 자동으로 수령하세요. 매일 시간을 절약할 수 있습니다.
USER_PLUGIN_HOYOLAB_AUTOREDEEM_NAME: 코드 자동 교환
USER_PLUGIN_HOYOLAB_AUTOREDEEM_DESC: HoYoLAB에서 코드를 자동으로 교환하여 수동 입력 없이 보상을 받으세요. 게임 아이템 및 보너스를 얻는 과정을 간소화합니다.(추가 콘텐츠)
SUMERU_NAVIGATION_TITLE: 원신의 세계 탐험하기
SUMERU_NAVIGATION_TEXT: 우리의 스메루 학자들의 도움으로 원신 임팩트의 광활한 세계를 탐험하세요. 그들이 정성스럽게 만든 가이드와 통찰력은 모든 캐릭터를 다루며, 게임이 던지는 어떤 도전에도 항상 준비할 수 있도록 도와줍니다.
SUMERU_WHAT_ARE_TITLE: 스메루 학자란 무엇인가요?
SUMERU_WHAT_ARE_TEXT: 스메루 학자는 원신 위자드의 이론 제작, 편집 및 빌드 전략 뒤에 있는 엘리트 전문가들입니다. 그들의 뛰어난 지식과 헌신으로 모든 콘텐츠가 최고의 정확성과 품질 기준을 충족하도록 보장합니다.
SUMERU_TEAM_DEDICATION_TEXT: 전문 편집자로 구성된 헌신적인 팀입니다. 이 학자들은 정보 제공뿐만 아니라 신뢰할 수 있고 최신의 콘텐츠를 제공하기 위해 끊임없이 노력합니다.
