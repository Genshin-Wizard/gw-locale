FAQ_TITLE: 자주 묻는 질문
FAQ_DESCRIPTION: 아직 질문이 있으신가요? Genshin Wizard Premium에 대한 일반적인 질문에 대한 답변은 FAQ 섹션을 확인하세요.
FAQ_WHAT_IS_PREMIUM_Q: Genshin Wizard Premium이란 무엇인가요?
FAQ_WHAT_IS_PREMIUM_A: Genshin Wizard Premium은 독점 기능, 우선 지원 및 Genshin 경험을 향상시키기 위한 추가 혜택을 제공하는 구독 서비스입니다.
FAQ_HOW_TO_SUBSCRIBE_Q: Genshin Wizard Premium에 어떻게 구독하나요?
FAQ_HOW_TO_SUBSCRIBE_A: 우리 웹사이트를 통해 Genshin Wizard Premium에 구독할 수 있습니다. 본인에게 맞는 플랜을 선택하고 지침에 따라 구독을 완료하세요.
FAQ_PAYMENT_METHODS_Q: 어떤 결제 방법이 허용되나요?
FAQ_PAYMENT_METHODS_A: 신용/직불 카드 및 PayPal을 포함한 다양한 결제 방법을 허용합니다. 자세한 내용은 결제 페이지를 확인하세요.
FAQ_CAN_CANCEL_Q: 언제든지 구독을 취소할 수 있나요?
FAQ_CAN_CANCEL_A: 네, 계정 설정을 통해 언제든지 구독을 취소할 수 있습니다. 현재 청구 주기가 끝날 때까지 접근 권한은 유지됩니다.
FAQ_WHAT_HAPPENS_CANCEL_Q: 구독을 취소하면 어떻게 되나요?
FAQ_WHAT_HAPPENS_CANCEL_A: 구독을 취소하면 현재 청구 주기가 끝날 때 프리미엄 기능에 대한 접근 권한이 사라집니다. Genshin Wizard의 무료 버전은 계속 사용할 수 있습니다.
FAQ_FREE_TRIAL_Q: 무료 체험이 제공되나요?
FAQ_FREE_TRIAL_A: 현재 Genshin Wizard Premium에 대한 무료 체험은 제공되지 않습니다. 그러나 봇의 기능을 확인하기 위해 무료 버전을 탐색할 수 있습니다.
FAQ_CONTACT_SUPPORT_Q: 프리미엄 관련 문제에 대해 지원에 어떻게 연락하나요?
FAQ_CONTACT_SUPPORT_A: 우리 웹사이트의 지원 페이지를 통해 지원 팀에 연락할 수 있습니다. 프리미엄 구독과 관련된 문제에 대해 도와드리겠습니다.
