HOME_CHARACTER_ENDGAME_SECTION_TITLE: 엔드게임 마스터하기
HOME_CHARACTER_ENDGAME_SECTION_TEXT: Genshin Wizard는 Genshin Impact의 가장 어려운 도전을 정밀하고 멋지게 정복할 수 있도록 도와줍니다. Spiral Abyss 층을 통과하든, Imaginarium Theater의 변화하는 규칙을 전략적으로 대응하든, Stygian Onslaught의 끊임없는 물결을 견디든, 우리는 당신을 지원합니다. 아름답게 제작된 인포그래픽으로 모든 엔드게임 모드에서의 진행 상황을 손쉽게 추적할 수 있으며, 당신의 성과를 빛나게 합니다. 팀 성과, 완료 시간, 층 진행 상황 등을 분석하여 깔끔하고 공유 가능한 비주얼로 제공합니다. 당신의 Genshin 통계는 이렇게 멋지게 보인 적이 없습니다.
