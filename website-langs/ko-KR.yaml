SUMERU_SCHOLARS_SUBTITLE: "수메르 학자: Genshin 통찰의 대가들"
SUMERU_SCHOLARS_TEXT: 비교할 수 없는 전문성과 전략적 지침으로 당신의 여정을 지원합니다.
SUMERU_KNOWLEDGE_TITLE: 심층 지식
SUMERU_KNOWLEDGE_TEXT: 우리의 스메루 학자들의 전문 지식으로 원신 임팩트의 비밀을 밝혀보세요. 이 전문가들은 캐릭터 빌드, 플레이 스타일 및 게임 메커니즘에 대한 비할 데 없는 지식을 가지고 있어, 게임의 모든 측면을 마스터할 수 있도록 안내합니다.
SUMERU_THEORYCRAFTING_TITLE: 전문 이론 제작
SUMERU_THEORYCRAFTING_TEXT: 우리의 스메루 학자들은 원신 위자드의 이론 제작의 최전선에 있습니다. 그들의 분석 능력과 게임 역학에 대한 깊은 이해로, 플레이어들이 필요로 하는 경쟁 우위를 제공하는 전략을 만듭니다.
SUMERU_WHO_ARE_WE_DETAILED_TEXT_1: 스메루 학자는 원신 위자드의 이론 제작, 편집 및 빌드 전략 뒤에 있는 엘리트 전문가들입니다. 원신 임팩트에 대한 깊은 이해로 선별된 이 전문가들은 캐릭터 빌드, 플레이 스타일 및 게임 메커니즘의 모든 것을 잘 알고 있습니다. 그들의 비할 데 없는 전문성은 커뮤니티에 없어서는 안 될 존재로, 플레이어들이 게임의 모든 측면을 마스터할 수 있도록 안내합니다.
SUMERU_WHO_ARE_WE_DETAILED_TEXT_2: 원신 임팩트에 열정이 있고 지식을 나누고 싶으신가요? 원신 위자드는 항상 뛰어난 인재를 찾아 스메루 학자 사회에 합류할 기회를 제공합니다. 이 엘리트 그룹의 일원이 되어 원신 임팩트 전략의 미래를 형성하는 데 도움을 주세요.
SUMERU_DETAILED_GUIDES_TITLE: 상세 원신 캐릭터 가이드
SUMERU_DETAILED_GUIDES_TEXT: 우리의 세심하게 작성된 가이드를 통해 원신 임팩트 캐릭터의 잠재력을 최대한 발휘하세요. "스메루 학자"라는 헌신적인 전문가 팀이 제공하는 이 가이드는 모든 캐릭터에 대한 가장 정확하고 최신 정보를 제공하여 항상 최고의 전략을 손쉽게 이용할 수 있도록 합니다. 최적의 팀 시너지, 심층적인 플레이 스타일 추천, 또는 승급 재료, 별자리 세부사항, 기술 및 패시브 재능에 대한 빠른 참조가 필요하든, 원신 위자드는 당신을 위해 준비되어 있습니다. 이 모든 필수 정보에 쉽게 접근할 수 있으니, 모든 모험에서 당신의 캐릭터를 위대하게 이끌 준비가 되어 있을 것입니다. 스메루 학자들이 당신의 여정을 정밀하고 전문적으로 안내할 것입니다.
SUMERU_KNOWLEDGE_BASE_TITLE: 종합 지식 베이스
