HOME_INFOGRAPHICS_SECTION_TITLE: 수백 개의 아름다운 인포그래픽에 접근하세요
HOME_INFOGRAPHICS_SECTION_TEXT: Genshin Wizard의 멋진 인포그래픽으로 Genshin Impact 여정의 잠재력을 최대한 활용하세요. 우리의 봇은 모든 세부 사항을 포착하는 픽셀 완벽한 시각화를 제공하여 게임 통계, 캐릭터 빌드 및 진행 상황을 비교할 수 없는 선명도로 보여줍니다. 속도를 위해 설계된 이 인포그래픽은 즉시 생성되어 지체 없이 필요한 정보를 접근할 수 있게 해줍니다. 데스크탑이나 모바일에서든, 모든 장치에 최적화된 접근 가능한 인포그래픽으로 Genshin Impact 성과를 추적하고 공유하며 보여주는 것이 그 어느 때보다 쉬워졌습니다. 오늘 Genshin Wizard를 초대하고 정밀함, 속도 및 접근성의 완벽한 조화를 경험하세요.
HOME_ART_LAYOUTS_SECTION_TITLE: 선호도를 선택하세요
HOME_ART_LAYOUTS_SECTION_TEXT: Genshin Wizard와 함께하면 빌드를 시각적으로 어떻게 표현할지 자유롭게 커스터마이즈할 수 있으며, 동시에 동일한 고품질 정보를 유지할 수 있습니다. 다양한 아트 레이아웃을 통해 개인의 취향에 맞는 스타일을 선택할 수 있습니다. 세련되고 미니멀한 디자인, 생동감 넘치고 예술적인 접근, 또는 그 중간의 스타일을 선호하든, 당신에게 딱 맞는 레이아웃이 있습니다. 각 옵션은 캐릭터 빌드에 대한 동일한 상세 정보를 제공하지만, 독특한 시각적 매력을 더해 경험을 더욱 즐겁게 만듭니다. 당신의 미적 감각에 가장 잘 맞는 레이아웃을 발견하고 Genshin Impact 빌드를 보는 방식을 한층 높여보세요!
HOME_WISH_HISTORY_SECTION_TITLE: 게임... 훨씬 더 정밀하게
HOME_WISH_HISTORY_SECTION_TEXT: Genshin Wizard는 당신의 소원 기록을 한 단계 끌어올려, 풀과 트렌드를 깊이 있게 분석할 수 있는 강력한 도구를 제공합니다. 다양한 필터를 통해 가장 중요한 세부 사항에 집중할 수 있도록 쉽게 뷰를 커스터마이즈할 수 있습니다—5성 운을 추적하든, 과거 이벤트를 검토하든, 무기와 캐릭터 풀을 분석하든 말이죠. 봇은 이 데이터를 생생하고 아름답게 디자인된 인포그래픽으로 제공하여 정보를 명확하게 전달할 뿐만 아니라 시각적으로도 매력적입니다. 우리의 정리된 뷰는 필요한 모든 것이 예상하는 곳에 정확히 위치해 있어 Genshin Impact 여정을 이해하고 공유하기가 그 어느 때보다 쉬워집니다. Genshin Wizard와 함께라면 당신의 소원 기록은 단순한 목록이 아니라, 당신의 방식으로 전해지는 이야기입니다.
HOME_CHARACTER_GUIDES_SECTION_TITLE: 상세 원신 캐릭터 가이드
HOME_ABYSS_SECTION_TITLE: 소용돌이 심연 정복하기
HOME_ABYSS_SECTION_TEXT: Genshin Wizard는 소용돌이 심연을 지배하는 데 필요한 모든 것을 제공합니다. 몇 가지 명령어만으로 캐릭터에 대한 상세 정보를 얻어 현재 심연 도전에 맞게 팀 구성을 최적화할 수 있습니다. 각 층에서 적의 배열, 버프 및 디버프에 대한 최신 정보를 알고 게임을 앞서 나가세요. 전투를 마친 후, 친구들과 결과를 쉽게 보고 공유하세요—최고의 팀, 완료 시간 및 승리를 이끈 전략을 자랑하세요. 다음 실행을 계획하든, 최근의 성공을 축하하든, Genshin Wizard가 모든 것을 가능하게 합니다.
