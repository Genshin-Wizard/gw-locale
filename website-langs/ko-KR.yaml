ABOUT_STORY_TITLE: 우리의 이야기
ABOUT_STORY_TEXT: Genshin Wizard는 2021년 2월 간단한 소원 추적 스크립트로 시작되었습니다. 그 이후로 여러 해에 걸쳐 포괄적인 다목적 Discord 봇으로 발전하여 2025년 7월 기준으로 80,000개 이상의 서버와 130,000명의 등록 사용자에게 서비스를 제공하고 있습니다. 우리의 사명은 Genshin Impact 커뮤니티를 위한 최고의 도구, 가이드 및 기능을 제공하는 것입니다.
