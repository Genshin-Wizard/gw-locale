TEAM_FOUNDER_DESCRIPTION: "Genshin Wizard의 비전가인 hatter는 봇 개발부터 웹사이트 제작, 인프라 관리, 봇 개선/기능 개발, 커뮤니티 참여까지 모든 것을 처리합니다. Genshin Impact와 기술에 대한 열정을 가진 hatter는 전 세계 수십만 명의 플레이어를 위해 Genshin Wizard를 처음부터 끝까지 구축했습니다."
