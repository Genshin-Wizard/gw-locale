HOME_CHARACTER_ENDGAME_SECTION_TITLE: Kuasi Akhir Permainan Anda
HOME_CHARACTER_ENDGAME_SECTION_TEXT: Genshin Wizard memberdayakanmu untuk menaklukkan tantangan terberat Genshin Impact dengan presisi dan gaya. Apakah kamu sedang melewati lantai Spiral Abyss, merencanakan strategi untuk aturan yang berubah di Teater Imaginarium, atau bertahan dari gelombang tanpa henti Stygian Onslaught, kami siap membantumu. Lacak kemajuanmu di semua mode endgame dengan infografis yang dirancang dengan indah yang membuat pencapaianmu bersinar. Analisis kinerja timmu, waktu penyelesaian, kemajuan lantai, dan lainnya—disajikan dalam visual yang bersih dan dapat dibagikan. Statistik Genshinmu belum pernah terlihat sebaik ini.
