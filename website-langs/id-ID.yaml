SUMERU_SCHOLARS_SUBTITLE: "Cendekiawan Sumeru: Master Wawasan Genshin"
SUMERU_SCHOLARS_TEXT: Memberdayakan Perjalanan Anda dengan Keahlian dan Panduan Strategis yang Tak Tertandingi.
SUMERU_KNOWLEDGE_TITLE: Pengetahuan Mendalam
SUMERU_KNOWLEDGE_TEXT: Buka rahasia Genshin Impact dengan keahlian Cendekiawan Sumeru kami. Para spesialis ini memiliki pengetahuan yang tiada tara tentang build karakter, gaya bermain, dan mekanika permainan, membimbing Anda untuk menguasai setiap aspek permainan.
SUMERU_THEORYCRAFTING_TITLE: Teori Crafting Ahli
SUMERU_THEORYCRAFTING_TEXT: Cendekiawan Sumeru kami berada di garis depan teori crafting Genshin Wizard. Dengan keterampilan analitis dan pemahaman mendalam tentang dinamika permainan, mereka merancang strategi yang memberikan pemain keunggulan kompetitif yang mereka butuhkan.
SUMERU_WHO_ARE_WE_DETAILED_TEXT_1: Cendekiawan Sumeru adalah para ahli elit di balik teori crafting, pengeditan, dan strategi build Genshin Wizard. Dipilih karena pemahaman mendalam mereka tentang Genshin Impact, para spesialis ini tahu seluk-beluk build karakter, gaya bermain, dan mekanika permainan seperti tidak ada yang lain. Keahlian mereka yang tiada tara menjadikan mereka sangat berharga bagi komunitas, membimbing pemain untuk menguasai setiap aspek permainan.
SUMERU_WHO_ARE_WE_DETAILED_TEXT_2: Apakah Anda memiliki semangat untuk Genshin Impact dan ingin berbagi pengetahuan Anda? Genshin Wizard selalu mencari individu terampil untuk bergabung dengan masyarakat Cendekiawan Sumeru yang bergengsi. Jadilah bagian dari kelompok elit ini dan bantu membentuk masa depan strategi Genshin Impact.
SUMERU_DETAILED_GUIDES_TITLE: Panduan Karakter Genshin yang Terperinci
SUMERU_DETAILED_GUIDES_TEXT: Buka potensi penuh karakter Genshin Impact Anda dengan panduan kami yang sangat terperinci, dibawa kepada Anda oleh "Cendekiawan Sumeru"—tim editor ahli yang berdedikasi. Panduan ini dibuat dengan tangan untuk memberikan informasi yang paling akurat dan terkini tentang setiap karakter, memastikan Anda selalu memiliki strategi terbaik di ujung jari Anda. Apakah Anda mencari sinergi tim yang optimal, rekomendasi gaya bermain yang mendalam, atau hanya perlu referensi cepat untuk bahan peningkatan, detail konstelasi, atau keterampilan dan bakat pasif, Genshin Wizard siap membantu. Dengan akses mudah ke semua informasi penting ini, Anda akan siap memimpin karakter Anda menuju kejayaan dalam setiap petualangan. Percayakan perjalanan Anda kepada Cendekiawan Sumeru untuk membimbing Anda dengan presisi dan keahlian.
