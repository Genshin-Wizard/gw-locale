TEAM_FOUNDER_DESCRIPTION: "Visi di balik Genshin Wizard, hatter menangani segala hal mulai dari pengembangan bot hingga pembuatan situs web, manajemen infrastruktur, pengembangan fitur/peningkatan bot, dan keterlibatan komunitas. Dengan semangat untuk Genshin Impact dan teknologi, hatter telah membangun Genshin Wizard dari nol untuk melayani ratusan ribu pemain di seluruh dunia."
