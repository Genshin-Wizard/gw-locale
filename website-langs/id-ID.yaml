USER_PLUGIN_PROFILE_NAME: Profil Genshin Wizard
USER_PLUGIN_PROFILE_DESC: Sesuaikan pengaturan profil Genshin Wizard Anda, termasuk preferensi tampilan dan kustomisasi visual. Tambahkan sentuhan pada profil Anda agar menonjol di antara pengguna lain.
USER_PLUGIN_ART_NAME: Kustomisasi Infografis
USER_PLUGIN_ART_DESC: Personalisasi infografis Anda dengan memilih dari berbagai warna, font, dan tata letak. Sesuaikan agar sesuai dengan estetika dan preferensi Anda.
USER_PLUGIN_PRIVACY_NAME: Pengaturan Privasi
USER_PLUGIN_PRIVACY_DESC: Kelola dan kendalikan pengaturan privasi Anda, termasuk siapa yang dapat melihat data Anda dan seberapa banyak informasi yang ingin Anda bagikan dengan orang lain.
USER_PLUGIN_WISHES_REFRESH_NAME: Segarkan Riwayat Harapan
USER_PLUGIN_WISHES_REFRESH_DESC: Segarkan riwayat harapan Anda untuk memastikan Anda memiliki data terbaru tentang tarikan masa lalu Anda, memungkinkan Anda untuk melacak banner terbaru.
USER_PLUGIN_WISHES_STATS_NAME: Lihat Statistik Harapan
USER_PLUGIN_WISHES_STATS_DESC: Analisis statistik harapan Anda secara detail, termasuk tingkat tarikan, hitungan pity, dan peluang jatuh 5-bintang, untuk melacak keberuntungan dan tren Anda seiring waktu.
USER_PLUGIN_WISHES_HISTORY_NAME: Lihat Riwayat Harapan
USER_PLUGIN_WISHES_HISTORY_DESC: Akses riwayat harapan lengkap Anda, menampilkan setiap tarikan yang dilakukan di semua banner, membantu Anda menjaga catatan teratur tentang kemajuan Anda dalam permainan.
USER_PLUGIN_WISHES_IMPORT_NAME: Impor/Ekspor Riwayat Harapan
USER_PLUGIN_WISHES_IMPORT_DESC: Impor atau ekspor data riwayat harapan Anda dengan mudah untuk dibagikan dengan orang lain atau dipindahkan antara perangkat yang berbeda, memastikan Anda tidak pernah kehilangan jejak tarikan Anda.
USER_PLUGIN_HOYOLAB_REGISTER_NAME: Daftar Akun HoYoLAB
USER_PLUGIN_HOYOLAB_REGISTER_DESC: Tautkan akun HoYoLAB Anda untuk membuka fitur tambahan, seperti menyinkronkan riwayat permohonan, mengakses acara khusus, dan mengklaim hadiah dengan lebih mudah.
USER_PLUGIN_HOYOLAB_AUTOCLAIM_NAME: Hadiah Autoclaim Harian
USER_PLUGIN_HOYOLAB_AUTOCLAIM_DESC: Aktifkan fitur premium klaim otomatis harian untuk secara otomatis mengumpulkan hadiah HoYoLAB Anda tanpa perlu masuk secara manual, menghemat waktu Anda setiap hari.
USER_PLUGIN_HOYOLAB_AUTOREDEEM_NAME: Penukaran Kode Otomatis
USER_PLUGIN_HOYOLAB_AUTOREDEEM_DESC: Secara otomatis menukarkan kode dari HoYoLAB untuk mengklaim hadiah tanpa input manual, menyederhanakan proses mendapatkan item dan bonus dalam permainan. (konten tambahan)
SUMERU_NAVIGATION_TITLE: Navigasi Dunia Genshin
SUMERU_NAVIGATION_TEXT: Jelajahi dunia luas Genshin Impact dengan bantuan Cendekiawan Sumeru kami. Panduan dan wawasan mereka yang disusun dengan cermat mencakup setiap karakter, memastikan Anda selalu siap menghadapi tantangan yang diberikan permainan.
SUMERU_WHAT_ARE_TITLE: Apa itu Cendekiawan Sumeru?
SUMERU_WHAT_ARE_TEXT: Cendekiawan Sumeru adalah para ahli elit di balik teori crafting, pengeditan, dan strategi build Genshin Wizard. Dengan pengetahuan dan dedikasi yang luar biasa, mereka memastikan setiap konten memenuhi standar akurasi dan kualitas tertinggi.
