HOME_ABYSS_SECTION_TITLE: Taklukkan Spiral Abyss
HOME_ABYSS_SECTION_TEXT: Genshin Wizard membekali Anda dengan semua yang Anda butuhkan untuk mendominasi Spiral Abyss. Dengan hanya beberapa perintah, Anda dapat mengakses informasi detail tentang karakter Anda, membantu Anda mengoptimalkan komposisi tim untuk tantangan Abyss saat ini. Tetap unggul dalam permainan dengan mengetahui apa yang diharapkan di setiap lantai Abyss, dengan detail terkini tentang lineup musuh, buff, dan debuff. Setelah Anda bertempur, dengan mudah lihat dan bagikan hasil Anda dengan teman—tunjukkan tim terbaik Anda, waktu penyelesaian, dan strategi yang membawa Anda menuju kemenangan. Baik Anda merencanakan jalur berikutnya atau merayakan kesuksesan terbaru Anda, Genshin Wizard membuat semuanya mungkin.
