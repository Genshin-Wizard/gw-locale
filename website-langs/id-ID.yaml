WISHES_IMPORT_INSTRUCTIONS_IMPORTANT: "Sebelum Anda mengimpor, penting untuk mengikuti langkah-langkah ini, jika tidak, impor Anda mungkin tidak disinkronkan seperti yang Anda bayangkan. Karena banyak layanan populer tidak menyimpan id unik dari keinginan, keinginan secara otomatis ditambahkan ke depan riwayat keinginan Anda yang sudah ada."
WISHES_IMPORT_INSTRUCTIONS_SYNC_PREFIX: "Untuk alasan ini, sebelum Anda memutuskan untuk mengimpor, pastikan bahwa keinginan Anda saat ini hingga hari ini sepenuhnya disinkronkan, Anda dapat melakukan ini dengan menggunakan"
WISHES_IMPORT_INSTRUCTIONS_SYNC_SUFFIX: "perintah melalui Genshin Wizard atau mengunjungi"
WISHES_IMPORT_INSTRUCTIONS_SYNC_END: "halaman."
WISHES_IMPORT_INSTRUCTIONS_SOURCES: "Untuk menemukan lebih banyak tentang sumber impor yang didukung, lihat"
WISHES_EXPORT_INSTRUCTIONS_MAIN: "Fitur ekspor Genshin Wizard memungkinkan pengguna untuk dengan mudah menyimpan riwayat keinginan mereka dalam format CSV dengan satu klik. Fungsionalitas yang nyaman ini memastikan bahwa semua data penting Anda, termasuk nomor gulung, hitungan pity, nama item, dan jenis spanduk, disimpan dengan aman dan mudah diakses untuk penggunaan di masa depan."
WISHES_EXPORT_INSTRUCTIONS_USAGE: "Apakah Anda ingin mengimpor kembali data Anda ke Genshin Wizard setelah reset atau membagikannya dengan aplikasi pihak ketiga yang mendukung impor Genshin Wizard, file CSV ini menyediakan solusi yang fleksibel dan portabel. Dengan hanya mengunduh sederhana, riwayat keinginan Anda terjaga dan siap digunakan kapan saja dan di mana saja Anda membutuhkannya."
WISHES_MANAGE_INSTRUCTIONS: "Kelola riwayat keinginan yang diimpor dengan mudah. Anda dapat melihat informasi rinci tentang data yang diimpor, termasuk jumlah keinginan yang diimpor dan masalah potensial yang mungkin terjadi selama proses impor."
