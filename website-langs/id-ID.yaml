ABOUT_STORY_TITLE: Cerita Kami
ABOUT_STORY_TEXT: Genshin Wizard dimulai sebagai skrip pelacakan keinginan sederhana pada Februari 2021. Selama bertahun-tahun, ia telah berkembang menjadi bot Discord multi-fungsi yang komprehensif, melayani lebih dari 80.000 server dan 130.000 pengguna terdaftar per Juli 2025. Misi kami adalah menyediakan alat, panduan, dan fitur terbaik untuk komunitas Genshin Impact.
