TEAM_FOUNDER_TITLE: Grundare & Huvudutvecklare
TEAM_FOUNDER_DESCRIPTION: Visionären bakom Genshin Wizard, hatter hanterar allt från botutveckling till webbplats skapande, infrastrukturhantering, botförbättringar/funktionsutveckling och samhällsengagemang. Med en passion för Genshin Impact och teknik har hatter byggt Genshin Wizard från grunden för att tjäna hundratusentals spelare världen över.
TEAM_DEVELOPERS_TITLE: Utvecklingsteam
TEAM_DEVELOPERS_DESCRIPTION: Vårt begåvade utvecklingsteam arbetar outtröttligt för att föra nya funktioner, förbättringar och innovationer till Genshin Wizard. Varje utvecklare bidrar med unik expertis och engagemang för att göra boten bättre varje dag.
