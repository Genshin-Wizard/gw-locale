SUMERU_KNOWLEDGE_BASE_SUBTITLE_PREFIX: Med
SUMERU_KNOWLEDGE_BASE_SUBTITLE_SUFFIX: detaljerade guider är Genshin Wizard din ultimata följeslagare för att bemästra varje aspekt av Genshin Impact.
