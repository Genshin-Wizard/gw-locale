ABOUT_STORY_TITLE: Vår Berättelse
ABOUT_STORY_TEXT: Genshin Wizard började som ett enkelt önskespårningsskript i februari 2021. Under åren har det utvecklats till en omfattande multifunktionell Discord-bot, som betjänar över 80 000 servrar och 130 000 registrerade användare i juli 2025. Vårt uppdrag är att tillhandahålla de bästa verktygen, guiderna och funktionerna för Genshin Impact-gemenskapen.
