USER_PLUGIN_PROFILE_NAME: Genshin Wizard-profil
USER_PLUGIN_PROFILE_DESC: Justera dina Genshin Wizard-profilinställningar, inklusive visningspreferenser och visuella anpassningar. Lägg till stil i din profil för att få den att sticka ut för andra användare.
USER_PLUGIN_ART_NAME: Anpassa Infografik
USER_PLUGIN_ART_DESC: Personalisera din infografik genom att välja bland olika färger, typsnitt och layouter. Skräddarsy dem för att matcha din estetik och preferenser.
USER_PLUGIN_PRIVACY_NAME: Integritetsinställningar
USER_PLUGIN_PRIVACY_DESC: Hantera och kontrollera dina integritetsinställningar, inklusive vem som kan se dina uppgifter och hur mycket information du vill dela med andra.
USER_PLUGIN_WISHES_REFRESH_NAME: Uppdatera Önskelista
USER_PLUGIN_WISHES_REFRESH_DESC: Uppdatera din önskelista för att säkerställa att du har den senaste informationen om dina tidigare dragningar, så att du kan hålla koll på de senaste bannrarna.
USER_PLUGIN_WISHES_STATS_NAME: Visa Önskestatistik
USER_PLUGIN_WISHES_STATS_DESC: Analysera din önskestatistik i detalj, inklusive dragningar, pity-räknare och 5-stjärniga droppchanser, för att följa din tur och trender över tid.
USER_PLUGIN_WISHES_HISTORY_NAME: Visa Önskelistehistorik
USER_PLUGIN_WISHES_HISTORY_DESC: Få tillgång till din fullständiga önskelistehistorik, som visar varje dragning som gjorts över alla bannrar, vilket hjälper dig att hålla en organiserad översikt över din framsteg i spelet.
USER_PLUGIN_WISHES_IMPORT_NAME: Importera/Exportera Önskelistehistorik
USER_PLUGIN_WISHES_IMPORT_DESC: Importera eller exportera din önskelistehistorik utan problem för att dela med andra eller överföra mellan olika enheter, så att du aldrig tappar bort dina dragningar.
USER_PLUGIN_HOYOLAB_REGISTER_NAME: Registrera HoYoLAB-konto
USER_PLUGIN_HOYOLAB_REGISTER_DESC: Koppla ditt HoYoLAB-konto för att låsa upp ytterligare funktioner, såsom synkronisering av önskelistehistorik, tillgång till speciella evenemang och enklare krav på belöningar.
USER_PLUGIN_HOYOLAB_AUTOCLAIM_NAME: Dagliga Autokrav Belöningar
USER_PLUGIN_HOYOLAB_AUTOCLAIM_DESC: Aktivera den premium dagliga autokravsfunktionen för att automatiskt samla dina HoYoLAB-belöningar utan att behöva logga in manuellt, vilket sparar tid varje dag.
USER_PLUGIN_HOYOLAB_AUTOREDEEM_NAME: Automatisk Kodinlösen
USER_PLUGIN_HOYOLAB_AUTOREDEEM_DESC: Automatiskt lösa in koder från HoYoLAB för att kräva belöningar utan manuell inmatning, vilket strömlinjeformar processen för att få in-game-föremål och bonusar.(ytterligare innehåll)
SUMERU_NAVIGATION_TITLE: Navigera i Genshins Värld
SUMERU_NAVIGATION_TEXT: Navigera i Genshin Impacts stora värld med hjälp av våra Sumeru-skolor. Deras noggrant utformade guider och insikter täcker varje karaktär, vilket säkerställer att du alltid är förberedd för varje utmaning spelet kastar din väg.
SUMERU_WHAT_ARE_TITLE: Vad är Sumeru-skolor?
SUMERU_WHAT_ARE_TEXT: Sumeru-skolor är de elitexperter som ligger bakom Genshin Wizards teoriutveckling, redigering och byggstrategier. Med sin exceptionella kunskap och hängivenhet säkerställer de att varje innehåll möter de högsta standarderna för noggrannhet och kvalitet.
SUMERU_TEAM_DEDICATION_TEXT: ett dedikerat team av expertredaktörer. Dessa skolor arbetar outtröttligt för att leverera innehåll som inte bara är informativt utan också pålitligt och aktuellt.
