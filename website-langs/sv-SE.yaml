WISHES_IMPORT_INSTRUCTIONS_IMPORTANT: Innan du importerar är det viktigt att följa dessa steg, annars kanske din import inte synkroniseras som du tänkt dig. Eftersom många populära tjänster inte lagrar en önskans unika id, läggs önskningar automatiskt till i början av din befintliga önskhistorik.
WISHES_IMPORT_INSTRUCTIONS_SYNC_PREFIX: Av denna anledning, innan du bestämmer dig för att importera, se till att dina nuvarande önskningar fram till dagens datum är helt synkroniserade, du kan göra detta genom att använda
WISHES_IMPORT_INSTRUCTIONS_SYNC_SUFFIX: kommandot genom Genshin Wizard eller besöka
WISHES_IMPORT_INSTRUCTIONS_SYNC_END: sidan.
WISHES_IMPORT_INSTRUCTIONS_SOURCES: För att ta reda på mer om stödda importkällor, kolla in
WISHES_EXPORT_INSTRUCTIONS_MAIN: Genshin Wizards exportfunktion gör det möjligt för användare att enkelt spara sin önskhistorik i CSV-format med ett enda klick. Denna praktiska funktion säkerställer att all din viktiga data, inklusive rullnummer, pity-räknare, objektnamn och banderolltyper, lagras säkert och är lättillgängliga för framtida användning.
WISHES_EXPORT_INSTRUCTIONS_USAGE: Oavsett om du vill återimportera dina data tillbaka till Genshin Wizard efter en återställning eller dela dem med tredjepartsapplikationer som stöder Genshin Wizard-importer, ger denna CSV-fil en flexibel och bärbar lösning. Med bara en enkel nedladdning bevaras din önskhistorik och är redo att användas när och var du behöver den.
WISHES_MANAGE_INSTRUCTIONS: Hantera din importerade önskhistorik med lätthet. Du kan se detaljerad information om dina importerade data, inklusive antalet importerade önskningar och eventuella problem som kan ha uppstått under importprocessen.
