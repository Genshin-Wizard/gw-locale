WISHES_IMPORT_INSTRUCTIONS_IMPORTANT: Перед импортом важно выполнить эти шаги, иначе ваш импорт может не синхронизироваться так, как вы ожидали. Поскольку многие популярные сервисы не хранят уникальный идентификатор желания, желания автоматически добавляются в начало вашей существующей истории желаний.
WISHES_IMPORT_INSTRUCTIONS_SYNC_PREFIX: По этой причине, прежде чем вы решите импортировать, убедитесь, что ваши текущие желания до текущего дня полностью синхронизированы, вы можете сделать это, используя
WISHES_IMPORT_INSTRUCTIONS_SYNC_SUFFIX: команду через Genshin Wizard или посетив
WISHES_IMPORT_INSTRUCTIONS_SYNC_END: страницу.
WISHES_IMPORT_INSTRUCTIONS_SOURCES: Чтобы узнать больше о поддерживаемых источниках импорта, ознакомьтесь с
WISHES_EXPORT_INSTRUCTIONS_MAIN: Функция экспорта Genshin Wizard позволяет пользователям без труда сохранять свою историю желаний в формате CSV одним щелчком мыши. Эта удобная функция гарантирует, что все ваши важные данные, включая номера роллов, количество жалости, названия предметов и типы баннеров, надежно хранятся и легко доступны для будущего использования.
WISHES_EXPORT_INSTRUCTIONS_USAGE: Если вы хотите повторно импортировать свои данные обратно в Genshin Wizard после сброса или поделиться ими с сторонними приложениями, которые поддерживают импорты Genshin Wizard, этот CSV-файл предоставляет гибкое и портативное решение. С простым скачиванием ваша история желаний сохраняется и готова к использованию в любое время и в любом месте.
WISHES_MANAGE_INSTRUCTIONS: Управляйте своей импортированной историей желаний с легкостью. Вы можете просмотреть подробную информацию о ваших импортированных данных, включая количество импортированных желаний и любые потенциальные проблемы, которые могли возникнуть в процессе импорта.
