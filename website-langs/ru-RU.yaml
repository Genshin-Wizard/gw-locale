HOME_INFOGRAPHICS_SECTION_TITLE: Получите доступ к сотням красивых инфографик
HOME_INFOGRAPHICS_SECTION_TEXT: Раскройте весь потенциал вашего путешествия в Genshin Impact с потрясающими инфографиками Genshin Wizard. Наш бот предоставляет пиксельно точные визуализации, которые захватывают каждую деталь, обеспечивая, чтобы ваши игровые статистики, постройки персонажей и прогресс были представлены с непревзойденной ясностью. Созданные для скорости, эти инфографики генерируются мгновенно, позволяя вам получать необходимую информацию без задержек. Независимо от того, находитесь ли вы на компьютере или мобильном устройстве, наши доступные инфографики оптимизированы для всех устройств, что делает отслеживание, обмен и демонстрацию ваших достижений в Genshin Impact проще, чем когда-либо. Пригласите Genshin Wizard сегодня и испытайте безупречное сочетание точности, скорости и доступности.
HOME_ART_LAYOUTS_SECTION_TITLE: Выберите свои предпочтения
HOME_ART_LAYOUTS_SECTION_TEXT: С Genshin Wizard у вас есть свобода настраивать, как ваши сборки визуально представлены, при этом сохраняя ту же высококачественную информацию. Наши различные художественные макеты позволяют вам выбрать стиль, который соответствует вашему личному вкусу. Независимо от того, предпочитаете ли вы стильный и минималистичный дизайн, яркий и художественный подход или что-то среднее, есть макет, который идеально подходит вам. Каждый вариант предлагает те же подробные сведения о ваших сборках персонажей, но с уникальным визуальным стилем, который делает ваш опыт более приятным. Откройте для себя макет, который лучше всего соответствует вашей эстетике, и поднимите уровень восприятия ваших сборок в Genshin Impact!
HOME_WISH_HISTORY_SECTION_TITLE: Игровой процесс... с гораздо большей точностью
HOME_WISH_HISTORY_SECTION_TEXT: Genshin Wizard поднимает вашу историю желаний на новый уровень, предлагая мощные инструменты для глубокого анализа ваших призывов и трендов. С широким спектром фильтров вы можете легко настроить свой вид, чтобы сосредоточиться на конкретных деталях, которые имеют наибольшее значение — будь то отслеживание вашей удачи с 5-звездочными персонажами, обзор прошлых событий или анализ призывов оружия против персонажей. Бот представляет эти данные в ярких, красиво оформленных инфографиках, которые не только делают информацию ясной, но и визуально привлекательной. Наши организованные представления гарантируют, что все, что вам нужно, находится именно там, где вы этого ожидаете, что делает понимание и обмен вашим путешествием в Genshin Impact проще, чем когда-либо. С Genshin Wizard ваша история желаний — это не просто список — это история, рассказанная вашим способом.
HOME_CHARACTER_GUIDES_SECTION_TITLE: Подробные руководства по персонажам Genshin
HOME_ABYSS_SECTION_TITLE: Покорите Спиральный Бездна
HOME_ABYSS_SECTION_TEXT: Genshin Wizard предоставляет вам все необходимое, чтобы доминировать в Спиральном Бездна. С помощью всего нескольких команд вы можете получить подробную информацию о ваших персонажах, что поможет вам оптимизировать состав вашей команды для текущих вызовов Бездна. Будьте на шаг впереди, зная, чего ожидать на каждом этаже Бездна, с актуальными данными о составах врагов, баффах и дебаффах. После того, как вы пробьетесь через все испытания, легко просматривайте и делитесь своими результатами с друзьями — демонстрируйте свои лучшие команды, время завершения и стратегии, которые привели к вашей победе. Независимо от того, планируете ли вы следующий забег или отмечаете свой последний успех, Genshin Wizard делает это возможным.
HOME_COMMANDS_SECTION_TITLE: Супер универсальный
