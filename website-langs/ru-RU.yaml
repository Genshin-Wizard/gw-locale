SUMERU_SCHOLARS_SUBTITLE: "Ученые Сумеру: Мастера Понимания Геншина"
SUMERU_SCHOLARS_TEXT: Укрепляя Ваш Путь Непревзойденным Опыт и Стратегическим Руководством.
SUMERU_KNOWLEDGE_TITLE: Глубокие Знания
SUMERU_KNOWLEDGE_TEXT: Откройте секреты Genshin Impact с помощью экспертизы наших Ученых Сумеру. Эти специалисты обладают непревзойденными знаниями о сборках персонажей, стилях игры и механике игры, направляя вас к мастерству каждого аспекта игры.
SUMERU_THEORYCRAFTING_TITLE: Экспертный Теоретический Анализ
SUMERU_THEORYCRAFTING_TEXT: Наши Ученые Сумеру находятся на переднем крае теоретического анализа Genshin Wizard. Благодаря своим аналитическим навыкам и глубокому пониманию динамики игры они разрабатывают стратегии, которые дают игрокам конкурентное преимущество.
SUMERU_WHO_ARE_WE_DETAILED_TEXT_1: Ученые Сумеру — это элитные эксперты, стоящие за теоретическим анализом, редактированием и стратегиями сборок Genshin Wizard. Отобранные за их глубокое понимание Genshin Impact, эти специалисты знают все тонкости сборок персонажей, стилей игры и механики игры как никто другой. Их непревзойденная экспертиза делает их незаменимыми для сообщества, направляя игроков к мастерству каждого аспекта игры.
SUMERU_WHO_ARE_WE_DETAILED_TEXT_2: Вы увлечены Genshin Impact и хотите поделиться своими знаниями? Genshin Wizard всегда ищет талантливых людей, чтобы присоединиться к престижному обществу Ученых Сумеру. Станьте частью этой элитной группы и помогите формировать будущее стратегии Genshin Impact.
SUMERU_DETAILED_GUIDES_TITLE: Подробные Руководства по Персонажам Геншина
SUMERU_DETAILED_GUIDES_TEXT: Раскройте весь потенциал ваших персонажей Genshin Impact с помощью наших тщательно детализированных руководств, предоставленных "Ученые Сумеру" — преданной команды экспертов-редакторов. Эти руководства созданы вручную, чтобы предоставить вам наиболее точную и актуальную информацию о каждом персонаже, гарантируя, что у вас всегда есть лучшие стратегии под рукой. Независимо от того, ищете ли вы оптимальные синергии команды, подробные рекомендации по стилю игры или просто нуждаетесь в быстром справочнике по материалам для восхождения, деталям созвездий или навыкам и пассивным талантам, Genshin Wizard всегда поможет. С легким доступом ко всей этой важной информации вы будете готовы вести своих персонажей к величию в каждом приключении. Доверьтесь Ученым Сумеру, чтобы направлять ваше путешествие с точностью и экспертизой.
SUMERU_KNOWLEDGE_BASE_TITLE: Комплексная База Знаний
SUMERU_KNOWLEDGE_BASE_SUBTITLE_PREFIX: С
SUMERU_KNOWLEDGE_BASE_SUBTITLE_SUFFIX: подробными руководствами, Genshin Wizard — ваш идеальный спутник для освоения каждого аспекта Genshin Impact.
