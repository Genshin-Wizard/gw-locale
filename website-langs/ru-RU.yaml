USER_PLUGIN_PROFILE_NAME: Профиль Genshin Wizard
USER_PLUGIN_PROFILE_DESC: Настройте параметры своего профиля Genshin Wizard, включая предпочтения отображения и визуальные настройки. Добавьте изюминку в свой профиль, чтобы он выделялся среди других пользователей.
USER_PLUGIN_ART_NAME: Настроить инфографику
USER_PLUGIN_ART_DESC: Персонализируйте свою инфографику, выбрав из множества цветов, шрифтов и макетов. Настройте их в соответствии с вашим стилем и предпочтениями.
USER_PLUGIN_PRIVACY_NAME: Настройки конфиденциальности
USER_PLUGIN_PRIVACY_DESC: Управляйте и контролируйте свои настройки конфиденциальности, включая то, кто может видеть ваши данные и сколько информации вы хотите делиться с другими.
USER_PLUGIN_WISHES_REFRESH_NAME: Обновить историю желаний
USER_PLUGIN_WISHES_REFRESH_DESC: Обновите свою историю желаний, чтобы убедиться, что у вас есть последние данные о ваших прошлых вытаскиваниях, позволяя вам отслеживать самые последние баннеры.
USER_PLUGIN_WISHES_STATS_NAME: Просмотреть статистику желаний
USER_PLUGIN_WISHES_STATS_DESC: Анализируйте свою статистику желаний в деталях, включая коэффициенты вытаскивания, количество жалости и шансы на выпадение 5-звездочных предметов, чтобы отслеживать свою удачу и тенденции со временем.
USER_PLUGIN_WISHES_HISTORY_NAME: Просмотреть историю желаний
USER_PLUGIN_WISHES_HISTORY_DESC: Получите доступ к полной истории желаний, отображая каждое вытаскивание, сделанное на всех баннерах, помогая вам вести организованный учет вашего прогресса в игре.
USER_PLUGIN_WISHES_IMPORT_NAME: Импорт/Экспорт истории желаний
USER_PLUGIN_WISHES_IMPORT_DESC: Бесшовно импортируйте или экспортируйте данные своей истории желаний, чтобы делиться ими с другими или переносить между разными устройствами, гарантируя, что вы никогда не потеряете учет своих вытаскиваний.
USER_PLUGIN_HOYOLAB_REGISTER_NAME: Зарегистрировать аккаунт HoYoLAB
USER_PLUGIN_HOYOLAB_REGISTER_DESC: Свяжите свой аккаунт HoYoLAB, чтобы разблокировать дополнительные функции, такие как синхронизация истории желаний, доступ к специальным событиям и более легкое получение наград.
USER_PLUGIN_HOYOLAB_AUTOCLAIM_NAME: Ежедневные автоматические награды
USER_PLUGIN_HOYOLAB_AUTOCLAIM_DESC: Включите функцию автоматического получения премиум-наград, чтобы автоматически собирать свои награды HoYoLAB без необходимости входа вручную, экономя ваше время каждый день.
USER_PLUGIN_HOYOLAB_AUTOREDEEM_NAME: Авто Обмен Кодом
USER_PLUGIN_HOYOLAB_AUTOREDEEM_DESC: Автоматически обменивайте коды из HoYoLAB, чтобы получать награды без ручного ввода, упрощая процесс получения игровых предметов и бонусов.(дополнительный контент)
SUMERU_NAVIGATION_TITLE: Навигация по Миру Геншина
SUMERU_NAVIGATION_TEXT: Исследуйте обширный мир Genshin Impact с помощью наших Ученых Сумеру. Их тщательно составленные руководства и инсайты охватывают каждого персонажа, гарантируя, что вы всегда готовы к любым вызовам, которые игра бросает вам.
SUMERU_WHAT_ARE_TITLE: Что такое Ученые Сумеру?
SUMERU_WHAT_ARE_TEXT: Ученые Сумеру — это элитные эксперты, стоящие за теоретическим анализом, редактированием и стратегиями сборок Genshin Wizard. Благодаря своим исключительным знаниям и преданности делу они обеспечивают соответствие каждого элемента контента самым высоким стандартам точности и качества.
SUMERU_TEAM_DEDICATION_TEXT: преданная команда экспертов-редакторов. Эти Ученые неустанно работают, чтобы предоставить контент, который не только информативен, но и надежен и актуален.
