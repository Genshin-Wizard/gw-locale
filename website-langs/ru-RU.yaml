TEAM_FOUNDER_DESCRIPTION: "Визионер Genshin Wizard, hatter отвечает за всё: от разработки бота до создания сайта, управления инфраструктурой, улучшения бота/разработки функций и взаимодействия с сообществом. С любовью к Genshin Impact и технологиям, hatter построил Genshin Wizard с нуля, чтобы обслуживать сотни тысяч игроков по всему миру."
TEAM_DEVELOPERS_TITLE: Команда разработчиков
TEAM_DEVELOPERS_DESCRIPTION: Наша талантливая команда разработчиков tirelessly работает над новыми функциями, улучшениями и инновациями для Genshin Wizard. Каждый разработчик приносит уникальную экспертизу и преданность, чтобы делать бота лучше с каждым днём.
