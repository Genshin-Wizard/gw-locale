USER_PLUGIN_WISHES_REGISTER_DESC: Отслеживайте свою историю желаний в Genshin Impact и анализируйте свою удачу с помощью подробной статистики и аналитики.
HOME_CHARACTER_ENDGAME_SECTION_TITLE: Овладейте своим эндгеймом
HOME_CHARACTER_ENDGAME_SECTION_TEXT: Genshin Wizard дает вам возможность преодолевать самые сложные испытания Genshin Impact с точностью и стилем. Независимо от того, проходите ли вы этажи Спиральной Бездна, разрабатываете стратегию для меняющихся правил Театра Имагинария или выживаете в неумолимых волнах Стигийского Нападения, мы вас поддержим. Легко отслеживайте свой прогресс во всех режимах конца игры с помощью красиво оформленных инфографик, которые делают ваши достижения яркими. Анализируйте производительность вашей команды, время завершения, прогресс по этажам и многое другое — представлено в чистых, удобных для обмена визуалах. Ваша статистика Genshin никогда не выглядела так хорошо.
