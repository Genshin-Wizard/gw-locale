CHARACTER_ROLE_INTEGRATION_DESCRIPTION: Настройте автоматическое назначение ролей на основе достижений, специфичных для персонажа, таких как уровень дружбы, созвездие и короны талантов.
CHARACTER_ROLE_INTEGRATION_TITLE: Интеграция ролей, ориентированная на персонажей
CHARACTERS_REQUIRED: Всего требуется персонажей C6
CONGRATULATIONS_CHANNEL: Канал поздравлений
CONSTELLATION_ROLE: Роль созвездия C6
CONSTELLATION_ROLE_C2: Роль созвездия C2+
CONSTELLATION_ROLE_C2_DESCRIPTION: Роль назначается, когда пользователь разблокирует как минимум 2 созвездия для этого персонажа.
CONSTELLATION_ROLE_DESCRIPTION: Роль назначается, когда пользователь разблокирует все 6 созвездий для этого персонажа.
CROWNED_ROLE: Роль с тремя коронами
CROWNED_ROLE_DESCRIPTION: Роль назначается, когда пользователь коронует все три таланта (повышенные до 10) для этого персонажа.
DIRE_ROLE: Роль на сложном уровне (Сложность 6)
DIRE_ROLE_DESCRIPTION: Роль назначается пользователям, которые завершают Страшное Наступление на сложном уровне.
DOLPHIN_ROLE: Роль Дельфина
DOLPHIN_ROLE_DESCRIPTION: Легкий тратитель - обычно имеет несколько персонажей C3+ и оружия R3+.
ENABLE_INTEGRATION: Включить интеграцию
ENABLE_ROLE: Включить эту роль
FEARLESS_ROLE: Роль на бесстрашном уровне (Сложность 5)
FEARLESS_ROLE_DESCRIPTION: Роль назначается пользователям, которые завершают Страшное Наступление на бесстрашном уровне.
FRIENDSHIP_ROLE: Роль уровня дружбы 10
FRIENDSHIP_ROLE_DESCRIPTION: Роль назначается, когда пользователь достигает уровня дружбы 10 с этим персонажем.
IMAGINARIUM_THEATER_INTEGRATION_DESCRIPTION: Настройте автоматическое назначение ролей для пользователей, которые достигли 12 звезд на Лунной Сложности в Имаджинарии Театра.
IMAGINARIUM_THEATER_INTEGRATION_TITLE: Интеграция Ролей Имаджинарии Театра
LEVEL_100_ROLE: Роль Уровня 100
LEVEL_100_ROLE_DESCRIPTION: Роль, назначаемая, когда пользователь поднимает этого персонажа до Уровня 100.
LEVIATHAN_ROLE: Роль Левиафана
LEVIATHAN_ROLE_DESCRIPTION: Мега тратитель - обычно имеет всех или почти всех персонажей C6 и оружие R5.
REQUIREMENTS: Требования
RESET_ALL_SETTINGS: Сбросить Все Настройки
RESET_ROLE_INTEGRATIONS_WARNING: Это сбросит ВСЕ настройки интеграции ролей к значениям по умолчанию. Это действие нельзя отменить!
SEND_CONGRATULATIONS_MESSAGE: Отправить Сообщение Поздравления
SERVER_LOG_CHANNEL_DESCRIPTION: Настройте канал, в котором будут записываться события интеграции ролей.
SPENDER_ROLES_DESCRIPTION: Настройте автоматическое назначение ролей на основе показателей расходов аккаунта (персонажи C6 5-звездочные и оружие R5 5-звездочное).
SPENDER_ROLES_TITLE: Интеграция Ролей Тратителей
SPIRAL_ABYSS_INTEGRATION_DESCRIPTION: Настройте автоматическое назначение ролей для пользователей, которые достигли 36 звезд в Спиральной Бездна.
SPIRAL_ABYSS_INTEGRATION_TITLE: Интеграция Ролей Спиральной Бездна
SPIRAL_ABYSS_ROLE: Роль Достижения Спиральной Бездна
SPIRAL_ABYSS_ROLE_DESCRIPTION: Роль, назначаемая пользователям, которые достигли 36 звезд в Спиральной Бездна.
STANDARD_CHARACTERS_REQUIRED: Требуются Стандартные Персонажи C6
STYGIAN_ONSLAUGHT_INTEGRATION_DESCRIPTION: Настройте автоматическое назначение ролей для пользователей на основе их достижений в Стигийском Нападении.
STYGIAN_ONSLAUGHT_INTEGRATION_TITLE: Интеграция Ролей Стигийского Нападения
THEATER_ROLE: Роль Достижения Театра
THEATER_ROLE_DESCRIPTION: Роль, назначаемая пользователям, которые достигли 12 звезд на Лунной Сложности в Имаджинарии Театра.
WEAPONS_REQUIRED: Требуется Всего Оружия R5
WHALE_ROLE: Роль китов
WHALE_ROLE_DESCRIPTION: Крупный тратитель - обычно имеет несколько персонажей C6 и оружие R5.
SELECT_CHARACTER: Выбрать Персонажа
CONFIGURED_CHARACTER: Настроенный Персонаж
NO_CHARACTER_CONFIGURED: Пока не настроен ни один персонаж. Используйте команду бота /role-setup, чтобы настроить интеграцию ролей для конкретного персонажа.
DIRE_UNDER_180_ROLE: Роль Директоров Под 180 (Сложность 7)
DIRE_UNDER_180_ROLE_DESCRIPTION: Роль, назначаемая пользователям, которые завершают Стигийское Нападение на Директоров за менее чем 180 секунд.
LEVEL_100_REQUIRED: Требуются Персонажи Уровня 100
