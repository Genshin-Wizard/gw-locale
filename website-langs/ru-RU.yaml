ABOUT_STORY_TITLE: Наша история
ABOUT_STORY_TEXT: Genshin Wizard начался как простой скрипт для отслеживания желаний в феврале 2021 года. За эти годы он превратился в многофункциональный Discord-бот, обслуживающий более 80,000 серверов и 130,000 зарегистрированных пользователей по состоянию на июль 2025 года. Наша миссия — предоставить лучшие инструменты, руководства и функции для сообщества Genshin Impact.
