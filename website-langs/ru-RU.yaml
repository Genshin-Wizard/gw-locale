REGISTRATION_CONVENIENCE_WARNING: Этот метод просто здесь для удобства/QOL. Если вас беспокоит безопасность вашей учетной записи, пожалуйста, используйте метод скрипта или другую форму регистрации. Дружеское напоминание, что Genshin Wizard не хранит никаких данных вашей учетной записи! Этот метод регистрации получает необходимые куки, необходимые для просмотра статистики вашей учетной записи.
ENTER_VERIFICATION_CODE_EMAIL: Пожалуйста, введите код подтверждения, отправленный на ваш адрес электронной почты, чтобы завершить процесс регистрации.
CAPTCHA_SEND_EMAIL: Для отправки кода подтверждения электронной почты требуется капча. Пожалуйста, пройдите проверку капчи, чтобы продолжить. Если вы не видите всплывающих окон или капча не загружается, убедитесь, что ваш браузер разрешает всплывающие окна и что у вас стабильное интернет-соединение.
CAPTCHA_SEND_OTP: Для отправки кода подтверждения требуется пройти проверку капчи. Пожалуйста, завершите задачу капчи, чтобы продолжить. Если вы не видите всплывающих окон или капча не загружается, убедитесь, что ваш браузер разрешает всплывающие окна и что у вас стабильное интернет-соединение.
CAPTCHA_COMPLETE_CHALLENGE: Пожалуйста, пройдите капчу, чтобы продолжить регистрацию. Если вы не видите всплывающих окон или капча не загружается, убедитесь, что ваш браузер разрешает всплывающие окна и что у вас стабильное интернет-соединение.
