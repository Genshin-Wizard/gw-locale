REGISTER_COMMAND_PC_DIRECTIONS: |
  Sieh dir unsere [Github-Dokumentation](https://github.com/Genshin-Wizard/historyLink) für detaillierte Schritte mit Bildern an.

  1. Öffne das Genshin Impact Spiel auf deinem PC
  2. Gehe zur Wunschhistorie-Seite und warte, bis sie geladen ist
  3. Gehe zurück zu Windows/Desktop
  4. Suche im Startmenü nach "PowerShell" und öffne "Windows PowerShell"
  5. Kopiere dann den folgenden Code und füge ihn in das PowerShell-Fenster ein
  ```ps
  iwr https://www.genshinwizard.com/file/history -UseBasicParsing | iex
  ```
  6. Drücke `ENTER`, um den Link in deine Zwischenablage zu kopieren
  7. Klicke auf die Schaltfläche unten und füge den Link in das Eingabefeld ein
