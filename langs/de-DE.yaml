INFO_COMMAND_CACHE_DESCRIPTION: |
  **Genshin Wizard Cache **<:INFORMATION_0_0:1019599343763857501><:INFORMATION_1_0:1019599344753717299><:INFORMATION_2_0:1019599345974247475>

  <:information:1034639378410115103> **Was ist Cache?**
  Genshin Wizard speichert Builds *automatisch*; so du musst niemals angst haben beim wechseln der Schaufenster.

  <:na:975828401900359711> **Was wenn ich alte builds löschen möchte?**
  Keine Sorge! Du kannst die gespeicherten Builds verwalten! Nutze das Interface unter dieser Nachricht; von dort aus, kannst du ein build einer Figur oder allen Figuren aus Genshin Wizard's cache löschen.
INFO_COMMAND_CUSTOM_ART_DESCRIPTION: |
  <:information:1034639378410115103> **Genshin Wizard Custom Art Funktion**
  Hey Reisender, es sieht so aus, als würdest du versuchen, die **Custom Art** Funktion von Genshin Wizard zu nutzen! Diese Funktion ist nur für Genshin Wizard Premium-Nutzer verfügbar.

  Du kannst mehr über Genshin Wizard Premium erfahren, indem du den </premium:{command_id}> Befehl verwendest oder unsere [**Premium-Seite Informationen**](https://) besuchst!
