HOYOLAB_REGISTER_SCRIPT_TITLE: Registrierung | Skript Methode
HOYOLAB_REGISTER_SCRIPT_DESCRIPTION: |
  **Wie du deinen HoYoLAB-Account mit Genshin Wizard verknüpfst**
  > **1.** Zu beginn, logge dich bei deinem [**HoYoLAB**](https://www.hoyolab.com/home) Account.
  > **2.** Gib `java` in die Adressleiste ein, gefolgt von dem unten stehenden Skript.
  > **3.** Sobald das Skript erfolgreich ausgeführt wurde, klicke auf die Schaltfläche `Hier klicken, um zu kopieren!` um den Cookie zu kopieren.
  > **4.** Schließlich kannst du dich registrieren, indem du auf die Schaltfläche 'Cookie' klickst und den Cookie einfügst, das du kopiert hast.
HOYOLAB_REGISTER_SCRIPT: |
  ```script:check = document.cookie.includes('account_id') && document.cookie.includes('cookie_token') || alert('Bitte melde dich ab und melde dich erneut an, und führe es erneut aus; Der Cookie ist derzeit abgelaufen/ungültig!'); cookie=document.cookie.match(/(lt(oken|uid)|cookie_token)=(.*?);/gm).join(" "); prüfen Sie && document.write(cookie + `<br><button onclick="navigator.clipboard.writeText('${cookie}')">Klicke hier, um zu kopieren!</button>`)```
HOYOLAB_REGISTER_LOGIN_TITLE: Registrierung | Anmeldemethode
HOYOLAB_REGISTER_LOGIN_DESCRIPTION: |
  **Wie Sie Ihr HoYoLAB-Konto mit Genshin Wizard verknüpfen**
  > **1.** Um zu beginnen, wählen Sie unten den "Registrieren"-Button aus.
  > **2.** In den Eingabefeldern geben Sie Ihre HoYoLAB-Zugangsdaten ein, vergessen Sie nicht, Ihre **E-Mail** und Ihr Passwort zu verwenden.
  > **3. * Sobald du deine Kontodaten erfolgreich eingegeben hast, warten einen moment bis Genshin Wizard Registrierungsanfrage bearbeitet. Bitte beachte, dass dies ein oder zwei Minuten dauern kann.
  > **4. * Schließlich, wenn alle Schritte korrekt ausgeführt wurden, erhällst du eine **Bestätigungsnachricht** über DMs mit der Angabe der erfolgreichen Verlinkung Ihres Kontos.

  <:information:1021014187197083668> **Notiz:** Diese Methode ist einfach hier für Bequemlichkeit/QOL. Wenn Sie sich Sorgen über die Sicherheit Ihres Kontos machen, verwenden Sie bitte stattdessen die Skriptmethode oder eine andere Form der Registrierung.
HOYOLAB_REGISTER_LOGIN_FOOTER: Eine freundliche Erinnerung, dass Genshin Wizard keiner ihrer Kontodaten speichert! Diese Registrierungsmethode ruft die notwendigen Cookies ab, um Ihre Kontostatistiken einzusehen.
