RECOVER_COMMAND_INSTRUCTIONS: |
  Hast du den Zugriff auf dein Genshin Wizard-Konto verloren und möchtest dein Konto erneut verknüpfen? Du bist hier genau richtig!

  Klicke auf die Schaltfläche unten, um den **Wiederherstellungsprozess** zu starten.
METHOD_ONE_BUTTON: Methode 1
METHOD_TWO_BUTTON: Methode 2
METHOD_THREE_BUTTON: Methode 3
METHOD_MANUAL_BUTTON: Manuell
METHOD_ONE_TITLE: Wunschverlauf Registrierung | Methode 1
METHOD_TWO_TITLE: Wunschverlauf Registrierung | Methode 2
METHOD_THREE_TITLE: Wunschverlauf Registrierung | Methode 3
METHOD_MANUAL_TITLE: Wunschverlauf Registrierung | Manuelle Methode
METHOD_TWO_DESCRIPTION: |
  1. Suche im Startmenü nach "PowerShell" und öffne "Windows PowerShell"
  2. Kopiere dann den folgenden Code und füge ihn in das PowerShell-Fenster ein
  ```ps
  iex('Write-Host "Kopiere die Wunschverlaufstabelle!";while(1) { $c = Get-Clipboard -TextFormatType Html; if ($c -match "^SourceURL:https:/.+log") { break; }; for($i=5; $i -gt 0; $i--) { Write-Host "`rÜberprüfe in $i" -NoNewline; Sleep 1; }; }; Write-Host " OK"; $m=(((Get-Clipboard -TextFormatType Html) | Select-String "(https:/.+log)").Matches[0].Value);$m; Set-Clipboard -Value $m;')
  ```
  3. Gehe zum Genshin Impact-Spiel und öffne die Wunschverlauf-Seite
  4. Drücke `ENTER`, um den Link in deine Zwischenablage zu kopieren
  5. Klicke auf die Schaltfläche unten und füge den Link in das Eingabefeld ein
METHOD_THREE_DESCRIPTION: |
  1. Suche im Startmenü nach "PowerShell" und öffne "Windows PowerShell"
  2. Kopiere dann den folgenden Code und füge ihn in das PowerShell-Fenster ein
  ```ps
  Set-ExecutionPolicy Bypass -Scope Process -Force; [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072; iex ((New-Object System.Net.WebClient).DownloadString('https://gist.githubusercontent.com/MadeBaruna/bf36bad751dc9221067ca1e31ab08255/raw/cb73a9f46f08fad6f27581ebb1a6249ba086af13/read.ps1'))
  ```
  3. Gehe zum Genshin Impact-Spiel und öffne die Wunschverlauf-Seite
  4. Drücke `ENTER`, um den Link in deine Zwischenablage zu kopieren
  5. Klicke auf die Schaltfläche unten und füge den Link in das Eingabefeld ein
METHOD_MANUAL_DESCRIPTION: |
  1. Öffne das Genshin Impact-Spiel auf deinem PC (Stelle sicher, dass du das Spiel neu startest, wenn du mehrere Konten verwendest/Computer teilst)
  2. Gehe zur Wunschverlauf-Seite und warte, bis sie geladen ist
  3. Öffne den Installationsordner für Genshin Impact (d.h. C:\Games\Genshin Impact\Genshin Impact-Spiel)
  4. Öffne die Ordner "GenshinImpact_Data" > "webCaches" > "2.13.0.1" > "Cache" > "Cache_Data"
  5. Klicke mit der rechten Maustaste auf die Datei "data_2", klicke dann auf "Öffnen mit" und wähle Notepad (Wenn du einen Fehler wie "Der Prozess kann auf die Datei nicht zugreifen, da sie von einem anderen Prozess verwendet wird" erhältst, beende bitte zuerst das Spiel)
  6. Drücke CTRL+F, aktiviere `Umwickeln`, und wähle die Richtung `Nach oben`, suche dann im Eingabefeld nach "**e20190909gacha-v2**" (ohne Anführungszeichen). Klicke schließlich auf `Nächste finden`
  7. Kopiere den Link von *`https://webstatic`* bis *`game_biz=hk4e_global`*, die URL sieht so aus: *`https://webstatic-sea.hoyoverse.com/genshin/event/e20190909gacha-v2/index.html?.......&game_biz=hk4e_global`*
