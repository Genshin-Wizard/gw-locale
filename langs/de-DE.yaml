LINKING_UID_DIRECTIONS: |
  Hallo Reisender! Um die angeforderte UID mit Genshin Wizard zu verknüpfen, müssen wir **verifizieren**, dass dieses Konto tatsächlich deins ist!

  **Einmaliger Verifizierungsschlüssel**
  ```yaml
  {key}```
  **Läuft ab in:**
  <t:{timeout}:R>

  Wie vervollständige ich die Verifizierung?
  > **1)** Gehe ins Spiel und füge den obigen Schlüssel **irgendwo** in deiner Profilunterschrift oder deinem Spitznamen hinzu.
  > **2)** Stelle sicher, dass du den obigen Schlüssel **genau** so kopierst, wie er geschrieben ist, sonst kann der Bot dein Konto nicht verifizieren.
  > **3)** *Das war's*! Bitte warte geduldig, bis unser Bot dich verifizieren kann.
LINKING_UID_FOOTER: Bitte sei geduldig, während wir dein Konto verifizieren! Diese Änderungen können zwischen 5-10 Minuten dauern, bis sie auf unserer Seite erscheinen.
LINKING_UID_KEY_EXPIRED: Es sieht so aus, als wäre dieser Schlüssel jetzt **abgelaufen**! Leider konnten wir dich zu diesem Zeitpunkt nicht verifizieren, bitte versuche es später erneut.
