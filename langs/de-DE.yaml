REGISTER_COMMAND_PLATFORM_SELECTION_DIRECTIONS: |
  Willkommen im Registrierungssystem von Genshin Wizard.

  **Verknüpfungsfunktionen:**
  > **1.** Behalte deine Wunschhistorie im Auge.
  > **2.** Sieh dir detaillierte Statistiken deiner Wunschhistorie zusammen mit deinen Banner-Pitiy an.
  > **3.** Sieh dir an, ob du auf deiner garantierten limitierten Pitiy bist oder nicht.
  > **4.** Vollständige Genshin Wizard Profilfähigkeiten.
  > **5.** Zugriff auf alle Befehle, die über [**UID verknüpfen**](https://docs.genshinwizard.com/wishing-centre/getting-started#linking-genshin-uid-partial-registration) zugänglich sind.

  Welche Plattform verwendest du, um Genshin Impact zu spielen?
