LINK_HOYOLAB_DESCRIPTION: |
  Willkommen beim HoYoLAB-Account-Verknüpfung System von Genshin Wizard.

  **Verknüpfungsfunktionen:**
  > **1. * Zugriff auf deine Harzanzahl im Spiel in Echtzeit (automatische Benachrichtigungen einrichten).
  > **2.** Zugriff auf deinen in-game Expedition Status in Echtzeit.
  > **3. * Fähigkeit, deine *tägliche Check-in Belohnung* direkt von Discord zu beanspruchen.
  > **4.** Fähigkeit, detaillierte Informationen über deinen Spiralabgrund zu sehen.
  > **5.** Schau dir eine Infografik an, die **alle** deine verfügbaren Figuren enthält.

  Um zu beginnen, klicke auf eine der unten aufgeführten Registrierungsoptionen!
