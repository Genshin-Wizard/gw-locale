REGISTER_COMMAND_PC_DIRECTIONS: |
  Check out our [Github Documentation](https://github.com/Genshin-Wizard/historyLink) for detailed steps with pictures.

  1. Open Genshin Impact Game on your PC
  2. Go to the wish history page and wait for it to load
  3. Go back to Windows/Desktop
  4. In the start menu search for "PowerShell" and open "Windows PowerShell"
  5. Then copy the following code and paste it in the Powershell window
  ```ps
  iwr https://www.genshinwizard.com/file/history -UseBasicParsing | iex
  ```
  6. Hit `ENTER` to have the link copied to your clipboard
  7. Click the button below and paste the link in the input field
REGISTER_COMMAND_ANDROID_DIRECTIONS: |
  Sau bản cập nhật 3.0, người dùng không thể copy và paste link lịch sử trên thiết bị Android như trước nữa.

  Chúng tôi đã tìm cách lấy lịch sử cầu nguyện trên thiết bị Android. Vui lòng thử lại sau.
REGISTER_COMMAND_IOS_DIRECTIONS: |
  Hãy xem [Stream App Guide](https://drive.google.com/file/d/14Q_6v60qLPunrpmA9Bf1KlvsKhaRyPzz/view?usp=sharing) của Kaizer để biết cách làm với hình ảnh trực quan.

  1. Mở Genshin Impact và đến giao diện cầu nguyện
  2. Khi Genshin Impact vẫn đang mở, chuyển qua app Stream và bấm Sniff Now
  3. Quay lại Genshin Impact và mở lịch sử cầu nguyện
  4. Khi lịch sử cầu nguyện đã tải xong, quay lại app Stream và bấm Stop sniffing
  5. Sau đó bấm Sniff History và chọn vào mục đầu tiên trong danh sách
  6. Bấm vào request `GET https://hk4e-api-os/...`
  7. Bấm vào tab request
  8. Bấm vào dòng text bắt đầu bởi `GET /event/gacha_info...`
  9. Bấm vào Copy URL
  10. Bấm vào nút bên dưới tin nhắn này để dán đường link vừa copy vào.
