HOYOLAB_REGISTER_SCRIPT_TITLE: Đăng ký | Sử dụng Script
HOYOLAB_REGISTER_SCRIPT_DESCRIPTION: |
  **Cách liên kết tài khoản HoYoLAB của bạn với Genshin Wizard**
  > **1.** Để bắt đầu, hãy đăng nhập vào tài khoản [**HoYoLAB**](https://www.hoyolab.com/home) của bạn.
  > **2.** Nhập `java` vào thanh địa chỉ của trình duyệt, sau đó sao chép script bên dưới và dán vào thanh địa chỉ (ngay sau chữ 'java').
  > **3.** Sau khi chạy script thành công, hãy bấm vào dòng `Bấm vào đây để copy!` để copy cookie.
  > **4.** Cuối cùng, bạn đã có thể đăng ký bằng cách bấm nút `Nhập Token` bên dưới và dán token bạn vừa copy vào.
HOYOLAB_REGISTER_SCRIPT: |
  ```script:check = document.cookie.includes('account_id') && document.cookie.includes('cookie_token') || alert('Vui lòng đăng xuất và đăng nhập lại tài khoản HoYoLAB của bạn, cookie hiện đã hết hạn/không hợp lệ!'); cookie=document.cookie.match(/(lt(oken|uid)|cookie_token)=(.*?);/gm).join(" "); check && document.write(cookie + `<br><button onclick="navigator.clipboard.writeText('${cookie}')">Bấm vào đây để copy!</button>`)```
HOYOLAB_REGISTER_LOGIN_TITLE: Đăng ký | Phương thức Login
HOYOLAB_REGISTER_LOGIN_DESCRIPTION: |
  **Cách liên kết tài khoản HoYoLAB của bạn với Genshin Wizard**
  > **1.** Để bắt đầu, nhấn nút `Đăng ký` bên dưới.
  > **2.** Ở trường bên dưới, nhập thông tin đăng nhập tài khoản HoYoLAB của bạn, sử dụng **email** và password.
  > **3.** Sau khi bạn đã nhập thông tin, hãy đợi Genshin Wizard xử lý yêu cầu của bạn, xin lưu ý rằng quá trình này sẽ mất vài phút.
  > **4.** Khi quá trình đăng ký hoàn tất, bạn sẽ nhận được **tin nhắn xác nhận** thông qua tin nhắn riêng tư rằng quá trình liên kết tài khoản đã hoàn tất.

  <:information:1021014187197083668> **Lưu ý:** Phương pháp Login này chỉ là để tiện lợi cho bạn. Nếu bạn quan ngại về vấn đề bảo mật tài khoản của mình, hãy cân nhắc sử dụng các phương pháp đăng ký khác.
HOYOLAB_REGISTER_LOGIN_FOOTER: Xin lưu ý rằng Genshin Wizard không lưu trữ thông tin đăng nhập của bạn! Phương thức đăng ký này chỉ tìm kiếm những cookie cần thiết để hiển thị các số liệu từ tài khoản của bạn.
