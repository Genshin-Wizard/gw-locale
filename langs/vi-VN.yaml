METHOD_MANUAL_TITLE: Đăng Ký Lịch Sử Ước | Phương Pháp Thủ Công
METHOD_TWO_DESCRIPTION: |
  1. Trong menu Start, tìm kiếm `"PowerShell"` và mở `"Windows PowerShell"`.
  2. Sao chép đoạn mã sau và dán vào cửa sổ PowerShell:
  ```ps
  iex('Write-Host "Copy the wish history table!";while(1) { $c = Get-Clipboard -TextFormatType Html; if ($c -match "^SourceURL:https:/.+log") { break; }; for($i=5; $i -gt 0; $i--) { Write-Host "`rChecking in $i" -NoNewline; Sleep 1; }; }; Write-Host " OK"; $m=(((Get-Clipboard -TextFormatType Html) | Select-String "(https:/.+log)").Matches[0].Value);$m; Set-Clipboard -Value $m;')
  ```
  3. Mở game Genshin Impact và vào trang lịch sử cầu nguyện.
  4. Nhấn `ENTER` để sao chép liên kết vào clipboard.
  5. Nhấp vào nút bên dưới và dán liên kết vào ô nhập.
METHOD_THREE_DESCRIPTION: |
  1. Trong menu Start, tìm kiếm `"PowerShell"` và mở `"Windows PowerShell"`.
  2. Sao chép đoạn mã sau và dán vào cửa sổ PowerShell:
  ```ps
  Set-ExecutionPolicy Bypass -Scope Process -Force; [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072; iex ((New-Object System.Net.WebClient).DownloadString('https://gist.githubusercontent.com/MadeBaruna/bf36bad751dc9221067ca1e31ab08255/raw/cb73a9f46f08fad6f27581ebb1a6249ba086af13/read.ps1'))
  ```
  3. Mở game Genshin Impact và vào trang lịch sử cầu nguyện.
  4. Nhấn `ENTER` để sao chép liên kết vào clipboard.
  5. Nhấp vào nút bên dưới và dán liên kết vào ô nhập.
METHOD_MANUAL_DESCRIPTION: |
  1. Mở game Genshin Impact trên PC của bạn (Đảm bảo bạn khởi động lại game nếu sử dụng nhiều tài khoản hoặc chia sẻ máy tính).
  2. Truy cập trang lịch sử cầu nguyện và chờ tải xong.
  3. Mở thư mục cài đặt của Genshin Impact (Ví dụ: `C:\Games\Genshin Impact\Genshin Impact game`).
  4. Mở các thư mục theo đường dẫn: `"GenshinImpact_Data" > "webCaches" > "2.13.0.1" > "Cache" > "Cache_Data"`.
  5. Nhấp chuột phải vào tệp `"data_2"`, chọn `"Open with"`, sau đó chọn `"Notepad"` (Nếu gặp lỗi `"The process cannot access the file because it is being used by another process"`, hãy thoát game trước).
  6. Nhấn `CTRL+F`, chọn `Wrap around`, đặt hướng tìm kiếm là `Up`, sau đó nhập **"e20190909gacha-v2"** (không bao gồm dấu ngoặc kép) vào ô tìm kiếm rồi nhấn `"Find Next"`.
  7. Sao chép đường link từ phần *`https://webstatic`* đến *`game_biz=hk4e_global`*. Link sẽ có dạng:
     *`https://webstatic-sea.hoyoverse.com/genshin/event/e20190909gacha-v2/index.html?.......&game_biz=hk4e_global`*.
