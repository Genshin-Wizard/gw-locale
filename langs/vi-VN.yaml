INFO_COMMAND_CACHE_DESCRIPTION: |
  **Genshin Wizard Cache **<:INFORMATION_0_0:1019599343763857501><:INFORMATION_1_0:1019599344753717299><:INFORMATION_2_0:1019599345974247475>
  
  <:information:1034639378410115103> **Cache là gì?**
  Genshin Wizard *tự động lưu* dữ liệu của bạn vào bộ đệm (cache) để bạn không phải đổi nhân vật trên hồ sơ của mình liên tục!
  
  <:na:975828401900359711> **Nếu tôi muốn xóa build nhân vật cũ?**
  Bạn có thể quản lý build nhân vật của bạn ngay trong tin nhắn này!
  Dùng giao diện bên dưới để xóa build cho nhân vật nhất định, hoặc bạn có thể xóa tất cả khỏi bộ đệm của Genshin Wizard.
INFO_COMMAND_CUSTOM_ART_DESCRIPTION: |
  <:information:1034639378410115103> **Tính Năng Nghệ Thuật Tùy Chỉnh Genshin Wizard**
  Chào Traveler, có vẻ như bạn đang cố gắng sử dụng tính năng **Nghệ Thuật Tùy Chỉnh** của Genshin Wizard! Tính năng này chỉ có sẵn cho người dùng Genshin Wizard Premium.
  
  Bạn có thể tìm hiểu thêm về Genshin Wizard Premium bằng cách sử dụng lệnh </premium:{command_id}> hoặc truy cập vào [**Thông Tin Trang Premium**](https://)!
