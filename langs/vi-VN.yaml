REGISTER_COMMAND_CONSOLE_DIRECTIONS: Sau bản cập nhật 2.3 các đường link event không còn hoạt động nữa. Tuy nhiên bạn vẫn có thể lấy key bằng cách liên kết tài khoản Playstation với tài khoản Mihoyo và sử dụng phương pháp pc/mobile.
