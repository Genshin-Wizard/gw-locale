LINK_HOYOLAB_DESCRIPTION: |
  Chào mừng đến với hệ thống liên kết tài khoản HoYoLAB của Genshin Wizard.

  **Lợi ích khi liên kết:**
  >**1.** Hiển thị số Nhựa Nguyên Chất còn lại trong thời gian thực (có thể cài đặt thông báo tự động).
  >**2.** Hiển thị trạng thái Phái Đi Thám Hiểm trong thời gian thực.
  >**3.** Điểm danh hàng ngày HoYoLAB ngay trên Discord.
  >**4.** Hiển thị chi tiết tiến trình La Hoàn Thâm Cảnh của bạn.
  >**5.** Có thể tạo bảng infographic chi tiết về tất cả các nhân vật bạn sở hữu.

  Để bắt đầu liên kết, hãy chọn một trong các tùy chọn liên kết bên dưới!
