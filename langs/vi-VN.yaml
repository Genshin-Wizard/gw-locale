LINKING_UID_DIRECTIONS: |
  Xin chào nhà Lữ Hành! Để tiếp tục kết nối UID đến Genshin Wizard, chúng tôi cần phải **xác thực** rằng tài khoản này là của bạn!
  
  **Mã xác thực**
  ```yaml
  {key}```
  **Hết hạn trong vòng:**
  <t:{timeout}:R>
  
  Các bước hoàn thành xác thực:
  > **1)** Vào trong game và để mã này ở **bất cứ nơi nào** trên nickname hay bio.
  > **2)** Hãy chắc chắn rằng copy **chính xác** mã xác thực hoặc bot không thể xác thực được tài khoản của bạn.
  > **3)** *Xong!* Xin vui lòng đợi cho đến khi bot có thể xác thực bạn.
