REGISTER_COMMAND_PLATFORM_SELECTION_TITLE: Genshin Wizard | Đăng ký Lịch sử Cầu nguyện
REGISTER_COMMAND_PLATFORM_SELECTION_DIRECTIONS: |
  Chào mừng đến với hệ thống đăng kí Genshin Wizard.
  
  **Lợi ích khi đăng kí**
  > **1.** Xem lại lịch sử cầu nguyện của bạn.
  > **2.** Hiển thị thông số cầu nguyện cùng với pity hiện tại.
  > **3.** Kiểm tra bảo hiểm cầu nguyện.
  > **4.** Đầy đủ chức năng profile Genshin Wizard.
  > **5.** Cùng với các chức năng khác qua [**Liên kết UID**](https://docs.genshinwizard.com/wishing-centre/getting-started#linking-genshin-uid-partial-registration).
  
  Bạn đang sử dụng nền tảng nào để chơi Genshin Impact?
