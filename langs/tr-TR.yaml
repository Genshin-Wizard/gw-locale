LINKING_UID_DIRECTIONS: |
  Merhaba Seyyah! İstenen UID'yi Genshin Wizard'a bağlamaya devam etmek için, bu hesabın gerçekten size ait olduğunu **doğrulamamız** gerekiyor!
  
  **Benzersiz Doğrulama Anahtarı**
  ```yaml
  {key}```
  **Son Kullanım:**
  <t:{timeout}:R>
  
  Doğrulamayı nasıl tamamlayabilirim?
  > **1)** Oyuna girin ve yukarıdaki anahtarı profil imzanızda veya takma adınızda **herhangi bir yere** ekleyin.
  > **2)** Yukarıdaki anahtarı **tam olarak** yazıldığı gibi kopyaladığınızdan emin olun, aksi takdirde bot hesabınızı doğrulayamayacaktır.
  > **3)** *Hepsi bu kadar*! Lütfen botumuzun sizi doğrulaması için sabırlı bekleyin.
