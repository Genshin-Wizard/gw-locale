LINK_HOYOLAB_DESCRIPTION: |
  Genshin Wizard'ın HoYoLAB hesap bağlama sistemine hoş geldiniz.
  
  **Bağlama Özellikleri:**
  > **1.** Oyun içindeki reçinelerinizi gerçek zamanlı olarak takip edin (otomatik bildirimleri ayarlayın).
  > **2.** Oyun içindeki sefer durumunu gerçek zamanlı olarak takip edin.
  > **3.** *Günlük Kontrol Ödülünüzü* doğrudan Discord'dan talep edin.
  > **4.** Spiral Abyss ilerlemeniz hakkında derinlemesine bilgi görüntüleyin.
  > **5.** Tüm mevcut karakterlerinizi içeren bir infografik görüntüleyin.
  
  Başlamak için aşağıdaki kullanıcı kayıt seçeneklerinden birine tıklayın!
