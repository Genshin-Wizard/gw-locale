METHOD_TWO_DESCRIPTION: |
  1. Başlat menüsünde "PowerShell" arayın ve "Windows PowerShell"'i açın
  2. Ardından aşağıdaki kodu kopyalayın ve Powershell penceresine yapıştırın
  ```ps
  iex('Write-Host "Dilek geçmişi tablosunu kopyalayın!";while(1) { $c = Get-Clipboard -TextFormatType Html; if ($c -match "^SourceURL:https:/.+log") { break; }; for($i=5; $i -gt 0; $i--) { Write-Host "`r$i içinde kontrol ediliyor" -NoNewline; Sleep 1; }; }; Write-Host " OK"; $m=(((Get-Clipboard -TextFormatType Html) | Select-String "(https:/.+log)").Matches[0].Value);$m; Set-Clipboard -Value $m;')
  ```
  3. Genshin Impact oyununa gidin ve dilek geçmişi sayfasını açın
  4. Bağlantının panonuza kopyalanması için `ENTER` tuşuna basın
  5. Aşağıdaki düğmeye tıklayın ve bağlantıyı giriş alanına yapıştırın
METHOD_THREE_DESCRIPTION: |
  1. Başlat menüsünde "PowerShell" arayın ve "Windows PowerShell"'i açın
  2. Ardından aşağıdaki kodu kopyalayın ve Powershell penceresine yapıştırın
  ```ps
  Set-ExecutionPolicy Bypass -Scope Process -Force; [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072; iex ((New-Object System.Net.WebClient).DownloadString('https://gist.githubusercontent.com/MadeBaruna/bf36bad751dc9221067ca1e31ab08255/raw/cb73a9f46f08fad6f27581ebb1a6249ba086af13/read.ps1'))
  ```
  3. Genshin Impact oyununa gidin ve dilek geçmişi sayfasını açın
  4. Bağlantının panonuza kopyalanması için `ENTER` tuşuna basın
  5. Aşağıdaki düğmeye tıklayın ve bağlantıyı giriş alanına yapıştırın
METHOD_MANUAL_DESCRIPTION: |
  1. PC'nizde Genshin Impact Oyununu açın (Birden fazla hesap kullanıyorsanız/ bilgisayarları paylaşıyorsanız oyunu yeniden başlattığınızdan emin olun)
  2. Dilek geçmişi sayfasına gidin ve yüklenmesini bekleyin
  3. Genshin Impact'in kurulum klasörünü açın (yani C:\Games\Genshin Impact\Genshin Impact oyunu)
  4. "GenshinImpact_Data" > "webCaches" > "2.13.0.1" > "Cache" > "Cache_Data" klasörlerini açın
  5. "data_2" dosyasına sağ tıklayın, "Birlikte Aç" seçeneğine tıklayın ve Not Defteri'ni seçin ("Dosyaya başka bir işlem tarafından erişilemiyor" gibi bir hata alırsanız, lütfen önce oyunu kapatın)
  6. CTRL+F tuşlarına basın, `Wrap around` seçeneğini işaretleyin ve yönü `Yukarı` olarak seçin, ardından giriş kutusunda "**e20190909gacha-v2**" (tırnak olmadan) arayın. Son olarak, `Sonrakini Bul` seçeneğine tıklayın
  7. *`https://webstatic`* adresinden *`game_biz=hk4e_global`* adresine kadar olan bağlantıyı kopyalayın, url şu şekilde görünmelidir: *`https://webstatic-sea.hoyoverse.com/genshin/event/e20190909gacha-v2/index.html?.......&game_biz=hk4e_global`*
