HOYOLAB_REGISTER_SCRIPT_TITLE: Kayıt | Script Yöntemi
HOYOLAB_REGISTER_SCRIPT_DESCRIPTION: |
  **How to link your HoYoLAB account with Genshin Wizard**
  > **1.** To begin with, login to your [**HoYoLAB**](https://www.hoyolab.com/home) account.
  > **2.** Type `java` in the address bar followed by the script down below.
  > **3.** Once you've successfully ran the script, click the `Click here to copy!` button to copy the cookie.
  > **4.** Finally, you're able to register by clicking the `Enter Token` button below and pasting the token you copied.
HOYOLAB_REGISTER_SCRIPT: |
  ```script:check = document.cookie.includes('account_id') && document.cookie.includes('cookie_token') || alert('Lütfen tekrar denemeden önce çıkış yapın ve tekrar giriş yapın, çerez şu anda süresi dolmuş/geçersiz!'); cookie=document.cookie.match(/(lt(oken|uid)|cookie_token)=(.*?);/gm).join(" "); check && document.write(cookie + `<br><button onclick="navigator.clipboard.writeText('${cookie}')">Buraya tıklayarak kopyalayın!</button>`)```
HOYOLAB_REGISTER_LOGIN_TITLE: Kayıt | Giriş Yöntemi
HOYOLAB_REGISTER_LOGIN_DESCRIPTION: |
  **HoYoLAB hesabınızı Genshin Wizard ile nasıl bağlayacağınız**
  > **1.** Başlamak için, aşağıdaki `Kaydol` butonuna tıklayın.
  > **2.** Giriş alanlarına, HoYoLAB hesabınızın giriş bilgilerini girin, **e-posta** ve şifrenizi kullanmayı unutmayın.
  > **3.** Hesap bilgilerinizi başarıyla girdikten sonra, Genshin Wizard'ın kayıt talebinizi işlemesini bekleyin, bunun bir veya iki dakika sürebileceğini unutmayın.
  > **4.** Son olarak, tüm adımlar doğru yapıldıysa, hesabınızın başarıyla bağlandığını belirten bir **onay mesajı** DM'lerinizde alacaksınız.
  
  <:information:1021014187197083668> **Not:** Bu yöntem sadece kolaylık/QOL için burada. Hesap güvenliğinizle ilgili endişeleriniz varsa, lütfen script yöntemini veya başka bir kayıt biçimini kullanın.
HOYOLAB_REGISTER_LOGIN_FOOTER: Genshin Wizard'ın hesap bilgilerinizi saklamadığını hatırlatmak isteriz! Bu kayıt yöntemi, hesap istatistiklerinizi görüntülemek için gerekli çerezleri alır.
