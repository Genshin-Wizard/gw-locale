REGISTER_COMMAND_PLATFORM_SELECTION_DIRECTIONS: |
  Genshin Wizard'ın Kayıt sistemine hoş geldiniz.
  
  **Bağlantı Özellikleri:**
  > **1.** Dilek geçmişinizi takip edin.
  > **2.** Dilek geçmişi istatistiklerinizi ve banner şanssızlıklarınızı detaylı bir şekilde görüntüleyin.
  > **3.** Garantili sınırlı şanssızlıkta olup olmadığınızı görün.
  > **4.** Tam Genshin Wizard profil yetenekleri.
  > **5.** [**UID Bağlama**](https://docs.genshinwizard.com/wishing-centre/getting-started#linking-genshin-uid-partial-registration) ile erişilebilen tüm komutlara erişim.
  
  Genshin Impact oynamak için hangi platformu kullanıyorsunuz?
