LINKING_UID_DIRECTIONS: |
  Привіт, Мандрівнику! Щоб продовжити зв'язування запитаного UID з Genshin Wizard, нам потрібно **перевірити**, що цей обліковий запис дійсно ваш!

  **Унікальний ключ перевірки**
  ```yaml
  {key}```
  **Термін дії:**
  <t:{timeout}:R>

  Як завершити перевірку?
  > **1)** У грі додайте ключ вище **будь-де** у вашому підписі профілю або ніку.
  > **2)** Переконайтеся, що ви скопіювали ключ вище **точно** так, як він написаний, інакше бот не зможе перевірити ваш обліковий запис.
  > **3)** *Ось і все*! Будь ласка, чекайте терпляче, поки наш бот зможе вас перевірити.
LINKING_UID_FOOTER: Будь ласка, будьте терплячими, поки ми перевіряємо ваш обліковий запис! Ці зміни можуть зайняти від 5 до 10 хвилин, щоб з'явитися з нашого боку.
LINKING_UID_KEY_EXPIRED: Схоже, що цей ключ тепер **протермінований**! На жаль, ми не змогли вас перевірити в цей час, будь ласка, спробуйте ще раз пізніше.
