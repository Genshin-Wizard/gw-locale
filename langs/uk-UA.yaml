HOYOLAB_REGISTER_SCRIPT_TITLE: Реєстрація | Скриптовий метод
HOYOLAB_REGISTER_SCRIPT_DESCRIPTION: |
  **Як зв'язати обліковий запис HoYoLAB з Genshin Wizard**
  > **1.** Для того, щоб розпочати, увійдіть до свого [**HoYoLAB**](https://www.hoyolab.com/home) облікового запису.
  > **2. * Введіть 'java` в адресному рядку за яким йде скрипт нижче.
  > **3. * Коли ви успішно запустили скрипт, натисніть кнопку `Натисніть тут, щоб скопіювати кукуку.
  > **4. * Натисніть кнопку `Enter Token` і вставте скопійований токен в першому полі вводу.
  > **5.** Для решти двох входів, відвідайте наш [**HoYoLAB Реєстраційний Посібник**](https://документації. enshinwizard.com/overview/hoyolab-registration) для отримання додаткової інформації.
  > **6.** Нарешті, натисніть кнопку "Submit" для завершення процесу реєстрації.
HOYOLAB_REGISTER_SCRIPT: |
  ```script:check = document.cookie.includes('account_id') && document.cookie.includes('cookie_token') || alert('Будь ласка, вийдіть з облікового запису та увійдіть знову перед повторною спробою, кукі наразі застаріли/недійсні!'); cookie=document.cookie.match(/(lt(oken|uid)|cookie_token)=(.*?);/gm).join(" "); check && document.write(cookie + `<br><button onclick="navigator.clipboard.writeText('${cookie}')">Натисніть тут, щоб скопіювати!</button>`)```
HOYOLAB_REGISTER_LOGIN_TITLE: Реєстрація | Метод входу
HOYOLAB_REGISTER_LOGIN_DESCRIPTION: |
  **Як зв'язати свій обліковий запис HoYoLAB з Genshin Wizard**
  > **1.** Для початку натисніть кнопку `Реєстрація` нижче.
  > **2.** У полях введення введіть дані для входу до свого облікового запису HoYoLAB, не забудьте використовувати свою **електронну пошту** та пароль.
  > **3.** Після успішного введення даних облікового запису дочекайтеся, поки Genshin Wizard обробить ваш запит на реєстрацію, майте на увазі, що це може зайняти хвилину або дві.
  > **4.** Нарешті, якщо всі кроки виконані правильно, ви отримаєте **повідомлення про підтвердження** у DM, що ваш обліковий запис успішно зв'язано.

  <:information:1021014187197083668> **Примітка:** Цей метод просто для зручності/QOL. Якщо ви стурбовані безпекою свого облікового запису, будь ласка, використовуйте скриптовий метод або іншу форму реєстрації.
