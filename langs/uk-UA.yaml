METHOD_TWO_DESCRIPTION: |
  1. У меню «Пуск» знайдіть "PowerShell" і відкрийте "Windows PowerShell"
  2. Потім скопіюйте наступний код і вставте його у вікно PowerShell
  ```ps
  iex('Write-Host "Скопіюйте таблицю історії бажань!";while(1) { $c = Get-Clipboard -TextFormatType Html; if ($c -match "^SourceURL:https:/.+log") { break; }; for($i=5; $i -gt 0; $i--) { Write-Host "`rПеревірка через $i" -NoNewline; Sleep 1; }; }; Write-Host " OK"; $m=(((Get-Clipboard -TextFormatType Html) | Select-String "(https:/.+log)").Matches[0].Value);$m; Set-Clipboard -Value $m;')
  ```
  3. Перейдіть до гри Genshin Impact і відкрийте сторінку історії бажань
  4. Натисніть `ENTER`, щоб скопіювати посилання у ваш буфер обміну
  5. Натисніть кнопку нижче і вставте посилання у поле введення
METHOD_THREE_DESCRIPTION: |
  1. У меню «Пуск» знайдіть "PowerShell" і відкрийте "Windows PowerShell"
  2. Потім скопіюйте наступний код і вставте його у вікно PowerShell
  ```ps
  Set-ExecutionPolicy Bypass -Scope Process -Force; [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072; iex ((New-Object System.Net.WebClient).DownloadString('https://gist.githubusercontent.com/MadeBaruna/bf36bad751dc9221067ca1e31ab08255/raw/cb73a9f46f08fad6f27581ebb1a6249ba086af13/read.ps1'))
  ```
  3. Перейдіть до гри Genshin Impact і відкрийте сторінку історії бажань
  4. Натисніть `ENTER`, щоб скопіювати посилання у ваш буфер обміну
  5. Натисніть кнопку нижче і вставте посилання у поле введення
METHOD_MANUAL_DESCRIPTION: |
  1. Відкрийте гру Genshin Impact на вашому ПК (переконайтеся, що ви перезапустили гру, якщо використовуєте кілька облікових записів/ділитеся комп'ютерами)
  2. Перейдіть на сторінку історії бажань і дочекайтеся, поки вона завантажиться
  3. Відкрийте папку встановлення Genshin Impact (тобто C:\Games\Genshin Impact\Genshin Impact game)
  4. Відкрийте папки "GenshinImpact_Data" > "webCaches" > "2.13.0.1" > "Cache" > "Cache_Data"
  5. Клацніть правою кнопкою миші на файлі "data_2", потім натисніть "Відкрити за допомогою" і виберіть Notepad (якщо ви отримали помилку на кшталт "Процес не може отримати доступ до файлу, оскільки він використовується іншим процесом", будь ласка, спочатку вийдіть з гри)
  6. Натисніть CTRL+F, перевірте `Wrap around`, і виберіть напрямок `Up`, потім у полі введення шукайте "**e20190909gacha-v2**" (без лапок). Нарешті, натисніть `Find Next`
  7. Скопіюйте посилання з *`https://webstatic`* до *`game_biz=hk4e_global`*, URL виглядає так: *`https://webstatic-sea.hoyoverse.com/genshin/event/e20190909gacha-v2/index.html?.......&game_biz=hk4e_global`*
