LINK_HOYOLAB_DESCRIPTION: |
  Ласкаво просимо до системи підключення облікових записів HoYoLAB Genshin Wizard.

  **Особливості підключення:**
  > **1.** Доступ до вашої кількості смоли в грі в реальному часі (налаштуйте автоматичні сповіщення).
  > **2.** Доступ до статусу вашої експедиції в грі в реальному часі.
  > **3.** Можливість отримати вашу *Нагороду за щоденну перевірку* прямо з Discord.
  > **4.** Можливість переглядати детальну інформацію про ваш прогрес у Спіральній безодні.
  > **5.** Перегляд інфографіки, що містить **всіх** ваших доступних персонажів.

  Щоб почати, натисніть одну з опцій реєстрації користувача нижче!
