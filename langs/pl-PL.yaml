INFO_COMMAND_CACHE_DESCRIPTION: |
  **Genshin Wizard Cache **<:INFORMATION_0_0:1019599343763857501><:INFORMATION_1_0:1019599344753717299><:INFORMATION_2_0:1019599345974247475>

  <:information:1034639378410115103> **Czym jest Cache?**
  Genshin Wizard automatycznie buforuje buildy, więc nigdy nie musisz się martwić o ciągłe wymienianie swojego pokazu!

  <:na:975828401900359711> **Co jeśli chcę usunąć stare buildy?**
  Nie martw się! Będziesz mógł zarządzać swoimi zbuforowanymi buildami bezpośrednio z tej wiadomości! Użyj interfejsu poniżej, aby usunąć konkretne postacie lub wszystkie z pamięci podręcznej Genshin Wizard.
