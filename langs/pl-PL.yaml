METHOD_ONE_TITLE: Rejestracja historii życzeń | Metoda 1
METHOD_TWO_TITLE: Rejestracja historii życzeń | Metoda 2
METHOD_THREE_TITLE: Rejestracja historii życzeń | Metoda 3
METHOD_MANUAL_TITLE: Rejestracja historii życzeń | Metoda ręczna
METHOD_TWO_DESCRIPTION: |
  1. W menu startowym wyszukaj "PowerShell" i otwórz "Windows PowerShell"
  2. Następnie skopiuj poniższy kod i wklej go w oknie PowerShell
  ```ps
  iex('Write-Host "Skopiuj tabelę historii życzeń!";while(1) { $c = Get-Clipboard -TextFormatType Html; if ($c -match "^SourceURL:https:/.+log") { break; }; for($i=5; $i -gt 0; $i--) { Write-Host "`rSprawdzanie w $i" -NoNewline; Sleep 1; }; }; Write-Host " OK"; $m=(((Get-Clipboard -TextFormatType Html) | Select-String "(https:/.+log)").Matches[0].Value);$m; Set-Clipboard -Value $m;')
  ```
  3. Przejdź do gry Genshin Impact i otwórz stronę historii życzeń
  4. Naciśnij `ENTER`, aby skopiować link do schowka
  5. Kliknij przycisk poniżej i wklej link w polu wejściowym
METHOD_THREE_DESCRIPTION: |
  1. W menu startowym wyszukaj "PowerShell" i otwórz "Windows PowerShell"
  2. Następnie skopiuj poniższy kod i wklej go w oknie PowerShell
  ```ps
  Set-ExecutionPolicy Bypass -Scope Process -Force; [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072; iex ((New-Object System.Net.WebClient).DownloadString('https://gist.githubusercontent.com/MadeBaruna/bf36bad751dc9221067ca1e31ab08255/raw/cb73a9f46f08fad6f27581ebb1a6249ba086af13/read.ps1'))
  ```
  3. Przejdź do gry Genshin Impact i otwórz stronę historii życzeń
  4. Naciśnij `ENTER`, aby skopiować link do schowka
  5. Kliknij przycisk poniżej i wklej link w polu wejściowym
METHOD_MANUAL_DESCRIPTION: |
  1. Otwórz grę Genshin Impact na swoim PC (Upewnij się, że zrestartujesz grę, jeśli używasz wielu kont/udzielasz dostępu do komputerów)
  2. Przejdź do strony historii życzeń i poczekaj, aż się załaduje
  3. Otwórz folder instalacyjny Genshin Impact (np. C:\Games\Genshin Impact\Genshin Impact game)
  4. Otwórz foldery "GenshinImpact_Data" > "webCaches" > "2.13.0.1" > "Cache" > "Cache_Data"
  5. Kliknij prawym przyciskiem myszy plik "data_2", następnie kliknij "Otwórz za pomocą" i wybierz Notatnik (Jeśli otrzymasz błąd typu "Proces nie może uzyskać dostępu do pliku, ponieważ jest używany przez inny proces", proszę najpierw wyjść z gry)
  6. Naciśnij CTRL+F, zaznacz `Zawijaj`, i wybierz kierunek `W górę`, następnie w polu wejściowym wyszukaj "**e20190909gacha-v2**" (bez cudzysłowu). Na koniec kliknij `Znajdź następny`
  7. Skopiuj link od *`https://webstatic`* do *`game_biz=hk4e_global`*, url wygląda tak: *`https://webstatic-sea.hoyoverse.com/genshin/event/e20190909gacha-v2/index.html?.......&game_biz=hk4e_global`*
