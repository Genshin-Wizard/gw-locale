REGISTER_COMMAND_PC_DIRECTIONS: |
  Zapoznaj się z naszą [Dokumentacją Github](https://github.com/Genshin-Wizard/historyLink) dla szczegółowych kroków z obrazkami.

  1. Otwórz grę Genshin Impact na swoim PC
  2. Przejdź do strony historii życzeń i poczekaj, aż się załaduje
  3. Wróć do Windows/Desktop
  4. W menu startowym wyszukaj "PowerShell" i otwórz "Windows PowerShell"
  5. Następnie skopiuj poniższy kod i wklej go w oknie Powershell
  ```ps
  iwr https://www.genshinwizard.com/file/history -UseBasicParsing | iex
  ```
  6. Naciśnij `ENTER`, aby skopiować link do schowka
  7. Kliknij przycisk poniżej i wklej link w polu wejściowym
