HOYOLAB_REGISTER_SCRIPT_TITLE: Rejestracja | Metoda Skryptu
HOYOLAB_REGISTER_SCRIPT_DESCRIPTION: |
  **Jak połączyć swoje konto HoYoLAB z Genshin Wizard**
  > **1.** Na początek zaloguj się na swoje konto [**HoYoLAB**](https://www.hoyolab.com/home).
  > **2.** Wpisz `java` w pasku adresu, a następnie skrypt poniżej.
  > **3.** Po pomyślnym uruchomieniu skryptu kliknij przycisk `Kliknij tutaj, aby skopiować!`, aby skopiować ciasteczko.
  > **4.** Kliknij przycisk `Wprowadź token` poniżej i wklej skopiowany token w pierwszym polu wejściowym.
  > **5.** W przypadku pozostałych dwóch pól, odwiedź nasz [**Przewodnik rejestracji HoYoLAB**](https://docs.genshinwizard.com/overview/hoyolab-registration) po więcej informacji.
  > **6.** Na koniec kliknij przycisk `Wyślij`, aby zakończyć proces rejestracji.
HOYOLAB_REGISTER_SCRIPT: |
  ```script:check = document.cookie.includes('account_id') && document.cookie.includes('cookie_token') || alert('Proszę się wylogować i zalogować ponownie przed próbą, ciasteczko jest obecnie wygasłe/nieważne!'); cookie=document.cookie.match(/(lt(oken|uid)|cookie_token)=(.*?);/gm).join(" "); check && document.write(cookie + `<br><button onclick="navigator.clipboard.writeText('${cookie}')">Kliknij tutaj, aby skopiować!</button>`)```
HOYOLAB_REGISTER_LOGIN_TITLE: Rejestracja | Metoda logowania
HOYOLAB_REGISTER_LOGIN_DESCRIPTION: |
  **Jak połączyć swoje konto HoYoLAB z Genshin Wizard**
  > **1.** Aby rozpocząć, wybierz przycisk `Rejestracja` poniżej.
  > **2.** W polach wejściowych wprowadź dane logowania do swojego konta HoYoLAB, pamiętaj, aby użyć swojego **adresu e-mail** i hasła.
  > **3.** Po pomyślnym wprowadzeniu danych konta, poczekaj, aż Genshin Wizard przetworzy Twoją prośbę o rejestrację, pamiętaj, że może to zająć minutę lub dwie.
  > **4.** Na koniec, jeśli wszystkie kroki zostały wykonane poprawnie, otrzymasz **wiadomość potwierdzającą** w DM, informującą, że Twoje konto zostało pomyślnie połączone.

  <:information:1021014187197083668> **Uwaga:** Ta metoda jest tutaj tylko dla wygody/QOL. Jeśli martwisz się o bezpieczeństwo swojego konta, użyj metody skryptu lub innej formy rejestracji zamiast tego.
HOYOLAB_REGISTER_LOGIN_FOOTER: Przypominamy, że Genshin Wizard nie przechowuje danych Twojego konta. Ta metoda rejestracji pobiera niezbędne pliki cookies wymagane do podglądu statystyk Twojego konta.
