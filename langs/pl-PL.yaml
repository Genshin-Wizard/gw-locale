LINK_HOYOLAB_DESCRIPTION: |
  Witamy w systemie łączenia kont HoYoLAB Genshin Wizard.

  **Funkcje łączenia:**
  > **1.** Dostęp do liczby żywicy w grze w czasie rzeczywistym (ustaw automatyczne powiadomienia).
  > **2.** Dostęp do statusu ekspedycji w grze w czasie rzeczywistym.
  > **3.** Możliwość odebrania *Codziennej Nagrody za Sprawdzenie* bezpośrednio z Discorda.
  > **4.** Możliwość przeglądania szczegółowych informacji o postępach w Spiral Abyss.
  > **5.** Wyświetlenie infografiki zawierającej **wszystkie** dostępne postacie.

  Aby rozpocząć, kliknij jedną z opcji rejestracji użytkownika poniżej!
