LINKING_UID_DIRECTIONS: |
  Witaj Podróżniku! Aby kontynuować łączenie żądanego UID z Genshin Wizard, musimy **zweryfikować**, że to konto jest naprawdę Twoje!

  **Unikalny Klucz Weryfikacyjny**
  ```yaml
  {key}```
  **Wygasa za:**
  <t:{timeout}:R>

  Jak zakończyć weryfikację?
  > **1)** Wejdź do gry i dodaj powyższy klucz **gdziekolwiek** w swoim podpisie profilu lub nazwie użytkownika.
  > **2)** Upewnij się, że skopiowałeś powyższy klucz **dokładnie** tak, jak jest napisany, w przeciwnym razie bot nie będzie w stanie zweryfikować Twojego konta.
  > **3)** *To wszystko*! Proszę czekać cierpliwie, aż nasz bot będzie mógł Cię zweryfikować.
LINKING_UID_FOOTER: Proszę o cierpliwość, podczas gdy weryfikujemy Twoje konto! Te zmiany mogą zająć od 5 do 10 minut, aby pojawić się po naszej stronie.
LINKING_UID_KEY_EXPIRED: Wygląda na to, że ten klucz jest teraz **wygasły**! Niestety, nie mogliśmy Cię zweryfikować w tym momencie, spróbuj ponownie później.
