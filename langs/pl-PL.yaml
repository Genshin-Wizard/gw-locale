RECOVER_COMMAND_INSTRUCTIONS: |
  Straciłeś dostęp do swojego konta Genshin Wizard i chcesz je ponownie połączyć? Trafiłeś we właściwe miejsce!

  Kliknij przycisk poniżej, aby rozpocząć proces **odzyskiwania konta**.
METHOD_ONE_BUTTON: Metoda 1
METHOD_TWO_BUTTON: Metoda 2
METHOD_THREE_BUTTON: Metoda 3
