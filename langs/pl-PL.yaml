REGISTER_COMMAND_PLATFORM_SELECTION_DIRECTIONS: |
  Witaj w systemie rejestracji Genshin Wizard.

  **Funkcje Łączenia:**
  > **1.** Śledź swoją historię życzeń.
  > **2.** Zobacz szczegółowe statystyki historii życzeń wraz z twoimi pechami bannerowymi.
  > **3.** Sprawdź, czy jesteś na swoim gwarantowanym pechu ograniczonym, czy nie.
  > **4.** Pełne możliwości profilu Genshin Wizard.
  > **5.** Dostęp do wszystkich komend, które są dostępne przez [**Łączenie UID**](https://docs.genshinwizard.com/wishing-centre/getting-started#linking-genshin-uid-partial-registration).

  Na jakiej platformie grasz w Genshin Impact?
