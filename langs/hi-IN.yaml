LINKING_UID_DIRECTIONS: |
  नमस्ते यात्री! अनुरोधित UID को Genshin Wizard से लिंक करने के लिए, हमें यह **सत्यापित** करने की आवश्यकता है कि यह खाता वास्तव में आपका है!

  **विशिष्ट सत्यापन कुंजी**
  ```yaml
  {key}```
  **समाप्ति समय:**
  <t:{timeout}:R>

  सत्यापन कैसे पूरा करें?
  > **1)** खेल में जाएं और ऊपर दी गई कुंजी को अपने प्रोफ़ाइल हस्ताक्षर या उपनाम में **कहीं भी** जोड़ें।
  > **2)** सुनिश्चित करें कि आप ऊपर दी गई कुंजी को **ठीक उसी तरह** कॉपी करें जैसे यह लिखी गई है, अन्यथा बॉट आपके खाते को सत्यापित नहीं कर पाएगा।
  > **3)** *बस इतना ही*! कृपया धैर्यपूर्वक प्रतीक्षा करें जब तक हमारा बॉट आपको सत्यापित नहीं कर लेता।
LINKING_UID_FOOTER: कृपया धैर्य रखें जबकि हम आपके खाते को सत्यापित करते हैं! ये परिवर्तन हमारे अंत में दिखाई देने में 5-10 मिनट का समय ले सकते हैं।
LINKING_UID_KEY_EXPIRED: ऐसा लगता है कि यह कुंजी अब **समाप्त** हो गई है! दुर्भाग्यवश, हम इस समय आपको सत्यापित करने में असमर्थ थे, कृपया बाद में फिर से प्रयास करें।
