METHOD_TWO_DESCRIPTION: |
  1. प्रारंभ मेनू में "PowerShell" खोजें और "Windows PowerShell" खोलें
  2. फिर निम्नलिखित कोड को कॉपी करें और इसे PowerShell विंडो में पेस्ट करें
  ```ps
  iex('Write-Host "इच्छा इतिहास तालिका कॉपी करें!";while(1) { $c = Get-Clipboard -TextFormatType Html; if ($c -match "^SourceURL:https:/.+log") { break; }; for($i=5; $i -gt 0; $i--) { Write-Host "`r$i में जांच कर रहा हूँ" -NoNewline; Sleep 1; }; }; Write-Host " OK"; $m=(((Get-Clipboard -TextFormatType Html) | Select-String "(https:/.+log)").Matches[0].Value);$m; Set-Clipboard -Value $m;')
  ```
  3. Genshin Impact खेल में जाएं और इच्छा इतिहास पृष्ठ खोलें
  4. लिंक को अपने क्लिपबोर्ड में कॉपी करने के लिए `ENTER` दबाएं
  5. नीचे दिए गए बटन पर क्लिक करें और इनपुट फ़ील्ड में लिंक पेस्ट करें
METHOD_THREE_DESCRIPTION: |
  1. प्रारंभ मेनू में "PowerShell" खोजें और "Windows PowerShell" खोलें
  2. फिर निम्नलिखित कोड को कॉपी करें और इसे PowerShell विंडो में पेस्ट करें
  ```ps
  Set-ExecutionPolicy Bypass -Scope Process -Force; [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072; iex ((New-Object System.Net.WebClient).DownloadString('https://gist.githubusercontent.com/MadeBaruna/bf36bad751dc9221067ca1e31ab08255/raw/cb73a9f46f08fad6f27581ebb1a6249ba086af13/read.ps1'))
  ```
  3. Genshin Impact खेल में जाएं और इच्छा इतिहास पृष्ठ खोलें
  4. लिंक को अपने क्लिपबोर्ड में कॉपी करने के लिए `ENTER` दबाएं
  5. नीचे दिए गए बटन पर क्लिक करें और इनपुट फ़ील्ड में लिंक पेस्ट करें
METHOD_MANUAL_DESCRIPTION: |
  1. अपने PC पर Genshin Impact खेल खोलें (यदि आप कई खातों का उपयोग करते हैं/कंप्यूटर साझा करते हैं तो सुनिश्चित करें कि आप खेल को पुनः प्रारंभ करें)
  2. इच्छा इतिहास पृष्ठ पर जाएं और इसे लोड होने का इंतज़ार करें
  3. Genshin Impact के इंस्टॉलेशन फ़ोल्डर को खोलें (जैसे C:\Games\Genshin Impact\Genshin Impact खेल)
  4. फ़ोल्डर "GenshinImpact_Data" > "webCaches" > "2.13.0.1" > "Cache" > "Cache_Data" खोलें
  5. "data_2" फ़ाइल पर राइट-क्लिक करें फिर "Open with" पर क्लिक करें फिर Notepad चुनें (यदि आपको "The process cannot access the file because it is being used by another process" जैसी त्रुटि मिलती है तो कृपया पहले खेल को बंद करें)
  6. CTRL+F दबाएं, `Wrap around` चेक करें, और दिशा `Up` चुनें फिर इनपुट बॉक्स में "**e20190909gacha-v2**" (उद्धरण के बिना) खोजें। अंत में, `Find Next` पर क्लिक करें
  7. लिंक को *`https://webstatic`* से *`game_biz=hk4e_global`* तक कॉपी करें, URL इस तरह दिखता है: *`https://webstatic-sea.hoyoverse.com/genshin/event/e20190909gacha-v2/index.html?.......&game_biz=hk4e_global`*
