LINK_HOYOLAB_DESCRIPTION: |
  Genshin Wizard के HoYoLAB खाता लिंकिंग सिस्टम में आपका स्वागत है।

  **लिंकिंग सुविधाएँ:**
  > **1.** वास्तविक समय में आपके खेल में रेजिन की संख्या तक पहुँच (स्वचालित सूचनाएँ सेट करें)।
  > **2.** वास्तविक समय में आपके खेल में अभियान की स्थिति तक पहुँच।
  > **3.** Discord से सीधे अपने *दैनिक चेक-इन इनाम* का दावा करने की क्षमता।
  > **4.** आपके स्पायरल एबिस प्रगति के बारे में गहन जानकारी देखने की क्षमता।
  > **5.** **सभी** उपलब्ध पात्रों की जानकारी वाला एक इन्फोग्राफिक देखें।

  शुरू करने के लिए, नीचे दिए गए उपयोगकर्ता पंजीकरण विकल्पों में से एक पर क्लिक करें!
