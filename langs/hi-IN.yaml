REGISTER_COMMAND_PLATFORM_SELECTION_DIRECTIONS: |
  Genshin Wizard के पंजीकरण प्रणाली में आपका स्वागत है।

  **लिंकिंग विशेषताएँ:**
  > **1.** अपनी इच्छा इतिहास का ट्रैक रखें।
  > **2.** अपने बैनर पिटियों के साथ गहराई से इच्छा इतिहास आँकड़े देखें।
  > **3.** देखें कि क्या आप अपनी गारंटीकृत सीमित पिटी पर हैं या नहीं।
  > **4.** पूर्ण Genshin Wizard प्रोफ़ाइल क्षमताएँ।
  > **5.** सभी कमांड्स तक पहुँच जो [**UID लिंकिंग**](https://docs.genshinwizard.com/wishing-centre/getting-started#linking-genshin-uid-partial-registration) द्वारा उपलब्ध हैं।

  आप Genshin Impact खेलने के लिए कौन सा प्लेटफ़ॉर्म उपयोग करते हैं?
