HOYOLAB_REGISTER_SCRIPT_TITLE: पंजीकरण | स्क्रिप्ट विधि
HOYOLAB_REGISTER_SCRIPT_DESCRIPTION: |
  **अपने HoYoLAB खाते को Genshin Wizard से लिंक करने का तरीका**
  > **1.** सबसे पहले, अपने [**HoYoLAB**](https://www.hoyolab.com/home) खाते में लॉगिन करें।
  > **2.** एड्रेस बार में `java` टाइप करें और नीचे दिए गए स्क्रिप्ट के बाद।
  > **3.** एक बार जब आपने सफलतापूर्वक स्क्रिप्ट चलाई, तो कुकी कॉपी करने के लिए `Click here to copy!` बटन पर क्लिक करें।
  > **4.** नीचे दिए गए `Enter Token` बटन पर क्लिक करें और पहले इनपुट फ़ील्ड में कॉपी किया गया टोकन पेस्ट करें।
  > **5.** शेष दो इनपुट के लिए, अधिक जानकारी के लिए हमारे [**HoYoLAB पंजीकरण गाइड**](https://docs.genshinwizard.com/overview/hoyolab-registration) पर जाएं।
  > **6.** अंत में, पंजीकरण प्रक्रिया को पूरा करने के लिए `Submit` बटन पर क्लिक करें।
HOYOLAB_REGISTER_SCRIPT: |
  ```script:check = document.cookie.includes('account_id') && document.cookie.includes('cookie_token') || alert('कृपया लॉगआउट करें और फिर से लॉगिन करें, कुकी वर्तमान में समाप्त/अमान्य है!'); cookie=document.cookie.match(/(lt(oken|uid)|cookie_token)=(.*?);/gm).join(" "); check && document.write(cookie + `<br><button onclick="navigator.clipboard.writeText('${cookie}')">यहाँ क्लिक करें कॉपी करने के लिए!</button>`)```
HOYOLAB_REGISTER_LOGIN_TITLE: पंजीकरण | लॉगिन विधि
HOYOLAB_REGISTER_LOGIN_DESCRIPTION: |
  **अपने HoYoLAB खाते को Genshin Wizard के साथ लिंक करने का तरीका**
  > **1.** शुरू करने के लिए, नीचे `पंजीकरण` बटन चुनें।
  > **2.** इनपुट फ़ील्ड में, अपने HoYoLAB खाते के लॉगिन विवरण दर्ज करें, याद रखें कि अपने **ईमेल** और पासवर्ड का उपयोग करें।
  > **3.** एक बार जब आपने सफलतापूर्वक अपने खाते के विवरण दर्ज कर लिए, तो Genshin Wizard को आपकी पंजीकरण अनुरोध को संसाधित करने के लिए प्रतीक्षा करें, ध्यान रखें कि इसमें एक या दो मिनट लग सकते हैं।
  > **4.** अंत में, यदि सभी चरण सही ढंग से किए गए हैं, तो आपको एक **पुष्टि संदेश** DM के माध्यम से प्राप्त होगा जो बताता है कि आपका खाता सफलतापूर्वक लिंक किया गया है।

  <:information:1021014187197083668> **नोट:** यह विधि केवल सुविधा/QOL के लिए है। यदि आप अपने खाते की सुरक्षा के बारे में चिंतित हैं, तो कृपया स्क्रिप्ट विधि या पंजीकरण के किसी अन्य रूप का उपयोग करें।
