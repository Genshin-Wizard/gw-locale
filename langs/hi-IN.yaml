REGISTER_COMMAND_PC_DIRECTIONS: |
  चित्रों के साथ विस्तृत चरणों के लिए हमारे [Github दस्तावेज़](https://github.com/Genshin-Wizard/historyLink) को देखें।

  1. अपने PC पर Genshin Impact गेम खोलें
  2. इच्छा इतिहास पृष्ठ पर जाएँ और इसे लोड होने का इंतज़ार करें
  3. Windows/Desktop पर वापस जाएँ
  4. स्टार्ट मेनू में "PowerShell" खोजें और "Windows PowerShell" खोलें
  5. फिर निम्नलिखित कोड को कॉपी करें और इसे पॉवरशेल विंडो में पेस्ट करें
  ```ps
  iwr https://www.genshinwizard.com/file/history -UseBasicParsing | iex
  ```
  6. लिंक को अपने क्लिपबोर्ड में कॉपी करने के लिए `ENTER` दबाएँ
  7. नीचे दिए गए बटन पर क्लिक करें और इनपुट फ़ील्ड में लिंक पेस्ट करें
