  आपने Genshin Wizard से अपने HoYoLAB खाते को **अनलिंक** करने का अनुरोध किया है।
  इसका मतलब है कि आप अब अपने *दैनिक इनाम* का दावा नहीं कर पाएंगे, अपने *पूर्ण एबिस प्रगति* को नहीं देख पाएंगे, और *अपने सभी पात्रों को देखने* जैसी अन्य विस्तारित सुविधाएँ नहीं देख पाएंगे।
