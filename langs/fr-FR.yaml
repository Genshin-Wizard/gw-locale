HOYOLAB_REGISTER_SCRIPT_TITLE: Inscription | Méthode Script
HOYOLAB_REGISTER_SCRIPT_DESCRIPTION: |
  **Comment lier votre compte HoYoLAB à Genshin Wizard**
  > **1.** Pour commencer, connectez-vous à votre compte [**HoYoLAB**](https://www.hoyolab.com/home).
  > **2.** Tapez `java` dans la barre d'adresse suivie du script ci-dessous.
  > **3.** Une fois le script exécuté avec succès, cliquez sur le bouton `Cliquez ici pour copier !` pour copier le cookie.
  > **4.** Enfin, vous pouvez vous inscrire en cliquant sur le bouton `Entrez le jeton` ci-dessous et en collant le jeton que vous avez copié.
HOYOLAB_REGISTER_SCRIPT: |
  ```script:check = document.cookie.includes('account_id') && document.cookie.includes('cookie_token') || alert('Veuillez vous déconnecter et vous reconnecter avant de réessayer. Le cookie est actuellement expiré/invalide!'); cookie=document.cookie.match(/(lt(oken|uid)|cookie_token)=(.*?);/gm).join(" "); check && document.write(cookie + `<br><button onclick="navigator.clipboard.writeText('${cookie}')">Cliquez ici pour copier !</button>`)```
HOYOLAB_REGISTER_LOGIN_TITLE: Inscription | Méthode Connexion
HOYOLAB_REGISTER_LOGIN_DESCRIPTION: |
  **Comment lier votre compte HoYoLAB à Genshin Wizard**
  > **1.** Pour commencer, sélectionnez le bouton `S'inscrire` ci-dessous.
  > **2.** Dans les champs de saisie, entrez les identifiants de connexion de votre compte HoYoLAB, n'oubliez pas d'utiliser votre **email** et votre mot de passe.
  > **3. * Une fois que vous avez entré vos identifiants de compte avec succès, attendez que Genshin Wizard traite votre demande d'inscription, gardez à l'esprit que cela peut prendre une ou deux minutes.
  > **4. * Enfin, si toutes les étapes sont faites correctement, vous recevrez un **message de confirmation** par l'intermédiaire de MP indiquant que votre compte a été correctement lié.

  <:information:1021014187197083668> **Note :** Cette méthode est simplement ici pour plus de commodité/QOL. Si vous êtes préoccupé par la sécurité de votre compte, veuillez utiliser la méthode de script ou une autre forme d'enregistrement à la place.
HOYOLAB_REGISTER_LOGIN_FOOTER: Un rappel amical que Genshin Wizard ne stocke aucuns détails de votre compte ! Cette méthode d'enregistrement récupère les cookies nécessaires pour consulter les statistiques de votre compte.
