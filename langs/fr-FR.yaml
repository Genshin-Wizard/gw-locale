LINK_HOYOLAB_DESCRIPTION: |
  Bienvenue dans le système de liaison de compte HoYoLAB de Genshin Wizard.

  **Fonctionnalités de liaison :**
  > **1. * Accès à votre nombre de résine en jeu en temps réel (paramétrage des notifications automatiques).
  > **2.** Accès en temps réel à votre état d'expédition en jeu.
  > **3. * Possibilité de réclamer votre *Récompense d'Enregistrement Quotidien* directement depuis Discord.
  > **4.** Possibilité de consulter des informations détaillées sur votre progression dans les Profondeurs Spiralées.
  > **5.** Voir une infographique contenant **tous** vos caractères disponibles.

  Pour commencer, cliquez sur l'une des options d'enregistrement de l'utilisateur ci-dessous!
