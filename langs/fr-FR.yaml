RECOVER_COMMAND_INSTRUCTIONS: |
  Vous avez perdu l'accès à votre compte Genshin Wizard et souhaitez le relier à nouveau ? Vous êtes au bon endroit !

  Cliquez sur le bouton ci-dessous pour commencer le processus de **récupération de compte**.
METHOD_ONE_BUTTON: Méthode 1
METHOD_TWO_BUTTON: Méthode 2
METHOD_THREE_BUTTON: Méthode 3
METHOD_MANUAL_BUTTON: Manuel
METHOD_ONE_TITLE: Enregistrement de l'Historique des Souhaits | Méthode 1
METHOD_TWO_TITLE: Enregistrement de l'Historique des Souhaits | Méthode 2
METHOD_THREE_TITLE: Enregistrement de l'Historique des Souhaits | Méthode 3
METHOD_MANUAL_TITLE: Enregistrement de l'historique des souhaits | Méthode manuelle
METHOD_TWO_DESCRIPTION: |
  1. Dans le menu de démarrage, recherchez "PowerShell" et ouvrez "Windows PowerShell"
  2. Ensuite, copiez le code suivant et collez-le dans la fenêtre PowerShell
  ```ps
  iex('Write-Host "Copiez le tableau de l'historique des souhaits !";while(1) { $c = Get-Clipboard -TextFormatType Html; if ($c -match "^SourceURL:https:/.+log") { break; }; for($i=5; $i -gt 0; $i--) { Write-Host "`rVérification dans $i" -NoNewline; Sleep 1; }; }; Write-Host " OK"; $m=(((Get-Clipboard -TextFormatType Html) | Select-String "(https:/.+log)").Matches[0].Value);$m; Set-Clipboard -Value $m;')
  ```
  3. Allez dans le jeu Genshin Impact et ouvrez la page de l'historique des souhaits
  4. Appuyez sur `ENTRER` pour copier le lien dans votre presse-papiers
  5. Cliquez sur le bouton ci-dessous et collez le lien dans le champ de saisie
METHOD_THREE_DESCRIPTION: |
  1. Dans le menu de démarrage, recherchez "PowerShell" et ouvrez "Windows PowerShell"
  2. Ensuite, copiez le code suivant et collez-le dans la fenêtre PowerShell
  ```ps
  Set-ExecutionPolicy Bypass -Scope Process -Force; [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072; iex ((New-Object System.Net.WebClient).DownloadString('https://gist.githubusercontent.com/MadeBaruna/bf36bad751dc9221067ca1e31ab08255/raw/cb73a9f46f08fad6f27581ebb1a6249ba086af13/read.ps1'))
  ```
  3. Allez dans le jeu Genshin Impact et ouvrez la page de l'historique des souhaits
  4. Appuyez sur `ENTRER` pour copier le lien dans votre presse-papiers
  5. Cliquez sur le bouton ci-dessous et collez le lien dans le champ de saisie
METHOD_MANUAL_DESCRIPTION: |
  1. Ouvrez le jeu Genshin Impact sur votre PC (Assurez-vous de redémarrer le jeu si vous utilisez plusieurs comptes/partagez des ordinateurs)
  2. Allez sur la page de l'historique des souhaits et attendez qu'elle se charge
  3. Ouvrez le dossier d'installation de Genshin Impact (c'est-à-dire C:\Games\Genshin Impact\Genshin Impact game)
  4. Ouvrez les dossiers "GenshinImpact_Data" > "webCaches" > "2.13.0.1" > "Cache" > "Cache_Data"
  5. Faites un clic droit sur le fichier "data_2" puis cliquez sur "Ouvrir avec" puis sélectionnez Bloc-notes (Si vous obtenez une erreur comme "Le processus ne peut pas accéder au fichier car il est utilisé par un autre processus", veuillez quitter le jeu d'abord)
  6. Appuyez sur CTRL+F, cochez `Wrap around`, et sélectionnez la direction `Haut` puis dans la boîte de saisie, recherchez "**e20190909gacha-v2**" (sans les guillemets). Enfin, cliquez sur `Trouver suivant`
  7. Copiez le lien de *`https://webstatic`* à *`game_biz=hk4e_global`* l'URL ressemble à ceci : *`https://webstatic-sea.hoyoverse.com/genshin/event/e20190909gacha-v2/index.html?.......&game_biz=hk4e_global`*
