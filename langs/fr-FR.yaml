REGISTER_COMMAND_PC_DIRECTIONS: |
  Consulte notre [Documentation Github](https://github.com/Genshin-Wizard/historyLink) pour des étapes détaillées avec images.

  1. Ouvre le jeu Genshin Impact sur ton PC
  2. Va sur la page de l'historique des souhaits et attends qu'elle se charge
  3. Retourne sur Windows/Desktop
  4. Dans le menu de démarrage, cherche "PowerShell" et ouvre "Windows PowerShell"
  5. Ensuite, copie le code suivant et colle-le dans la fenêtre Powershell
  ```ps
  iwr https://www.genshinwizard.com/file/history -UseBasicParsing | iex
  ```
  6. Appuie sur `ENTER` pour copier le lien dans ton presse-papiers
  7. Clique sur le bouton ci-dessous et colle le lien dans le champ de saisie
REGISTER_COMMAND_ANDROID_DIRECTIONS: |
  Après la mise à jour 3.0, les utilisateurs ne peuvent plus simplement copier et coller le lien d'historique sur les appareils Android.

  Nous recherchons actuellement un moyen de récupérer le lien de l'historique sur les appareils Android. Veuillez revenir plus tard.
REGISTER_COMMAND_IOS_DIRECTIONS: |
  Consultez le [Guide Stream App de Kaizer(https://drive.google.com/file/d/14Q_6v60qLPunrpmA9Bf1KlvsKhaRyPzz/view?usp=sharing) pour des étapes détaillées avec des images.

  1. Ouvrez Genshin Impact et allez à l'écran Vœux
  2. Alors que Genshin Impact est toujours ouvert, allez dans l'application Stream et appuyez sur Sniff Now
  3. Retournez à Genshin Impact et ouvrez l'historique de vos vœux
  4. Lorsque votre liste de souhait est chargée, retournez dans l'application Stream et appuyez sur Stop sniffing
  5. Puis appuyez sur Historique de Sniff et choisissez le premier élément de la liste
  6. Appuyez sur la requête commençant par `GET https://hk4e-api-os/...`
  7. Appuyez sur l'onglet Requête
  8. Appuyez sur le texte long commençant par `GET /event/gacha_info...`
  9. Enfin, appuyez sur Copier Url
  10. Cliquez sur le bouton ci-dessous et collez le lien dans le champ de saisie.
