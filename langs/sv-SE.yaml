UNLINK_GENSHIN_ACCOUNT_DESCRIPTION: Koppla bort ditt Genshin Impact-konto helt från Genshin Wizard. Detta kommer att radera all din data från Genshin Wizard, inklusive din önskhistorik, önskstatistik och mer. Denna åtgärd är **oåterkallelig**. Är du säker på att du vill fortsätta?
UNLINK_HOYOLAB_ACCOUNT: Unlink HoYoLAB Account
UNLINK_HOYOLAB_ACCOUNT_DESCRIPTION: Koppla bort ditt HoYoLAB-konto från Genshin Wizard; kommer inte att koppla bort din länkade UID från Genshin Wizard. Denna åtgärd är **oåterkallelig**. Är du säker på att du vill fortsätta?
