LINK_HOYOLAB_DESCRIPTION: |
  Välkommen till Genshin Wizards system för länkning av HoYoLAB-konto.

  **Länkning Funktioner:**
  > **1.** Tillgång till din resinräkning i spelet i realtid (ställ in automatiska aviseringar).
  > **2.** Tillgång till din expeditionstatus i spelet i realtid.
  > **3.** Möjlighet att hämta din *Dagliga Incheckningsbelöning* direkt från Discord.
  > **4.** Möjlighet att se djupgående information om din Spiral Abyss-progression.
  > **5.** Visa en infographic som innehåller **alla** dina tillgängliga karaktärer.

  För att börja, klicka på ett av registreringsalternativen nedan!
