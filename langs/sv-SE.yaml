LINKING_UID_DIRECTIONS: |
  Hej Resenär! För att fortsätta länka den begärda UID:n till Genshin Wizard, behöver vi **verifiera** att detta konto faktiskt är ditt!

  **Unik Verifieringsnyckel**
  ```yaml
  {key}```
  **Går ut om:**
  <t:{timeout}:R>

  Hur slutför man verifieringen?
  > **1)** Gå in i spelet och lägg till nyckeln ovan **var som helst** i din profilsignatur eller smeknamn.
  > **2)** Se till att du kopierar nyckeln ovan **exakt** som den är skriven, annars kommer botten inte kunna verifiera ditt konto.
  > **3)** *Det är allt*! Vänligen vänta tålmodigt tills vår bot kan verifiera dig.
LINKING_UID_FOOTER: Vänligen ha tålamod medan vi verifierar ditt konto! Dessa ändringar kan ta mellan 5-10 minuter att visas på vår sida.
LINKING_UID_KEY_EXPIRED: Det verkar som att denna nyckel nu är **utgången**! Tyvärr kunde vi inte verifiera dig vid denna tidpunkt, vänligen försök igen senare.
