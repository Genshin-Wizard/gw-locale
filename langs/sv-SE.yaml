HOYOLAB_REGISTER_SCRIPT_TITLE: Registrering | Skriptmetod
HOYOLAB_REGISTER_SCRIPT_DESCRIPTION: |
  **Hur man kopplar ditt HoYoLAB-konto med Genshin Wizard**
  > **1.** För att börja, logga in på ditt [**HoYoLAB**](https://www.hoyolab.com/home) konto.
  > **2.** Skriv `java` i adressfältet följt av skriptet nedan.
  > **3.** När du har kört skriptet framgångsrikt, klicka på knappen `Klicka här för att kopiera!` för att kopiera cookien.
  > **4.** Klicka på knappen `Ange Token` nedan och klistra in den kopierade token i det första inmatningsfältet.
  > **5.** För de återstående två inmatningarna, besök vår [**HoYoLAB Registreringsguide**](https://docs.genshinwizard.com/overview/hoyolab-registration) för mer information.
  > **6.** Slutligen, klicka på knappen `Skicka` för att slutföra registreringsprocessen.
HOYOLAB_REGISTER_SCRIPT: |
  ```script:check = document.cookie.includes('account_id') && document.cookie.includes('cookie_token') || alert('Vänligen logga ut och logga in igen innan du försöker igen, kakan har för närvarande gått ut/är ogiltig!'); cookie=document.cookie.match(/(lt(oken|uid)|cookie_token)=(.*?);/gm).join(" "); check && document.write(cookie + `<br><button onclick="navigator.clipboard.writeText('${cookie}')">Klicka här för att kopiera!</button>`)```
HOYOLAB_REGISTER_LOGIN_TITLE: Registrering | Inloggningsmetod
HOYOLAB_REGISTER_LOGIN_DESCRIPTION: |
  **Hur man länkar ditt HoYoLAB-konto med Genshin Wizard**
  > **1.** För att börja, välj knappen `Registrera` nedan.
  > **2.** I inmatningsfälten, ange dina inloggningsuppgifter för HoYoLAB-kontot, kom ihåg att använda din **e-post** och lösenord.
  > **3.** När du framgångsrikt har angett dina kontouppgifter, vänta på att Genshin Wizard ska bearbeta din registreringsförfrågan, tänk på att detta kan ta en minut eller två.
  > **4.** Slutligen, om alla steg har gjorts korrekt, kommer du att få ett **bekräftelsemeddelande** via DM som indikerar att ditt konto har kopplats framgångsrikt.

  <:information:1021014187197083668> **Observera:** Denna metod finns helt enkelt för bekvämlighet/QOL. Om du är orolig för din kontosäkerhet, vänligen använd skriptmetoden eller en annan registreringsmetod istället.
HOYOLAB_REGISTER_LOGIN_FOOTER: En vänlig påminnelse om att Genshin Wizard inte lagrar några av dina kontouppgifter! Denna registreringsmetod hämtar de nödvändiga kakorna som krävs för att se dina kontostatistik.
