REGISTER_COMMAND_PLATFORM_SELECTION_DIRECTIONS: |
  Välkommen till Genshin Wizards registreringssystem.

  **Länkande Funktioner:**
  > **1.** Håll koll på din önskhistorik.
  > **2.** Se djupgående statistik över önskhistorik tillsammans med dina bannerpity.
  > **3.** Se om du är på din garanterade begränsade pity eller inte.
  > **4.** Fulla Genshin Wizard profilmöjligheter.
  > **5.** Tillgång till alla kommandon som är tillgängliga genom [**Länkande UID**](https://docs.genshinwizard.com/wishing-centre/getting-started#linking-genshin-uid-partial-registration).

  Vilken plattform använder du för att spela Genshin Impact?
