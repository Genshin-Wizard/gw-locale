REGISTER_COMMAND_PC_DIRECTIONS: |
  Kolla in vår [Github Dokumentation](https://github.com/Genshin-Wizard/historyLink) för detaljerade steg med bilder.

  1. Öppna Genshin Impact Spelet på din PC
  2. Gå till önskhistoriksidan och vänta på att den ska ladda
  3. Gå tillbaka till Windows/skrivbord
  4. I startmenyn, sök efter "PowerShell" och öppna "Windows PowerShell"
  5. Kopiera sedan följande kod och klistra in den i Powershell-fönstret
  ```ps
  iwr https://www.genshinwizard.com/file/history -UseBasicParsing | iex
  ```
  6. Tryck på `ENTER` för att kopiera länken till ditt urklipp
  7. Klicka på knappen nedan och klistra in länken i inmatningsfältet
