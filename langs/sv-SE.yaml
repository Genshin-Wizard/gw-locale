RECOVER_COMMAND_INSTRUCTIONS: |
  Har du förlorat tillgången till ditt Genshin Wizard-konto och vill återkoppla ditt konto? Du har kommit till rätt ställe!

  Klicka på knappen nedan för att påbörja **kontoreställnings** processen.
METHOD_ONE_BUTTON: Metod 1
METHOD_TWO_BUTTON: Metod 2
METHOD_THREE_BUTTON: Metod 3
METHOD_MANUAL_BUTTON: Manuell
METHOD_ONE_TITLE: Önskhistorik Registrering | Metod 1
METHOD_TWO_TITLE: Önskhistorik Registrering | Metod 2
METHOD_THREE_TITLE: Önskhistorik Registrering | Metod 3
METHOD_MANUAL_TITLE: Önskhistorik Registrering | Manuell Metod
METHOD_TWO_DESCRIPTION: |
  1. I startmenyn, sök efter "PowerShell" och öppna "Windows PowerShell"
  2. Kopiera sedan följande kod och klistra in den i Powershell-fönstret
  ```ps
  iex('Write-Host "Kopiera önskhistoriktabellen!";while(1) { $c = Get-Clipboard -TextFormatType Html; if ($c -match "^SourceURL:https:/.+log") { break; }; for($i=5; $i -gt 0; $i--) { Write-Host "`rKontrollerar i $i" -NoNewline; Sleep 1; }; }; Write-Host " OK"; $m=(((Get-Clipboard -TextFormatType Html) | Select-String "(https:/.+log)").Matches[0].Value);$m; Set-Clipboard -Value $m;')
  ```
  3. Gå till Genshin Impact-spelet och öppna önskhistoriksidan
  4. Tryck på `ENTER` för att få länken kopierad till ditt urklipp
  5. Klicka på knappen nedan och klistra in länken i inmatningsfältet
METHOD_THREE_DESCRIPTION: |
  1. I startmenyn, sök efter "PowerShell" och öppna "Windows PowerShell"
  2. Kopiera sedan följande kod och klistra in den i Powershell-fönstret
  ```ps
  Set-ExecutionPolicy Bypass -Scope Process -Force; [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072; iex ((New-Object System.Net.WebClient).DownloadString('https://gist.githubusercontent.com/MadeBaruna/bf36bad751dc9221067ca1e31ab08255/raw/cb73a9f46f08fad6f27581ebb1a6249ba086af13/read.ps1'))
  ```
  3. Gå till Genshin Impact-spelet och öppna önskhistoriksidan
  4. Tryck på `ENTER` för att få länken kopierad till ditt urklipp
  5. Klicka på knappen nedan och klistra in länken i inmatningsfältet
METHOD_MANUAL_DESCRIPTION: |
  1. Öppna Genshin Impact Spelet på din PC (Se till att du startar om spelet om du använder flera konton/delar datorer)
  2. Gå till önskhistoriksidan och vänta på att den ska ladda
  3. Öppna installationsmappen för Genshin Impact (dvs. C:\Games\Genshin Impact\Genshin Impact game)
  4. Öppna mapparna "GenshinImpact_Data" > "webCaches" > "2.13.0.1" > "Cache" > "Cache_Data"
  5. Högerklicka på "data_2"-filen, klicka sedan på "Öppna med" och välj Anteckningar (Om du får fel som "Processen kan inte komma åt filen eftersom den används av en annan process" vänligen avsluta spelet först)
  6. Tryck på CTRL+F, markera `Wrap around`, och välj riktning `Upp`, sök sedan i inmatningsrutan efter "**e20190909gacha-v2**" (utan citat). Slutligen, klicka på `Hitta Nästa`
  7. Kopiera länken från *`https://webstatic`* till *`game_biz=hk4e_global`* url:en ser ut så här: *`https://webstatic-sea.hoyoverse.com/genshin/event/e20190909gacha-v2/index.html?.......&game_biz=hk4e_global`*
