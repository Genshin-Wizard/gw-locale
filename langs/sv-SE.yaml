  **Genshin Wizard Cache **<:INFORMATION_0_0:1019599343763857501><:INFORMATION_1_0:1019599344753717299><:INFORMATION_2_0:1019599345974247475>

  <:information:1034639378410115103> **Vad är Cache?**
  Genshin Wizard cachar builds *automatiskt* så du aldrig behöver oroa dig för att byta ut din visning om och om igen!

  <:na:975828401900359711> **Vad händer om jag vill ta bort gamla builds?**
  Oroa dig inte! Du kommer att kunna hantera dina cachade builds direkt från detta meddelande! Använd gränssnittet nedan för att ta bort specifika karaktärer, eller alla, från din Genshin Wizard-cache.
