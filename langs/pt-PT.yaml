INFO_COMMAND_CACHE_DESCRIPTION: |
  **Cache do Genshin Wizard**<:INFORMATION_0_0:1019599343763857501><:INFORMATION_1_0:1019599344753717299><:INFORMATION_2_0:1019599345974247475>

  <:information:1034639378410115103> **O que é Cache?**
  O Genshin Wizard salva suas Builds em cache *automaticamente*, para que você não tenha que se preocupar em atualizar a sua Exibição de Personagens de novo e de novo!

  <:na:975828401900359711> **E se eu quiser excluir Builds antigas?**
  Não se acanhe! Você pode gerenciar suas Builds em cache diretamente desta mensagem! Use a interface abaixo para excluir personagens específicos, ou todos eles, do seu cache do Genshin Wizard.
