HOYOLAB_REGISTER_SCRIPT_DESCRIPTION: |
  **Como vincular a sua conta HoYoLAB com o Genshin Wizard**
  > **1.** Para começar, entre na sua conta do [**HoYoLAB**](https://www.hoyolab.com/home).
  > **2.** Digite `java` na barra de endereço, seguido pelo código abaixo.
  > **3.** Após rodar o código com sucesso, clique no botão `Clique para copiar!` para copiar o cookie.
  > **4.** Por fim, você poderá se registrar clicando no botão `Inserir Token` abaixo e colando o token copiado.
HOYOLAB_REGISTER_SCRIPT: |
  ```script:check = document.cookie.includes('account_id') && document.cookie.includes('cookie_token') || alert('Por favor saia e entre novamente na conta antes de tentar novamente, o cookie está expirado/inválido!'); cookie=document.cookie.match(/(lt(oken|uid)|cookie_token)=(.*?);/gm).join(" "); check && document.write(cookie + `<br><button onclick="navigator.clipboard.writeText('${cookie}')">Clique para copiar!</button>`)```
