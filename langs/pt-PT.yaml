REGISTER_COMMAND_PLATFORM_SELECTION_DIRECTIONS: |
  Bem-vindo ao sistema de Registro do Genshin Wizard.

  **Recursos de Vinculação:**
  > **1.** Acompanhe seu histórico de desejos.
  > **2.** Veja estatísticas detalhadas do histórico de desejos junto com suas tristezas de banner.
  > **3.** Veja se você está na sua tristeza garantida limitada ou não.
  > **4.** Capacidades completas do perfil Genshin Wizard.
  > **5.** Acesso a todos os comandos que são acessíveis por [**Vinculação de UID**](https://docs.genshinwizard.com/wishing-centre/getting-started#linking-genshin-uid-partial-registration).

  Qual plataforma você usa para jogar Genshin Impact?
