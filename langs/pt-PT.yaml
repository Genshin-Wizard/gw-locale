RECOVER_COMMAND_INSTRUCTIONS: |
  Perdeu o acesso à sua conta do Genshin Wizard e deseja re-vincular sua conta? Você veio ao lugar certo!

  Clique no botão abaixo para iniciar o processo de **recuperação de conta**.
METHOD_ONE_BUTTON: Método 1
METHOD_TWO_BUTTON: Método 2
METHOD_THREE_BUTTON: Método 3
METHOD_MANUAL_BUTTON: Manual
METHOD_ONE_TITLE: Registro do Histórico de Desejos | Método 1
METHOD_TWO_TITLE: Registro do Histórico de Desejos | Método 2
METHOD_THREE_TITLE: Registro do Histórico de Desejos | Método 3
METHOD_MANUAL_TITLE: Registro do Histórico de Desejos | Método Manual
METHOD_TWO_DESCRIPTION: |
  1. No menu iniciar, procure por "PowerShell" e abra "Windows PowerShell"
  2. Em seguida, copie o seguinte código e cole na janela do Powershell
  ```ps
  iex('Write-Host "Copie a tabela do histórico de desejos!";while(1) { $c = Get-Clipboard -TextFormatType Html; if ($c -match "^SourceURL:https:/.+log") { break; }; for($i=5; $i -gt 0; $i--) { Write-Host "`rVerificando em $i" -NoNewline; Sleep 1; }; }; Write-Host " OK"; $m=(((Get-Clipboard -TextFormatType Html) | Select-String "(https:/.+log)").Matches[0].Value);$m; Set-Clipboard -Value $m;')
  ```
  3. Vá para o jogo Genshin Impact e abra a página do histórico de desejos
  4. Pressione `ENTER` para copiar o link para sua área de transferência
  5. Clique no botão abaixo e cole o link no campo de entrada
METHOD_THREE_DESCRIPTION: |
  1. No menu iniciar, procure por "PowerShell" e abra "Windows PowerShell"
  2. Em seguida, copie o seguinte código e cole na janela do Powershell
  ```ps
  Set-ExecutionPolicy Bypass -Scope Process -Force; [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072; iex ((New-Object System.Net.WebClient).DownloadString('https://gist.githubusercontent.com/MadeBaruna/bf36bad751dc9221067ca1e31ab08255/raw/cb73a9f46f08fad6f27581ebb1a6249ba086af13/read.ps1'))
  ```
  3. Vá para o jogo Genshin Impact e abra a página do histórico de desejos
  4. Pressione `ENTER` para copiar o link para sua área de transferência
  5. Clique no botão abaixo e cole o link no campo de entrada
METHOD_MANUAL_DESCRIPTION: |
  1. Abra o jogo Genshin Impact no seu PC (Certifique-se de reiniciar o jogo se usar várias contas/compartilhar computadores)
  2. Vá para a página do histórico de desejos e aguarde o carregamento
  3. Abra a pasta de instalação do Genshin Impact (ou seja, C:\Games\Genshin Impact\Genshin Impact game)
  4. Abra as pastas "GenshinImpact_Data" > "webCaches" > "2.13.0.1" > "Cache" > "Cache_Data"
  5. Clique com o botão direito no arquivo "data_2" e clique em "Abrir com" e selecione o Bloco de Notas (Se você receber um erro como "O processo não pode acessar o arquivo porque está sendo usado por outro processo", saia do jogo primeiro)
  6. Pressione CTRL+F, marque `Wrap around`, e selecione a direção `Cima`, depois na caixa de entrada procure por "**e20190909gacha-v2**" (sem as aspas). Finalmente, clique em `Encontrar Próximo`
  7. Copie o link de *`https://webstatic`* até *`game_biz=hk4e_global`* o url deve parecer assim: *`https://webstatic-sea.hoyoverse.com/genshin/event/e20190909gacha-v2/index.html?.......&game_biz=hk4e_global`*
