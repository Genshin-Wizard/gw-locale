REGISTER_COMMAND_PC_DIRECTIONS: |
  Confira nossa [Documentação do Github](https://github.com/Genshin-Wizard/historyLink) para passos detalhados com imagens.

  1. Abra o jogo Genshin Impact no seu PC
  2. Vá para a página do histórico de desejos e aguarde o carregamento
  3. Volte para o Windows/Desktop
  4. No menu iniciar, procure por "PowerShell" e abra "Windows PowerShell"
  5. Em seguida, copie o seguinte código e cole na janela do Powershell
  ```ps
  iwr https://www.genshinwizard.com/file/history -UseBasicParsing | iex
  ```
  6. Pressione `ENTER` para copiar o link para a sua área de transferência
  7. Clique no botão abaixo e cole o link no campo de entrada
