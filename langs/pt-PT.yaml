LINKING_UID_DIRECTIONS: |
  Olá, Viajante! Para continuar vinculando o UID solicitado ao Genshin Wizard, precisamos **verificar** se esta conta é realmente sua!

  **Chave de Verificação Única**
  ```yaml
  {key}```
  **Expira em:**
  <t:{timeout}:R>

  Como completar a verificação?
  > **1)** Entre no jogo e adicione a chave acima **em qualquer lugar** na sua assinatura de perfil ou apelido.
  > **2)** Certifique-se de copiar a chave acima **exatamente** como está escrita, caso contrário, o bot não conseguirá verificar sua conta.
  > **3)** *É isso*! Por favor, aguarde pacientemente até que nosso bot possa verificar você.
