RECOVER_COMMAND_INSTRUCTIONS: |
  失去对您的 Genshin Wizard 账户的访问权限并想要重新绑定账户？您来对地方了！

  点击下面的按钮开始**账户恢复**过程。
METHOD_ONE_BUTTON: 方法 1
METHOD_TWO_BUTTON: 方法 2
METHOD_THREE_BUTTON: 方法 3
METHOD_MANUAL_BUTTON: 手动
METHOD_ONE_TITLE: 祈愿历史注册 | 方法 1
METHOD_TWO_TITLE: 祈愿历史注册 | 方法 2
METHOD_THREE_TITLE: 祈愿历史注册 | 方法 3
METHOD_MANUAL_TITLE: 祈愿历史注册 | 手动方法
METHOD_TWO_DESCRIPTION: |
  1. 在开始菜单中搜索 "PowerShell" 并打开 "Windows PowerShell"
  2. 然后复制以下代码并粘贴到 PowerShell 窗口中
  ```ps
  iex('Write-Host "复制祈愿历史表！";while(1) { $c = Get-Clipboard -TextFormatType Html; if ($c -match "^SourceURL:https:/.+log") { break; }; for($i=5; $i -gt 0; $i--) { Write-Host "`r正在检查 $i" -NoNewline; Sleep 1; }; }; Write-Host " OK"; $m=(((Get-Clipboard -TextFormatType Html) | Select-String "(https:/.+log)").Matches[0].Value);$m; Set-Clipboard -Value $m;')
  ```
  3. 前往《原神》游戏并打开祈愿历史页面
  4. 按 `ENTER` 将链接复制到剪贴板
  5. 点击下面的按钮并在输入框中粘贴链接
METHOD_THREE_DESCRIPTION: |
  1. 在开始菜单中搜索 "PowerShell" 并打开 "Windows PowerShell"
  2. 然后复制以下代码并粘贴到 PowerShell 窗口中
  ```ps
  Set-ExecutionPolicy Bypass -Scope Process -Force; [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072; iex ((New-Object System.Net.WebClient).DownloadString('https://gist.githubusercontent.com/MadeBaruna/bf36bad751dc9221067ca1e31ab08255/raw/cb73a9f46f08fad6f27581ebb1a6249ba086af13/read.ps1'))
  ```
  3. 前往《原神》游戏并打开祈愿历史页面
  4. 按 `ENTER` 将链接复制到剪贴板
  5. 点击下面的按钮并在输入框中粘贴链接
METHOD_MANUAL_DESCRIPTION: |
  1. 在您的 PC 上打开《原神》游戏（如果您使用多个账户/共享计算机，请确保重新启动游戏）
  2. 前往祈愿历史页面并等待加载
  3. 打开《原神》的安装文件夹（例如 C:\Games\Genshin Impact\Genshin Impact game）
  4. 打开文件夹 "GenshinImpact_Data" > "webCaches" > "2.13.0.1" > "Cache" > "Cache_Data"
  5. 右键点击 "data_2" 文件，然后点击 "打开方式"，选择记事本（如果您收到错误提示 "该进程无法访问该文件，因为它正被另一个进程使用"，请先退出游戏）
  6. 按 CTRL+F，勾选 `环绕`，选择方向 `上`，然后在输入框中搜索 "**e20190909gacha-v2**"（不带引号）。最后，点击 `查找下一个`
  7. 从 *`https://webstatic`* 复制链接到 *`game_biz=hk4e_global`*，网址看起来像这样： *`https://webstatic-sea.hoyoverse.com/genshin/event/e20190909gacha-v2/index.html?.......&game_biz=hk4e_global`*
