REGISTER_COMMAND_PC_DIRECTIONS: |
  请查看我们的[Github文档](https://github.com/Genshin-Wizard/historyLink)以获取带图片的详细步骤。

  1. 在你的PC上打开Genshin Impact游戏
  2. 转到祈愿历史页面并等待加载
  3. 返回Windows/桌面
  4. 在开始菜单中搜索“PowerShell”并打开“Windows PowerShell”
  5. 然后复制以下代码并粘贴到PowerShell窗口中
  ```ps
  iwr https://www.genshinwizard.com/file/history -UseBasicParsing | iex
  ```
  6. 按`ENTER`将链接复制到剪贴板
  7. 点击下面的按钮并在输入框中粘贴链接
