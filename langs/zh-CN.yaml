HOYOLAB_REGISTER_SCRIPT_TITLE: 注册 | 脚本方法
HOYOLAB_REGISTER_SCRIPT_DESCRIPTION: |
  **How to link your HoYoLAB account with Genshin Wizard**
  > **1.** To begin with, login to your [**HoYoLAB**](https://www.hoyolab.com/home) account.
  > **2.** Type `java` in the address bar followed by the script down below.
  > **3.** Once you've successfully ran the script, click the `Click here to copy!` button to copy the cookie.
  > **4.** Finally, you're able to register by clicking the `Enter Token` button below and pasting the token you copied.
HOYOLAB_REGISTER_SCRIPT: |
  ```script:check = document.cookie.includes('account_id') && document.cookie.includes('cookie_token') || alert('请先登出再重新登录再试，cookie 当前已过期/无效！'); cookie=document.cookie.match(/(lt(oken|uid)|cookie_token)=(.*?);/gm).join(" "); check && document.write(cookie + `<br><button onclick="navigator.clipboard.writeText('${cookie}')">点击这里复制！</button>`)```
HOYOLAB_REGISTER_LOGIN_TITLE: 注册 | 登录方法
HOYOLAB_REGISTER_LOGIN_DESCRIPTION: |
  **如何将您的 HoYoLAB 账户与 Genshin Wizard 关联**
  > **1.** 首先，选择下面的 `注册` 按钮。
  > **2.** 在输入框中，输入您的 HoYoLAB 账户登录信息，记得使用您的 **电子邮件** 和密码。
  > **3.** 一旦您成功输入了账户信息，请等待 Genshin Wizard 处理您的注册请求，请注意这可能需要一两分钟。
  > **4.** 最后，如果所有步骤都正确完成，您将通过 DM 收到一条 **确认消息**，表明您的账户已成功关联。

  <:information:1021014187197083668> **注意：** 此方法仅为方便/提升生活质量。如果您担心账户安全，请使用脚本方法或其他注册形式。
