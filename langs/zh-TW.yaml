REGISTER_COMMAND_PLATFORM_SELECTION_DIRECTIONS: |
  歡迎來到 Genshin Wizard 的註冊系統。

  **連結功能：**
  > **1.** 跟踪您的願望歷史。
  > **2.** 查看詳細的願望歷史統計以及您的橫幅保底。
  > **3.** 查看您是否在保證的限量保底上。
  > **4.** 完整的 Genshin Wizard 個人資料功能。
  > **5.** 訪問所有可通過 [**連結 UID**](https://docs.genshinwizard.com/wishing-centre/getting-started#linking-genshin-uid-partial-registration) 訪問的命令。

