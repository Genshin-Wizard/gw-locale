LINKING_UID_DIRECTIONS: |
  你好，Traveler！要繼續將請求的 UID 連結到 Genshin Wizard，我們需要 **驗證** 此帳號確實是您的！

  **唯一驗證密鑰**
  ```yaml
  {key}```
  **過期時間：**
  <t:{timeout}:R>

  如何完成驗證？
  > **1)** 在遊戲中，將上面的密鑰 **放在** 您的個人資料簽名或暱稱的任何位置。
  > **2)** 確保您 **完全** 複製上面的密鑰，否則機器人將無法驗證您的帳號。
  > **3)** *就這樣*! 請耐心等待，直到我們的機器人能夠驗證您。
LINKING_UID_FOOTER: 請耐心等待我們驗證您的帳號！這些更改可能需要 5-10 分鐘才能在我們這邊顯示。
LINKING_UID_KEY_EXPIRED: 看起來這個密鑰現在已經 **過期**！不幸的是，我們無法在此時驗證您，請稍後再試。
