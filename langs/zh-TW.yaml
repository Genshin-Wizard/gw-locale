REGISTER_COMMAND_PC_DIRECTIONS: |
  查看我們的 [Github 文檔](https://github.com/Genshin-Wizard/historyLink) 獲取詳細步驟和圖片。

  1. 在您的 PC 上打開 Genshin Impact 遊戲
  2. 前往願望歷史頁面並等待其加載
  3. 返回 Windows/桌面
  4. 在開始菜單中搜索 "PowerShell" 並打開 "Windows PowerShell"
  5. 然後複製以下代碼並粘貼到 PowerShell 窗口中
  ```ps
  iwr https://www.genshinwizard.com/file/history -UseBasicParsing | iex
  ```
  6. 按 `ENTER` 將鏈接複製到剪貼板
  7. 點擊下面的按鈕並在輸入框中粘貼鏈接
REGISTER_COMMAND_ANDROID_DIRECTIONS: |
  After the 3.0 update, users can no longer simply copy and paste the history link on Android devices anymore.

  We are currently looking for a way to retrieve the history link on Android devices. Please check back later.
REGISTER_COMMAND_IOS_DIRECTIONS: |
  查看 Kaizer 的 [Stream App Guide](https://drive.google.com/file/d/14Q_6v60qLPunrpmA9Bf1KlvsKhaRyPzz/view?usp=sharing) 以了解帶有圖片的詳細步驟。
  1.打開原神並轉到Wish屏幕
  2. 當 原神 仍然打開時，轉到 Stream 應用程序並點擊立即嗅探
  3.返回原神並打開你想要的歷史
  4. 加載願望清單後，返回 Stream 應用並點擊停止嗅探
  5. 然後點擊 祈願歷史 並選擇列表中的第一項
  6. 點擊以“GET https://hk4e-api-os/...”開頭的請求
  7. 點擊請求選項卡
  8. 點擊以 `GET /event/gacha_info...` 開頭的長文本
  9. 最後，點擊複製網址
  10. 單擊下面的按鈕並將鏈接粘貼到輸入字段中。
