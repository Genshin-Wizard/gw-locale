METHOD_TWO_DESCRIPTION: |
  1. 在開始菜單中搜索 "PowerShell" 並打開 "Windows PowerShell"
  2. 然後複製以下代碼並將其粘貼到 PowerShell 窗口中
  ```ps
  iex('Write-Host "複製祈願歷史表！";while(1) { $c = Get-Clipboard -TextFormatType Html; if ($c -match "^SourceURL:https:/.+log") { break; }; for($i=5; $i -gt 0; $i--) { Write-Host "`r正在檢查 $i" -NoNewline; Sleep 1; }; }; Write-Host " OK"; $m=(((Get-Clipboard -TextFormatType Html) | Select-String "(https:/.+log)").Matches[0].Value);$m; Set-Clipboard -Value $m;')
  ```
  3. 前往 Genshin Impact 遊戲並打開祈願歷史頁面
  4. 按 `ENTER` 將鏈接複製到剪貼板
  5. 點擊下面的按鈕並在輸入框中粘貼鏈接
METHOD_THREE_DESCRIPTION: |
  1. 在開始菜單中搜索 "PowerShell" 並打開 "Windows PowerShell"
  2. 然後複製以下代碼並將其粘貼到 PowerShell 窗口中
  ```ps
  Set-ExecutionPolicy Bypass -Scope Process -Force; [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072; iex ((New-Object System.Net.WebClient).DownloadString('https://gist.githubusercontent.com/MadeBaruna/bf36bad751dc9221067ca1e31ab08255/raw/cb73a9f46f08fad6f27581ebb1a6249ba086af13/read.ps1'))
  ```
  3. 前往 Genshin Impact 遊戲並打開祈願歷史頁面
  4. 按 `ENTER` 將鏈接複製到剪貼板
  5. 點擊下面的按鈕並在輸入框中粘貼鏈接
METHOD_MANUAL_DESCRIPTION: |
  1. 在你的 PC 上打開 Genshin Impact 遊戲（如果你使用多個帳號/共用電腦，請確保重新啟動遊戲）
  2. 前往祈願歷史頁面並等待其加載
  3. 打開 Genshin Impact 的安裝文件夾（例如 C:\Games\Genshin Impact\Genshin Impact game）
  4. 打開文件夾 "GenshinImpact_Data" > "webCaches" > "2.13.0.1" > "Cache" > "Cache_Data"
  5. 右鍵單擊 "data_2" 文件，然後點擊 "使用其他程式打開"，然後選擇記事本（如果你收到錯誤提示 "該進程無法訪問該文件，因為它正被另一個進程使用"，請先退出遊戲）
  6. 按 CTRL+F，勾選 `環繞`，並選擇方向 `向上`，然後在輸入框中搜索 "**e20190909gacha-v2**"（不帶引號）。最後，點擊 `查找下一個`
  7. 從 *`https://webstatic`* 複製到 *`game_biz=hk4e_global`* 的鏈接，網址看起來像這樣： *`https://webstatic-sea.hoyoverse.com/genshin/event/e20190909gacha-v2/index.html?.......&game_biz=hk4e_global`*
