HOYOLAB_REGISTER_SCRIPT_DESCRIPTION: |
  **如何將您的 HoYoLAB 帳戶與 Genshin Wizard 關聯**
  > **1.** 首先，登錄您的 [**HoYoLAB**](https://www.hoyolab.com/home) 帳戶。
  > **2.** 在地址欄中輸入“java”，然後輸入下面的腳本。
  > **3.** 成功運行腳本後，單擊“Click here to copy!/單擊此處複製！”按鈕複製 cookie。
  > **4.** 最後，您可以通過單擊下面的“Enter Token/輸入令牌”按鈕並粘貼您複製的令牌來註冊。
HOYOLAB_REGISTER_SCRIPT: |
  ```script:check = document.cookie.includes('account_id') && document.cookie.includes('cookie_token') || alert('請先註銷並重新登錄，然後重試，cookie 目前已過期/無效！'); cookie=document.cookie.match(/(lt(oken|uid)|cookie_token)=(.*?);/gm).join(" "); check && document.write(cookie + `<br><button onclick="navigator.clipboard.writeText('${cookie}')">Click here to copy!/點擊此處複製！</button>`)```
HOYOLAB_REGISTER_LOGIN_TITLE: 註冊 | 登入方法
HOYOLAB_REGISTER_LOGIN_DESCRIPTION: |
  **如何將您的 HoYoLAB 帳戶與 Genshin Wizard 關聯**
  > **1.** 首先，選擇下方的“註冊”按鈕。
  > **2.** 在輸入字段中，輸入您的 HoYoLAB 帳戶登錄詳細信息，請記住使用您的 **電子郵件** 和密碼。
  > **3.** 成功輸入帳戶詳細信息後，請等待 Genshin Wizard 處理您的註冊請求，請記住，這可能需要一兩分鐘。
  > **4.** 最後，如果所有步驟都正確完成，您將通過 DM 收到一條**確認消息**，表明您的帳戶已成功關聯。 <:訊息:1021014187197083668> **注意：**此方法只是為了方便/QOL。如果您擔心您的賬戶安全，請改用腳本方式或其他註冊方式。
