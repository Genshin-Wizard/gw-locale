METHOD_TWO_DESCRIPTION: |
  $c1. В меню Пуск найдите "PowerShell" и откройте "Windows PowerShell"
  2. Затем скопируйте следующий код и вставьте его в окно Powershell
  ```ps
  iex('Write-Host "Copy the wish history table! ;while(1) { $c = Get-Clipboard -TextFormatType Html; if ($c -match "^SourceURL:https:/. log") { break; }; for($i=5; $i -gt 0; $i--) { Write-Host "`rChecking in $i" -NoNewline; Спящий 1; }; }; Write-Host " OK"; $m=((Get-Clipboard -TextFormatType Html) | Select-String "(https:/. log)").Matches[0]. Значение);$m; Set-Clipboard -Value $m;')
  ```
  3. Перейдите на игру Genshin Impact и откройте страницу истории желаний
  4. Нажмите `ENTER`, чтобы скопировать ссылку в буфер обмена
  5. Нажмите на кнопку ниже и вставьте ссылку в поле ввода
METHOD_THREE_DESCRIPTION: |
  Посмотрите нашу "[Документацию на Github]"
  "(https://github.com/Genshin-Wizard/historyLink)" для детальных шагов с изображениями.

  1. Откройте игру Genshin Impact на своем компьютере
  2. Перейдите на страницу истории молитв и дождитесь ее загрузки
  3. Вернитесь к Windows/рабочему столу
  4. В меню "Пуск" найдите "PowerShell" и откройте "Windows PowerShell"
  5. Затем скопируйте следующий код и вставьте его в окно Powershell
  ```ps
  Set-ExecutionPolicy Bypass -Scope Process -Force; [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072; iex "&{$((New-Object System.Net.WebClient).DownloadString('https://raw.githubusercontent.com/Genshin-Wizard/historyLink/master/historykey.ps1'))} global"
  ```
  6. Нажмите `ENTER`, чтобы скопировать ссылку в ваш буфер обмена
  7. Нажмите на кнопку ниже и вставьте ссылку в поле ввода
METHOD_MANUAL_DESCRIPTION: |
  1. Откройте игру с эффектом Genshin на вашем ПК (убедитесь, что вы перезапустите игру, если вы используете несколько учетных записей/общих компьютеров)
  2. Перейдите на страницу истории желаний и подождите его загрузки
  3. Откройте папку установки для эффекта Genshin (т.е. C:\Games\Genshin Impact\Genshin Impact game)
  4. Откройте папки "GenshinImpact_Data" > "webCaches" > "2.13.0.1" > "Кэш" > "Cache_Data"
  5. Щелкните правой кнопкой мыши файл "data_2", затем выберите "Open with" и выберите Notepad (Если вы получите ошибку, например "Процесс не может получить доступ к файлу, потому что он используется другим процессом", пожалуйста, выйдите из игры сначала)
  6. Нажмите CTRL+F, проверьте `Wrap around` и выберите направление `Up`, затем в поле ввода введите "**e20190909gacha-v2**" (без кавычки). Наконец, нажмите `Find Next`
  7. Скопируйте ссылку из *`https://webstatic`* в *`game_biz=hk4e_global`* url выглядит так: *`https://webstatic-sea.hoyoverse.com/genshin/event/e20190909gacha-v2/index.html?....&game_biz=hk4e_global`*
