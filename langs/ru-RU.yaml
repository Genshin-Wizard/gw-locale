HOYOLAB_REGISTER_SCRIPT_TITLE: Регистрация | Скриптовый метод
HOYOLAB_REGISTER_SCRIPT_DESCRIPTION: |
  ** Как связать вашу учетную запись HoYoLAB с Genshin Wizard**
  > **1.** Для начала войдите в свой аккаунт. [**HoYoLAB**](https://www.hoyolab.com/home) account.
  > ** 2. ** Введите `java` в адресной строке, за которой следует приведенный ниже скрипт.
  > ** 3. ** После успешного запуска скрипта нажмите кнопку "Нажмите здесь, чтобы скопировать!", чтобы скопировать файл cookie.
  > ** 4. ** Нажмите кнопку `Ввести токен` ниже и вставьте скопированный токен в первое поле ввода.
  > ** 5. ** Для получения оставшихся двух входных данных посетите наш [**HoYoLAB Registration Guide**](https://docs.genshinwizard.com/overview/hoyolab-registration) for more information.
  > ** 6. ** Наконец, нажмите кнопку "Отправить", чтобы завершить процесс регистрации.
HOYOLAB_REGISTER_SCRIPT: |
  ```script:check = document.cookie.includes('account_id') && document.cookie.includes('cookie_token') || alert('Пожалуйста, выйдите и снова войдите, прежде чем пытаться снова, срок действия cookie в настоящее время истек/недействителен!'); cookie=document.cookie.match(/(lt(oken|uid)|cookie_token)=(.*?);/gm).join(" "); check && document.write(cookie + `<br><button onclick="navigator.clipboard.writeText('${cookie}')">Нажмите здесь, чтобы скопировать!</button>`)```
HOYOLAB_REGISTER_LOGIN_TITLE: Регистрация | Логин метод
HOYOLAB_REGISTER_LOGIN_DESCRIPTION: |
  ****Как привязать свой аккаунт HoYoLAB к Genshin Wizard****
  > **1.** Чтобы начать, нажмите кнопку `Зарегистрироваться` внизу.
  > **2.** В полях ввода введите данные для входа в свой аккаунт HoYoLAB, не забудьте использовать свою **почту** и пароль.
  > **3.** После того, как вы успешно ввели данные своего аккаунта, дождитесь, пока Genshin Wizard обработает ваш запрос на регистрацию, имейте в виду, что это может занять минуту или две.
  > **4.** Наконец, если все шаги выполнены правильно, вы получите **подтверждающее сообщение** через ЛС, указывающее на то, что ваш аккаунт был успешно привязан.

  <:information:1021014187197083668> **Примечание:** Этот метод приведен здесь просто для удобства/качества. Если вы беспокоитесь о безопасности своего аккаунта, пожалуйста, используйте вместо этого метод скрипта или другую форму регистрации.
HOYOLAB_REGISTER_LOGIN_FOOTER: Дружеское напоминание о том, что Genshin Wizard не хранит никаких данных вашего аккаунта! Этот метод регистрации извлекает необходимые файлы cookie, необходимые для просмотра статистики вашего аккаунта.
