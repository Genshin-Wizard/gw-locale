LINK_HOYOLAB_DESCRIPTION: |
  Добро пожаловать в систему привязки аккаунта HoYoLAB от Genshin Wizard.

  ** Функции привязки:**
  > **1.** Доступ к вашему количеству смолы в игре в режиме реального времени (настройка автоматических уведомлений).
  > **2.** Доступ к вашему внутриигровому статусу экспедиции в режиме реального времени.
  > **3.** Возможность получить свою *Ежедневную награду за вход* прямо из Discord.
  > **4.** Возможность просматривать подробную информацию о вашей прогрессии по Витой Бездны.
  > **5.** Просмотрите инфографику, содержащую **всех** доступных вам персонажей.

  Чтобы начать, нажмите на один из вариантов регистрации пользователя ниже!
