REGISTER_COMMAND_PC_DIRECTIONS: |
  Ознакомьтесь с нашей [Документацией на Github](https://github.com/Genshin-Wizard/historyLink) для подробных шагов с изображениями.

  1. Откройте игру Genshin Impact на своём PC
  2. Перейдите на страницу истории молитв и дождитесь её загрузки
  3. Вернитесь к Windows/рабочему столу
  4. В меню «Пуск» найдите «PowerShell» и откройте «Windows PowerShell»
  5. Затем скопируйте следующий код и вставьте его в окно Powershell
  ```ps
  iwr https://www.genshinwizard.com/file/history -UseBasicParsing | iex
  ```
  6. Нажмите `ENTER`, чтобы скопировать ссылку в буфер обмена
  7. Нажмите кнопку ниже и вставьте ссылку в поле ввода
REGISTER_COMMAND_ANDROID_DIRECTIONS: |
  После обновления 3.0 пользователи больше не могут просто копировать и вставлять ссылку на историю на устройствах Android.

  В настоящее время мы ищем способ получить ссылку на историю на устройствах Android. Пожалуйста, проверьте позже.
REGISTER_COMMAND_IOS_DIRECTIONS: |
  Посмотрите руководство Kaizer [По трансляции приложения](https://drive.google.com/file/d/14Q_6v60qLPunrpmA9Bf1KlvsKhaRyPzz/view?usp=sharing) для детальных шагов с изображениями.

  1. Откройте Genshin Impact и перейдите к экрану молитв
  2. Пока Genshin Impact все еще открыт, перейдите в приложение Stream и нажмите Sniff Now
  3. Вернитесь к Genshin Impact и откройте историю молитв
  4. Когда ваш список молитв будет загружен, вернитесь в приложение Stream и нажмите Stop sniffing
  5. Затем нажмите на Sniff History и выберите первый элемент в списке
  6. Нажмите на запрос, начинающийся с `GET https://hk4e-api-os/...`
  7. Перейдите на вкладку запрос
  8. Коснитесь длинного текста, начинающегося с `GET /event/gacha_info...`
  9. Наконец, нажмите Copy Url
  10. Нажмите на кнопку ниже и вставьте ссылку в поле ввода.
