LINK_HOYOLAB_DESCRIPTION: |
  Benvenuto nel sistema di collegamento dell'account HoYoLAB di Genshin Wizard.
  
  **Funzionalità di Collegamento:**
  > **1.** Accesso al conteggio della resina in tempo reale (imposta notifiche automatiche).
  > **2.** Accesso allo stato delle tue spedizioni in tempo reale.
  > **3.** Possibilità di richiedere il tuo *Premio di Registrazione Giornaliera* direttamente da Discord.
  > **4.** Possibilità di visualizzare informazioni dettagliate sui tuoi progressi nel Abisso Spirale.
  > **5.** Visualizza un'infografica contenente **tutti** i tuoi personaggi disponibili.
  
  Per iniziare, clicca su una delle opzioni di registrazione utente qui sotto!
