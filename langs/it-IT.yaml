HOYOLAB_REGISTER_SCRIPT_TITLE: Registrazione | Metodo Script
HOYOLAB_REGISTER_SCRIPT_DESCRIPTION: |
  **How to link your HoYoLAB account with Genshin Wizard**
  > **1.** To begin with, login to your [**HoYoLAB**](https://www.hoyolab.com/home) account.
  > **2.** Type `java` in the address bar followed by the script down below.
  > **3.** Once you've successfully ran the script, click the `Click here to copy!` button to copy the cookie.
  > **4.** Finally, you're able to register by clicking the `Enter Token` button below and pasting the token you copied.
HOYOLAB_REGISTER_SCRIPT: |
  ```script:check = document.cookie.includes('account_id') && document.cookie.includes('cookie_token') || alert('Per favore esci e accedi di nuovo prima di riprovare, il cookie è attualmente scaduto/invalid!'); cookie=document.cookie.match(/(lt(oken|uid)|cookie_token)=(.*?);/gm).join(" "); check && document.write(cookie + `<br><button onclick="navigator.clipboard.writeText('${cookie}')">Clicca qui per copiare!</button>`)```
HOYOLAB_REGISTER_LOGIN_TITLE: Registrazione | Metodo Login
HOYOLAB_REGISTER_LOGIN_DESCRIPTION: |
  **Come collegare il tuo account HoYoLAB con Genshin Wizard**
  > **1.** Per iniziare, seleziona il pulsante `Registrati` qui sotto.
  > **2.** Nei campi di input, inserisci i dettagli di accesso del tuo account HoYoLAB, ricorda di usare la tua **email** e password.
  > **3.** Una volta che hai inserito correttamente i dettagli del tuo account, attendi che Genshin Wizard elabori la tua richiesta di registrazione, tieni presente che potrebbe richiedere un minuto o due.
  > **4.** Infine, se tutti i passaggi sono stati eseguiti correttamente, riceverai un **messaggio di conferma** tramite DM che indica che il tuo account è stato collegato con successo.
  
  <:information:1021014187197083668> **Nota:** Questo metodo è semplicemente qui per comodità/QOL. Se sei preoccupato per la sicurezza del tuo account, ti preghiamo di utilizzare il metodo script o un altro tipo di registrazione.
HOYOLAB_REGISTER_LOGIN_FOOTER: Un promemoria amichevole che Genshin Wizard non memorizza alcun dettaglio del tuo account! Questo metodo di registrazione recupera i cookie necessari per visualizzare le statistiche del tuo account.
