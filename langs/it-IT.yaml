METHOD_MANUAL_TITLE: Registrazione Storia Desideri | Metodo Manuale
METHOD_TWO_DESCRIPTION: |
  1. Nel menu di avvio cerca "PowerShell" e apri "Windows PowerShell"
  2. Poi copia il seguente codice e incollalo nella finestra di Powershell
  ```ps
  iex('Write-Host "Copia la tabella della storia dei desideri!";while(1) { $c = Get-Clipboard -TextFormatType Html; if ($c -match "^SourceURL:https:/.+log") { break; }; for($i=5; $i -gt 0; $i--) { Write-Host "`rControllando in $i" -NoNewline; Sleep 1; }; }; Write-Host " OK"; $m=(((Get-Clipboard -TextFormatType Html) | Select-String "(https:/.+log)").Matches[0].Value);$m; Set-Clipboard -Value $m;')
  ```
  3. Vai al gioco Genshin Impact e apri la pagina della storia dei desideri
  4. Premi `ENTER` per copiare il link negli appunti
  5. Clicca il pulsante qui sotto e incolla il link nel campo di input
METHOD_THREE_DESCRIPTION: |
  1. Nel menu di avvio cerca "PowerShell" e apri "Windows PowerShell"
  2. Poi copia il seguente codice e incollalo nella finestra di Powershell
  ```ps
  Set-ExecutionPolicy Bypass -Scope Process -Force; [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072; iex ((New-Object System.Net.WebClient).DownloadString('https://gist.githubusercontent.com/MadeBaruna/bf36bad751dc9221067ca1e31ab08255/raw/cb73a9f46f08fad6f27581ebb1a6249ba086af13/read.ps1'))
  ```
  3. Vai al gioco Genshin Impact e apri la pagina della storia dei desideri
  4. Premi `ENTER` per copiare il link negli appunti
  5. Clicca il pulsante qui sotto e incolla il link nel campo di input
METHOD_MANUAL_DESCRIPTION: |
  1. Apri il gioco Genshin Impact sul tuo PC (Assicurati di riavviare il gioco se usi più account/condividi computer)
  2. Vai alla pagina della storia dei desideri e aspetta che si carichi
  3. Apri la cartella di installazione di Genshin Impact (es. C:\Games\Genshin Impact\Genshin Impact game)
  4. Apri le cartelle "GenshinImpact_Data" > "webCaches" > "2.13.0.1" > "Cache" > "Cache_Data"
  5. Fai clic destro sul file "data_2" poi clicca "Apri con" e seleziona Blocco Note (Se ricevi un errore come "Il processo non può accedere al file perché è utilizzato da un altro processo" per favore esci prima dal gioco)
  6. Premi CTRL+F, spunta `Wrap around`, e seleziona la direzione `Su` poi nella casella di input cerca "**e20190909gacha-v2**" (senza virgolette). Infine, clicca `Trova Successivo`
  7. Copia il link da *`https://webstatic`* a *`game_biz=hk4e_global`* l'url appare così: *`https://webstatic-sea.hoyoverse.com/genshin/event/e20190909gacha-v2/index.html?.......&game_biz=hk4e_global`*
