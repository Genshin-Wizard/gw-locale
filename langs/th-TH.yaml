  สวัสดี Traveler! ขอบคุณที่เชิญ **Genshin Wizard** มาที่บ้านอันแสนเรียบง่ายของคุณ มีบางสิ่งที่ควรทราบก่อนเริ่ม:

  **คำสั่ง Prefix:** `g!` หรือ `/`
  > ขอแสดงความยินดี! เซิร์ฟเวอร์นี้เป็นเซิร์ฟเวอร์ **{guilds}** ที่เชิญ Genshin Wizard! 🎉

  สำหรับข้อมูลเพิ่มเติมเกี่ยวกับวิธีการใช้ฉัน โปรดดูที่ [**เอกสาร**](https://docs.genshinwizard.com/) หรือใช้คำสั่ง </help:{command_id}>!
