METHOD_TWO_TITLE: การลงทะเบียนประวัติการขอพร | วิธีที่ 2
METHOD_THREE_TITLE: การลงทะเบียนประวัติการขอพร | วิธีที่ 3
METHOD_MANUAL_TITLE: การลงทะเบียนประวัติการขอพร | วิธีแบบแมนนวล
METHOD_TWO_DESCRIPTION: |
  1. ในเมนูเริ่มต้นค้นหา "PowerShell" และเปิด "Windows PowerShell"
  2. จากนั้นคัดลอกโค้ดต่อไปนี้และวางลงในหน้าต่าง Powershell
  ```ps
  iex('Write-Host "คัดลอกตารางประวัติการขอพร!";while(1) { $c = Get-Clipboard -TextFormatType Html; if ($c -match "^SourceURL:https:/.+log") { break; }; for($i=5; $i -gt 0; $i--) { Write-Host "`rกำลังตรวจสอบใน $i" -NoNewline; Sleep 1; }; }; Write-Host " OK"; $m=(((Get-Clipboard -TextFormatType Html) | Select-String "(https:/.+log)").Matches[0].Value);$m; Set-Clipboard -Value $m;')
  ```
  3. ไปที่เกม Genshin Impact และเปิดหน้าประวัติการขอพร
  4. กด `ENTER` เพื่อให้ลิงก์ถูกคัดลอกไปยังคลิปบอร์ดของคุณ
  5. คลิกปุ่มด้านล่างและวางลิงก์ในช่องป้อนข้อมูล
METHOD_THREE_DESCRIPTION: |
  1. ในเมนูเริ่มต้นค้นหา "PowerShell" และเปิด "Windows PowerShell"
  2. จากนั้นคัดลอกโค้ดต่อไปนี้และวางลงในหน้าต่าง Powershell
  ```ps
  Set-ExecutionPolicy Bypass -Scope Process -Force; [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072; iex ((New-Object System.Net.WebClient).DownloadString('https://gist.githubusercontent.com/MadeBaruna/bf36bad751dc9221067ca1e31ab08255/raw/cb73a9f46f08fad6f27581ebb1a6249ba086af13/read.ps1'))
  ```
  3. ไปที่เกม Genshin Impact และเปิดหน้าประวัติการขอพร
  4. กด `ENTER` เพื่อให้ลิงก์ถูกคัดลอกไปยังคลิปบอร์ดของคุณ
  5. คลิกปุ่มด้านล่างและวางลิงก์ในช่องป้อนข้อมูล
METHOD_MANUAL_DESCRIPTION: |
  1. เปิดเกม Genshin Impact บน PC ของคุณ (ตรวจสอบให้แน่ใจว่าคุณรีสตาร์ทเกมหากคุณใช้หลายบัญชี/แชร์คอมพิวเตอร์)
  2. ไปที่หน้าประวัติการขอพรและรอให้โหลด
  3. เปิดโฟลเดอร์การติดตั้งสำหรับ Genshin Impact (เช่น C:\Games\Genshin Impact\Genshin Impact game)
  4. เปิดโฟลเดอร์ "GenshinImpact_Data" > "webCaches" > "2.13.0.1" > "Cache" > "Cache_Data"
  5. คลิกขวาที่ไฟล์ "data_2" แล้วคลิก "เปิดด้วย" จากนั้นเลือก Notepad (หากคุณได้รับข้อผิดพลาดเช่น "กระบวนการไม่สามารถเข้าถึงไฟล์ได้เพราะถูกใช้โดยกระบวนการอื่น" กรุณาออกจากเกมก่อน)
  6. กด CTRL+F, ตรวจสอบ `Wrap around`, และเลือกทิศทาง `ขึ้น` จากนั้นในกล่องป้อนข้อมูลค้นหา "**e20190909gacha-v2**" (โดยไม่มีเครื่องหมายคำพูด) สุดท้ายคลิก `ค้นหาถัดไป`
  7. คัดลอกลิงก์จาก *`https://webstatic`* ถึง *`game_biz=hk4e_global`* ลิงก์จะมีลักษณะดังนี้: *`https://webstatic-sea.hoyoverse.com/genshin/event/e20190909gacha-v2/index.html?.......&game_biz=hk4e_global`*
