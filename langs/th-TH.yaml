REGISTER_COMMAND_PLATFORM_SELECTION_DIRECTIONS: |
  ยินดีต้อนรับสู่ระบบการลงทะเบียนของ Genshin Wizard。

  **ฟีเจอร์การเชื่อมโยง:**
  > **1.** ติดตามประวัติความปรารถนาของคุณ。
  > **2.** ดูสถิติประวัติความปรารถนาอย่างละเอียดพร้อมกับการพลาดของแบนเนอร์ของคุณ。
  > **3.** ดูว่าคุณอยู่ในการพลาดที่รับประกันหรือไม่。
  > **4.** ความสามารถโปรไฟล์ Genshin Wizard แบบเต็ม。
  > **5.** เข้าถึงคำสั่งทั้งหมดที่สามารถเข้าถึงได้โดย [**การเชื่อมโยง UID**](https://docs.genshinwizard.com/wishing-centre/getting-started#linking-genshin-uid-partial-registration)。

  คุณใช้แพลตฟอร์มไหนในการเล่น Genshin Impact?
