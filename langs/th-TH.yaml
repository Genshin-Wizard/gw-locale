INFO_COMMAND_CACHE_DESCRIPTION: |
  **Genshin Wizard Cache **<:INFORMATION_0_0:1019599343763857501><:INFORMATION_1_0:1019599344753717299><:INFORMATION_2_0:1019599345974247475>

  <:information:1034639378410115103> **Cache คืออะไร?**
  Genshin Wizard จะเก็บข้อมูลการสร้างตัวละคร *โดยอัตโนมัติ* ดังนั้นคุณจึงไม่ต้องกังวลเกี่ยวกับการเปลี่ยนการแสดงตัวละครซ้ำแล้วซ้ำอีก!

  <:na:975828401900359711> **ถ้าฉันต้องการลบการสร้างตัวละครเก่า?**
  ไม่ต้องกลัว! คุณจะสามารถจัดการการสร้างตัวละครที่เก็บไว้ได้จากข้อความนี้โดยตรง! ใช้ UI ด้านล่างเพื่อลบตัวละครเฉพาะ หรือทั้งหมด จาก Genshin Wizard cache ของคุณ
INFO_COMMAND_CUSTOM_ART_DESCRIPTION: |
  <:information:1034639378410115103> **ฟีเจอร์ศิลปะที่กำหนดเองของ Genshin Wizard**
  สวัสดี Traveler ดูเหมือนว่าคุณกำลังพยายามใช้ฟีเจอร์ **ศิลปะที่กำหนดเอง** ของ Genshin Wizard! ฟีเจอร์นี้มีให้เฉพาะผู้ใช้ Genshin Wizard Premium เท่านั้น.

  คุณสามารถเรียนรู้เพิ่มเติมเกี่ยวกับ Genshin Wizard Premium โดยใช้คำสั่ง </premium:{command_id}> หรือโดยการเยี่ยมชม [**ข้อมูลหน้า Premium**](https://)!
