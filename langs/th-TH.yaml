LINK_HOYOLAB_DESCRIPTION: |
  ยินดีต้อนรับสู่ระบบการลิงก์บัญชี HoYoLAB ของ Genshin Wizard.

  **ฟีเจอร์การลิงก์:**
  > **1.** เข้าถึงจำนวนเรซินในเกมของคุณแบบเรียลไทม์ (ตั้งค่าการแจ้งเตือนอัตโนมัติ).
  > **2.** เข้าถึงสถานะการสำรวจในเกมของคุณแบบเรียลไทม์.
  > **3.** สามารถขอรับ *รางวัลเช็คอินประจำวัน* ได้โดยตรงจาก Discord.
  > **4.** สามารถดูข้อมูลเชิงลึกเกี่ยวกับความก้าวหน้าใน Spiral Abyss ของคุณ.
  > **5.** ดูข้อมูลกราฟฟิกที่มี **ตัวละครทั้งหมด** ที่คุณมี.

  เริ่มต้นได้โดยคลิกที่หนึ่งในตัวเลือกการลงทะเบียนผู้ใช้ด้านล่าง!
