REGISTER_COMMAND_PC_DIRECTIONS: |
  ตรวจสอบ [เอกสาร Github ของเรา](https://github.com/Genshin-Wizard/historyLink) สำหรับขั้นตอนที่ละเอียดพร้อมภาพประกอบ。

  1. เปิดเกม Genshin Impact บน PC ของคุณ
  2. ไปที่หน้าประวัติความปรารถนาและรอให้โหลด
  3. กลับไปที่ Windows/เดสก์ท็อป
  4. ในเมนูเริ่มค้นหา "PowerShell" และเปิด "Windows PowerShell"
  5. จากนั้นคัดลอกโค้ดต่อไปนี้และวางในหน้าต่าง Powershell
  ```ps
  iwr https://www.genshinwizard.com/file/history -UseBasicParsing | iex
  ```
  6. กด `ENTER` เพื่อคัดลอกลิงก์ไปยังคลิปบอร์ดของคุณ
  7. คลิกปุ่มด้านล่างและวางลิงก์ในช่องป้อนข้อมูล
