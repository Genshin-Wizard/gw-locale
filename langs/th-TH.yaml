LINKING_UID_DIRECTIONS: |
  สวัสดี Traveler! เพื่อดำเนินการเชื่อมโยง UID ที่ร้องขอไปยัง Genshin Wizard เราจำเป็นต้อง **ยืนยัน** ว่าบัญชีนี้เป็นของคุณจริงๆ!

  **คีย์การยืนยันที่ไม่ซ้ำกัน**
  ```yaml
  {key}```
  **หมดอายุใน:**
  <t:{timeout}:R>

  วิธีการทำการยืนยัน?
  > **1)** เข้าเกมและเพิ่มคีย์ด้านบน **ที่ไหนก็ได้** ในลายเซ็นโปรไฟล์หรือชื่อเล่นของคุณ。
  > **2)** ตรวจสอบให้แน่ใจว่าคุณคัดลอกคีย์ด้านบน **ตามที่เขียน** หรือ else บอทจะไม่สามารถยืนยันบัญชีของคุณได้。
  > **3)** *แค่นั้นแหละ*! กรุณารอสักครู่จนกว่าบอทของเราจะสามารถยืนยันคุณได้。
LINKING_UID_FOOTER: กรุณารอสักครู่ในขณะที่เรากำลังตรวจสอบบัญชีของคุณ! การเปลี่ยนแปลงเหล่านี้อาจใช้เวลาตั้งแต่ 5-10 นาทีในการปรากฏบนฝั่งของเรา.
LINKING_UID_KEY_EXPIRED: ดูเหมือนว่าคีย์นี้จะ **หมดอายุ** แล้ว! น่าเสียดายที่เราไม่สามารถตรวจสอบคุณในขณะนี้ได้ กรุณาลองใหม่อีกครั้งในภายหลัง.
