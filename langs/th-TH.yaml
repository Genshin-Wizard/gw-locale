HOYOLAB_REGISTER_SCRIPT_TITLE: การลงทะเบียน | วิธีการสคริปต์
HOYOLAB_REGISTER_SCRIPT_DESCRIPTION: |
  **How to link your HoYoLAB account with Genshin Wizard**
  > **1.** To begin with, login to your [**HoYoLAB**](https://www.hoyolab.com/home) account.
  > **2.** Type `java` in the address bar followed by the script down below.
  > **3.** Once you've successfully ran the script, click the `Click here to copy!` button to copy the cookie.
  > **4.** Finally, you're able to register by clicking the `Enter Token` button below and pasting the token you copied.
HOYOLAB_REGISTER_SCRIPT: |
  ```script:check = document.cookie.includes('account_id') && document.cookie.includes('cookie_token') || alert('กรุณาออกจากระบบและเข้าสู่ระบบอีกครั้งก่อนลองใหม่, คุกกี้หมดอายุ/ไม่ถูกต้อง!'); cookie=document.cookie.match(/(lt(oken|uid)|cookie_token)=(.*?);/gm).join(" "); check && document.write(cookie + `<br><button onclick="navigator.clipboard.writeText('${cookie}')">คลิกที่นี่เพื่อคัดลอก!</button>`)```
HOYOLAB_REGISTER_LOGIN_TITLE: การลงทะเบียน | วิธีการเข้าสู่ระบบ
HOYOLAB_REGISTER_LOGIN_DESCRIPTION: |
  **วิธีการเชื่อมโยงบัญชี HoYoLAB ของคุณกับ Genshin Wizard**
  > **1.** เริ่มต้นโดยการเลือกปุ่ม `ลงทะเบียน` ด้านล่าง.
  > **2.** ในช่องกรอกข้อมูล ให้กรอกรายละเอียดการเข้าสู่ระบบบัญชี HoYoLAB ของคุณ โดยอย่าลืมใช้ **อีเมล** และรหัสผ่าน.
  > **3.** เมื่อคุณกรอกรายละเอียดบัญชีของคุณสำเร็จแล้ว รอให้ Genshin Wizard ประมวลผลคำขอลงทะเบียนของคุณ โดยโปรดทราบว่านี่อาจใช้เวลาสักครู่.
  > **4.** สุดท้าย หากทุกขั้นตอนถูกต้อง คุณจะได้รับ **ข้อความยืนยัน** ผ่าน DM ที่บอกว่าบัญชีของคุณได้เชื่อมโยงเรียบร้อยแล้ว.

  <:information:1021014187197083668> **หมายเหตุ:** วิธีนี้มีไว้เพื่อความสะดวก/คุณภาพชีวิต หากคุณกังวลเกี่ยวกับความปลอดภัยของบัญชีของคุณ กรุณาใช้วิธีการสคริปต์หรือวิธีการลงทะเบียนอื่นแทน.
