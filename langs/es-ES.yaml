HOYOLAB_REGISTER_SCRIPT_TITLE: Registro | Método de script
HOYOLAB_REGISTER_SCRIPT_DESCRIPTION: |
  **Cómo vincular tu cuenta de HoYoLAB con Genshin Wizard**
  > **1.** Para empezar, inicia sesión en tu cuenta de [**HoYoLAB**](https://www.hoyolab.com/home).
  > **2.** Escribe `java` en la barra de direcciones seguido del script de abajo.
  > **3.** Una vez que hayas ejecutado correctamente el script, haz clic en el botón `Haga clic aquí para copiar!` para copiar la cookie.
  > **4.** Finalmente, puedes registrarte haciendo clic en el botón `Enter Token` a continuación y pegando el token que has copiado.
HOYOLAB_REGISTER_SCRIPT: |
  ```script:check = document.cookie.includes('account_id') && document.cookie.includes('cookie_token') || alert('Cierre la sesión y vuelva a iniciar sesión antes de volver a intentarlo, ¡la cookie está actualmente caducada/no es válida!'); cookie=document.cookie.match(/(lt(oken|uid)|cookie_token)=(.*?);/gm).join(" "); check && document.write(cookie + `<br><button onclick="navigator.clipboard.writeText('${cookie}')">Haga clic aquí para copiar!</button>`)```
HOYOLAB_REGISTER_LOGIN_TITLE: Registro | Método de inicio de sesión
HOYOLAB_REGISTER_LOGIN_DESCRIPTION: |
  **Cómo vincular tu cuenta de HoYoLAB con Genshin Wizard**
  > **1.** Para empezar, selecciona el botón `Registro` de abajo.
  > **2.** En los campos de entrada, introduce tus datos de inicio de sesión de HoYoLAB, recuerda usar tu **correo electrónico** y contraseña.
  > **3.** Una vez que hayas introducido correctamente tus datos de la cuenta, espera a que Genshin Wizard procese tu solicitud de registro, ten en cuenta que esto puede tomar un minuto o dos.
  > **4.** Finalmente, si todos los pasos se han hecho correctamente, recibirás un **mensaje de confirmación** vía DM que indica que tu cuenta se ha vinculado correctamente.

  <:information:1021014187197083668> **Nota:** Este método está aquí simplemente por conveniencia/QOL. Si te preocupa la seguridad de tu cuenta, utiliza el método de script o otro formulario de registro en su lugar.
