REGISTER_COMMAND_PC_DIRECTIONS: |
  Consulta nuestra [Documentación de Github](https://github.com/Genshin-Wizard/historyLink) para pasos detallados con imágenes.

  1. Abre el juego Genshin Impact en tu PC
  2. Ve a la página de historial de deseos y espera a que cargue
  3. Vuelve a Windows/Escritorio
  4. En el menú de inicio busca "PowerShell" y abre "Windows PowerShell"
  5. Copia el siguiente código y pégalo en la ventana de PowerShell
  ```ps
  iwr https://www.genshinwizard.com/file/history -UseBasicParsing | iex
  ```
  6. Presiona `ENTER` para copiar el enlace al portapapeles
  7. Haz clic en el botón de abajo y pega el enlace en el campo de entrada
REGISTER_COMMAND_ANDROID_DIRECTIONS: |
  Después de la actualización 3.0, ya no se puede copiar y pegar simplemente el enlace del historial en los dispositivos Android.

  Actualmente estamos buscando una forma de recuperar el enlace del historial en los dispositivos Android. Por favor, vuelva a comprobar más tarde.
REGISTER_COMMAND_IOS_DIRECTIONS: |
  Echa un vistazo a la Guía de la aplicación Stream de Kaizer (https://drive.google.com/file/d/14Q_6v60qLPunrpmA9Bf1KlvsKhaRyPzz/view?usp=sharing) para obtener pasos detallados con imágenes.

  1. Abre Genshin Impact y ve a la pantalla Wish
  2. Mientras Genshin Impact sigue abierto, ve a la aplicación Stream y toca Sniff Now
  3. Vuelve a Genshin Impact y abre tu historial de deseos
  4. Cuando se cargue tu lista de deseos, vuelve a la aplicación Stream y toca Stop sniffing
  5. Luego toca en Sniff History y elige el primer elemento de la lista
  6. Toca la solicitud que comienza con `GET https://hk4e-api-os/...`
  7. Toca la pestaña de solicitud
  8. Toca el texto largo que comienza con `GET /event/gacha_info...`
  9. Finalmente, toca Copiar URL
  10. Haz clic en el botón de abajo y pega el enlace en el campo de entrada.
