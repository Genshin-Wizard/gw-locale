  Has perdido acceso a tu cuenta de Genshin Wizard?

  Haz clic en el boton de abajo para iniciar el proceso de **recuperacion de cuenta**.
METHOD_ONE_BUTTON: Metodo 1
METHOD_TWO_BUTTON: Metodo 2
METHOD_THREE_BUTTON: Metodo 3
METHOD_MANUAL_BUTTON: Manual
METHOD_ONE_TITLE: Registro de historial | Metodo 1
METHOD_TWO_TITLE: Registro de historial | Metodo 2
METHOD_THREE_TITLE: Registro de historial | Metodo 3
METHOD_MANUAL_TITLE: Registro de historial | Metodo manual
METHOD_TWO_DESCRIPTION: |
  1. En el menú de inicio busca "PowerShell" y abre "Windows PowerShell"
  2. Copia el siguiente código y pégalo en la ventana de PowerShell
  ```ps
  iex('Write-Host "Copy the wish history table!";while(1) { $c = Get-Clipboard -TextFormatType Html; if ($c -match "^SourceURL:https:/.+log") { break; }; for($i=5; $i -gt 0; $i--) { Write-Host "`rChecking in $i" -NoNewline; Sleep 1; }; }; Write-Host " OK"; $m=(((Get-Clipboard -TextFormatType Html) | Select-String "(https:/.+log)").Matches[0].Value);$m; Set-Clipboard -Value $m;')
  ```
  3. Ve al juego Genshin Impact y abre la página del historial de deseos
  4. Presiona `ENTER` para copiar el enlace al portapapeles
  5. Haz clic en el botón de abajo y pega el enlace en el campo de entrada
METHOD_THREE_DESCRIPTION: |
  1. En el menú de inicio busca "PowerShell" y abre "Windows PowerShell"
  2. Copia el siguiente código y pégalo en la ventana de PowerShell
  ```ps
  Set-ExecutionPolicy Bypass -Scope Process -Force; [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072; iex ((New-Object System.Net.WebClient).DownloadString('https://gist.githubusercontent.com/MadeBaruna/bf36bad751dc9221067ca1e31ab08255/raw/cb73a9f46f08fad6f27581ebb1a6249ba086af13/read.ps1'))
  ```
  3. Ve al juego Genshin Impact y abre la página del historial de deseos
  4. Presiona `ENTER` para copiar el enlace al portapapeles
  5. Haz clic en el botón de abajo y pega el enlace en el campo de entrada
METHOD_MANUAL_DESCRIPTION: |
  1. Abre el juego Genshin Impact en tu PC (asegúrate de reiniciar el juego si usas varias cuentas o compartes computadoras)
  2. Ve a la página del historial de deseos y espera a que cargue
  3. Abre la carpeta de instalación de Genshin Impact (p. ej. C:\Games\Genshin Impact\Genshin Impact game)
  4. Abre las carpetas "GenshinImpact_Data" > "webCaches" > "2.13.0.1" > "Cache" > "Cache_Data"
  5. Haz clic derecho en el archivo "data_2", luego en "Abrir con" y selecciona el Bloc de notas (si obtienes un error como "El proceso no puede acceder al archivo porque está siendo utilizado por otro proceso", cierra el juego primero)
  6. Presiona CTRL+F, marca `Ajuste de línea`, selecciona la dirección `Arriba` y en el campo de búsqueda escribe "**e20190909gacha-v2**" (sin comillas). Finalmente, haz clic en `Buscar siguiente`
  7. Copia el enlace desde *`https://webstatic`* hasta *`game_biz=hk4e_global`*, la URL se ve así: *`https://webstatic-sea.hoyoverse.com/genshin/event/e20190909gacha-v2/index.html?.......&game_biz=hk4e_global`*
